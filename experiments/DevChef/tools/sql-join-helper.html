<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Join Helper - DevChef Tool</title>
</head>
<body>

<!-- DevChef Manifest -->
<script type="devchef-manifest">
{
  "id": "sql-join-helper",
  "name": "SQL Join Helper",
  "category": "Database",
  "description": "Visual SQL JOIN builder with relationship mapping",
  "version": "1.0.0"
}
</script>

<!-- Tool UI Template -->
<template id="tool-ui">
  <div class="tool-container">
    <div class="tool-header">
      <h2 class="tool-title">SQL JOIN Helper</h2>
      <p class="tool-description">Build complex JOIN queries with visual relationship mapping</p>
    </div>

    <div class="tool-section">
      <label class="section-label">Paste Existing SQL or JSON Schema</label>
      <textarea id="existing-query-input" placeholder="SELECT u.*, o.OrderId FROM dbo.Users u INNER JOIN dbo.Orders o ON u.Id = o.UserId WHERE o.Status = 'Open'"></textarea>
      <button id="import-query-btn" class="secondary">Import Existing</button>
    </div>

    <div class="tool-section">
      <label class="section-label">Load from JSON Schema</label>
      <textarea id="json-schema-input" placeholder='Paste JSON schema here (format: {"tables": [{"name": "Users", "schema": "dbo", "columns": [{"name": "Id", "primaryKey": true}, {"name": "Email"}]}, ...]})'></textarea>
      <button id="load-schema-btn" class="secondary">Load from JSON Schema</button>
      <select id="sample-select" class="sample-select">
        <option value="">Load Sample Schema…</option>
        <option value="ecommerce">E-Commerce (Orders)</option>
        <option value="hr">HR (Employees)</option>
      </select>
    </div>

    <div class="tool-section">
      <label class="section-label">Tables</label>
      <div id="tables-list" class="tables-list"></div>
      <button id="add-table-btn" class="secondary">+ Add Table</button>
    </div>

    <div class="tool-section">
      <label class="section-label">Joins</label>
      <div id="joins-list" class="joins-list"></div>
      <button id="add-join-btn" class="secondary">+ Add JOIN</button>
    </div>

    <div class="tool-section">
      <label class="section-label">WHERE Conditions</label>
      <div id="conditions-list" class="conditions-list"></div>
      <button id="add-condition-btn" class="secondary">+ Add Condition</button>
    </div>

    <div class="tool-section">
      <label class="section-label">Query Options</label>
      <div class="query-options">
        <label>
          <span>SELECT columns:</span>
          <select id="select-mode">
            <option value="all">All columns (*)</option>
            <option value="table-prefix">Table.* for each table</option>
            <option value="explicit">Explicit columns</option>
          </select>
        </label>
        <div id="explicit-columns" style="display: none;">
          <textarea id="column-list" placeholder="table1.col1, table2.col2, ..."></textarea>
        </div>
      </div>
    </div>

    <div class="tool-section">
      <button id="generate-btn">Generate SQL</button>
      <button id="copy-btn" class="secondary">Copy SQL</button>
      <button id="reset-btn" class="secondary">Reset</button>
    </div>

    <div class="tool-section">
      <label class="section-label" for="output">Generated SQL Query</label>
      <textarea id="output" readonly></textarea>
    </div>

    <div class="tool-section">
      <label class="section-label">JOIN Types Reference</label>
      <div class="join-types-reference">
        <div class="join-type-card">
          <h4>INNER JOIN</h4>
          <p>Returns rows when there is a match in both tables</p>
          <div class="join-diagram">A ∩ B</div>
        </div>
        <div class="join-type-card">
          <h4>LEFT JOIN</h4>
          <p>Returns all rows from left table, matched rows from right</p>
          <div class="join-diagram">A ∪ (A ∩ B)</div>
        </div>
        <div class="join-type-card">
          <h4>RIGHT JOIN</h4>
          <p>Returns all rows from right table, matched rows from left</p>
          <div class="join-diagram">(A ∩ B) ∪ B</div>
        </div>
        <div class="join-type-card">
          <h4>FULL OUTER JOIN</h4>
          <p>Returns all rows when there is a match in either table</p>
          <div class="join-diagram">A ∪ B</div>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- Tool Module Logic -->
<script type="module">
import { copyToClipboard } from '../core/tool-utils.js';

export const DevChefTool = {
  container: null,
  context: null,
  tables: [],
  joins: [],
  conditions: [],
  schemaData: null,

  init(container, context) {
    this.container = container;
    this.context = context;

    const generateBtn = container.querySelector("#generate-btn");
    const copyBtn = container.querySelector("#copy-btn");
    const resetBtn = container.querySelector("#reset-btn");
    const addTableBtn = container.querySelector("#add-table-btn");
    const addJoinBtn = container.querySelector("#add-join-btn");
    const selectMode = container.querySelector("#select-mode");
    const loadSchemaBtn = container.querySelector("#load-schema-btn");
    const sampleSelect = container.querySelector("#sample-select");
    const addConditionBtn = container.querySelector("#add-condition-btn");
    const importQueryBtn = container.querySelector("#import-query-btn");

    generateBtn?.addEventListener("click", () => this.generateSQL());
    copyBtn?.addEventListener("click", () => this.copyOutput());
    resetBtn?.addEventListener("click", () => this.reset());
    addTableBtn?.addEventListener("click", () => this.addTable());
    addJoinBtn?.addEventListener("click", () => this.addJoin());
    addConditionBtn?.addEventListener("click", () => this.addCondition());
    loadSchemaBtn?.addEventListener("click", () => this.loadFromJsonSchema());
    importQueryBtn?.addEventListener("click", () => this.importExistingInput());
    sampleSelect?.addEventListener("change", (e) => {
      if (e.target.value) this.loadSample(e.target.value);
      e.target.value = '';
    });

    selectMode?.addEventListener("change", (e) => {
      const explicitColumns = container.querySelector("#explicit-columns");
      explicitColumns.style.display = e.target.value === 'explicit' ? 'block' : 'none';
    });

    // Reset state on (re-)init to prevent accumulation across tool re-opens
    this.tables = [];
    this.joins = [];
    this.conditions = [];
    this.schemaData = null;

    this.addTable('Users', 'u');
    this.addTable('Orders', 'o');
    this.addJoin();
  },

  importExistingInput() {
    const input = this.container.querySelector('#existing-query-input')?.value || '';
    if (!input.trim()) {
      alert('Paste a SQL query or JSON schema to import');
      return;
    }

    const trimmed = input.trim();
    if (trimmed.startsWith('{')) {
      try {
        const data = JSON.parse(trimmed);
        if (data.tables && Array.isArray(data.tables)) {
          const jsonSchemaInput = this.container.querySelector("#json-schema-input");
          if (jsonSchemaInput) {
            jsonSchemaInput.value = JSON.stringify(data, null, 2);
          }
          this.applySchema(data);
          return;
        }
      } catch (error) {
        // Fall through and try SQL parsing
      }
    }

    const parsed = this.parseSQLQuery(trimmed);
    if (!parsed) {
      alert('Could not parse the SQL query');
      return;
    }

    this.applyParsedQuery(parsed);
  },

  parseIdentifier(value = '') {
    return value.replace(/^\[|\]$/g, '').replace(/^["'`]|["'`]$/g, '');
  },

  parseTableReference(reference = '') {
    const cleaned = reference.trim().replace(/,$/, '');
    const parts = cleaned.split('.').map(part => this.parseIdentifier(part));
    if (parts.length > 1) {
      return {
        schema: parts.slice(0, -1).join('.'),
        name: parts[parts.length - 1]
      };
    }
    return { schema: '', name: parts[0] || '' };
  },

  parseColumnReference(reference = '') {
    const cleaned = reference.trim().replace(/[(),]/g, '');
    const match = cleaned.match(/^(?:\[?([\w$]+)\]?\.)?\[?([\w$]+)\]?$/);
    if (!match) {
      return null;
    }
    return {
      qualifier: match[1] || '',
      column: this.parseIdentifier(match[2])
    };
  },

  parseWhereConditions(whereClause, aliasMap) {
    const conditions = [];
    const parts = whereClause
      .trim()
      .split(/\s+(AND|OR)\s+/i)
      .filter(Boolean);
    let connector = 'AND';

    for (const part of parts) {
      if (/^(AND|OR)$/i.test(part)) {
        connector = part.toUpperCase();
        continue;
      }

      const expression = part.trim().replace(/;$/, '');
      let parsed = null;

      const betweenMatch = expression.match(/^(.+?)\s+BETWEEN\s+(.+?)\s+AND\s+(.+)$/i);
      if (betweenMatch) {
        parsed = {
          left: betweenMatch[1],
          operator: 'BETWEEN',
          value: betweenMatch[2].trim(),
          value2: betweenMatch[3].trim()
        };
      }

      const nullMatch = parsed ? null : expression.match(/^(.+?)\s+(IS NULL|IS NOT NULL)$/i);
      if (nullMatch) {
        parsed = {
          left: nullMatch[1],
          operator: nullMatch[2].toUpperCase(),
          value: '',
          value2: ''
        };
      }

      const inMatch = parsed ? null : expression.match(/^(.+?)\s+(IN|NOT IN)\s*\((.+)\)$/i);
      if (inMatch) {
        parsed = {
          left: inMatch[1],
          operator: inMatch[2].toUpperCase(),
          value: inMatch[3].trim(),
          value2: ''
        };
      }

      const compareMatch = parsed ? null : expression.match(/^(.+?)\s*(=|!=|<>|<=|>=|<|>|LIKE|NOT LIKE)\s*(.+)$/i);
      if (compareMatch) {
        parsed = {
          left: compareMatch[1],
          operator: compareMatch[2].toUpperCase() === '<>' ? '!=' : compareMatch[2].toUpperCase(),
          value: compareMatch[3].trim(),
          value2: ''
        };
      }

      if (!parsed) {
        continue;
      }

      const leftRef = this.parseColumnReference(parsed.left);
      if (!leftRef) {
        continue;
      }

      conditions.push({
        connector,
        table: aliasMap[leftRef.qualifier] || '',
        column: leftRef.column,
        operator: parsed.operator,
        value: parsed.value,
        value2: parsed.value2
      });
      connector = 'AND';
    }

    return conditions;
  },

  parseSQLQuery(query) {
    const normalized = query.replace(/\r\n/g, '\n');
    const selectMatch = normalized.match(/\bselect\b([\s\S]*?)\bfrom\b/i);
    const fromMatch = normalized.match(/\bfrom\b\s+([^\s,;()]+)(?:\s+(?:as\s+)?([A-Za-z_][\w]*))?/i);
    if (!fromMatch) {
      return null;
    }

    const baseTableInfo = this.parseTableReference(fromMatch[1]);
    const baseAlias = fromMatch[2] || this.generateAlias(baseTableInfo.name, 0);
    const tables = [{
      name: baseTableInfo.name,
      schema: baseTableInfo.schema || 'dbo',
      alias: baseAlias,
      columns: []
    }];
    const joins = [];
    const aliasMap = { [baseAlias]: baseTableInfo.name };

    const joinRegex = /\b((?:inner|left(?:\s+outer)?|right(?:\s+outer)?|full(?:\s+outer)?|cross)?)\s+join\s+([^\s,;()]+)(?:\s+(?:as\s+)?([A-Za-z_][\w]*))?(?:\s+on\s+([\s\S]*?))?(?=\s+\b(?:inner|left|right|full|cross)\b\s+join|\s+\bwhere\b|\s+\bgroup\b\s+\bby\b|\s+\border\b\s+\bby\b|;|$)/gi;
    let joinMatch;
    while ((joinMatch = joinRegex.exec(normalized)) !== null) {
      const joinType = (joinMatch[1] || 'INNER').trim().toUpperCase().replace(/\s+OUTER/g, ' OUTER') + ' JOIN';
      const tableInfo = this.parseTableReference(joinMatch[2]);
      const alias = joinMatch[3] || this.generateAlias(tableInfo.name, tables.length);
      tables.push({
        name: tableInfo.name,
        schema: tableInfo.schema || 'dbo',
        alias,
        columns: []
      });
      aliasMap[alias] = tableInfo.name;

      const onClause = (joinMatch[4] || '').trim();
      const onMatch = onClause.match(/([\w\[\].]+)\s*=\s*([\w\[\].]+)/);
      const left = onMatch ? this.parseColumnReference(onMatch[1]) : null;
      const right = onMatch ? this.parseColumnReference(onMatch[2]) : null;
      joins.push({
        joinType,
        leftTable: left ? (aliasMap[left.qualifier] || '') : '',
        leftColumn: left?.column || '',
        rightTable: right ? (aliasMap[right.qualifier] || tableInfo.name) : tableInfo.name,
        rightColumn: right?.column || ''
      });
    }

    const whereMatch = normalized.match(/\bwhere\b([\s\S]*?)(?=\bgroup\b\s+\bby\b|\border\b\s+\bby\b|;|$)/i);
    const conditions = whereMatch ? this.parseWhereConditions(whereMatch[1], aliasMap) : [];

    let selectMode = 'all';
    let columnList = '';
    if (selectMatch) {
      const selectClause = selectMatch[1].trim().replace(/\s+/g, ' ');
      if (selectClause !== '*') {
        const entries = selectClause.split(',').map(item => item.trim()).filter(Boolean);
        const allPrefixed = entries.length > 0 && entries.every(item => /\.\*$/.test(item));
        if (allPrefixed) {
          selectMode = 'table-prefix';
        } else {
          selectMode = 'explicit';
          columnList = entries.join(', ');
        }
      }
    }

    return { tables, joins, conditions, selectMode, columnList };
  },

  applyParsedQuery(parsed) {
    this.tables = parsed.tables;
    this.joins = parsed.joins;
    this.conditions = parsed.conditions;
    this.schemaData = null;

    if (this.tables.length === 0) {
      this.addTable('Users', 'u');
    } else {
      this.renderTables();
      this.renderJoins();
      this.renderConditions();
    }

    const selectMode = this.container.querySelector("#select-mode");
    const explicitColumns = this.container.querySelector("#explicit-columns");
    const columnList = this.container.querySelector("#column-list");
    selectMode.value = parsed.selectMode || 'all';
    explicitColumns.style.display = selectMode.value === 'explicit' ? 'block' : 'none';
    columnList.value = parsed.columnList || '';
    this.generateSQL();
  },

  sampleSchemas: {
    ecommerce: {
      label: "E-Commerce (Orders)",
      schema: {
        "tables": [
          {
            "name": "Customers", "schema": "dbo",
            "columns": [
              {"name": "CustomerId", "type": "int", "primaryKey": true},
              {"name": "FirstName", "type": "nvarchar(100)"},
              {"name": "LastName", "type": "nvarchar(100)"},
              {"name": "Email", "type": "nvarchar(255)"},
              {"name": "CreatedAt", "type": "datetime"}
            ]
          },
          {
            "name": "Orders", "schema": "dbo",
            "columns": [
              {"name": "OrderId", "type": "int", "primaryKey": true},
              {"name": "CustomerId", "type": "int", "references": {"table": "Customers", "column": "CustomerId"}},
              {"name": "OrderDate", "type": "datetime"},
              {"name": "TotalAmount", "type": "decimal(10,2)"},
              {"name": "Status", "type": "nvarchar(50)"}
            ]
          },
          {
            "name": "OrderItems", "schema": "dbo",
            "columns": [
              {"name": "OrderItemId", "type": "int", "primaryKey": true},
              {"name": "OrderId", "type": "int", "references": {"table": "Orders", "column": "OrderId"}},
              {"name": "ProductId", "type": "int"},
              {"name": "Qty", "type": "int"},
              {"name": "UnitPrice", "type": "decimal(10,2)"}
            ]
          }
        ]
      }
    },
    hr: {
      label: "HR (Employees)",
      schema: {
        "tables": [
          {
            "name": "Departments", "schema": "hr",
            "columns": [
              {"name": "DepartmentId", "type": "int", "primaryKey": true},
              {"name": "Name", "type": "nvarchar(100)"},
              {"name": "ManagerId", "type": "int"}
            ]
          },
          {
            "name": "Employees", "schema": "hr",
            "columns": [
              {"name": "EmployeeId", "type": "int", "primaryKey": true},
              {"name": "FirstName", "type": "nvarchar(100)"},
              {"name": "LastName", "type": "nvarchar(100)"},
              {"name": "DepartmentId", "type": "int", "references": {"table": "Departments", "column": "DepartmentId"}},
              {"name": "HireDate", "type": "date"},
              {"name": "Salary", "type": "decimal(12,2)"}
            ]
          },
          {
            "name": "Projects", "schema": "hr",
            "columns": [
              {"name": "ProjectId", "type": "int", "primaryKey": true},
              {"name": "Name", "type": "nvarchar(200)"},
              {"name": "DepartmentId", "type": "int", "references": {"table": "Departments", "column": "DepartmentId"}},
              {"name": "StartDate", "type": "date"},
              {"name": "EndDate", "type": "date"}
            ]
          }
        ]
      }
    }
  },

  loadSample(key) {
    const entry = this.sampleSchemas[key];
    if (!entry) return;
    const jsonSchemaInput = this.container.querySelector("#json-schema-input");
    if (jsonSchemaInput) {
      jsonSchemaInput.value = JSON.stringify(entry.schema, null, 2);
    }
    this.applySchema(entry.schema);
  },

  loadFromJsonSchema() {
    const jsonSchemaInput = this.container.querySelector("#json-schema-input");
    const json = jsonSchemaInput?.value || '';

    if (!json.trim()) {
      alert('Please paste a JSON schema');
      return;
    }

    try {
      const data = JSON.parse(json);

      if (!data.tables || !Array.isArray(data.tables)) {
        alert('Invalid schema format. Expected: {"tables": [...]}');
        return;
      }

      if (data.tables.length === 0) {
        alert('No tables found in schema');
        return;
      }

      this.applySchema(data);

    } catch (error) {
      alert(`Error parsing JSON: ${error.message}`);
      console.error(error);
    }
  },

  applySchema(data) {
    this.schemaData = data;
    this.tables = [];
    this.joins = [];

    data.tables.forEach((table, index) => {
      const alias = this.generateAlias(table.name, index);
      this.addTable(table.name, alias, table.schema || 'dbo', table.columns);
    });

    const detected = this.detectFKJoins();

    if (detected > 0) {
      this.renderJoins();
      this.generateSQL();
    } else if (this.tables.length > 1) {
      this.addJoin();
    }
  },

  detectFKJoins() {
    const seen = new Set();
    let count = 0;

    // Pass 1: explicit `references` annotations in column definitions
    // rightTable = FK holder (gets the JOIN keyword), leftTable = referenced table (ON left side)
    this.tables.forEach(table => {
      if (!table.columns) return;
      table.columns.forEach(col => {
        if (!col.references) return;
        const refTable = this.tables.find(t => t.name === col.references.table);
        if (!refTable || refTable.name === table.name) return; // skip self-refs
        const key = `${refTable.name}.${col.references.column}→${table.name}.${col.name}`;
        if (seen.has(key)) return;
        seen.add(key);
        this.joins.push({
          leftTable: refTable.name,          // referenced table (PK side)
          leftColumn: col.references.column, // PK column
          rightTable: table.name,            // FK holder (the table being JOINed)
          rightColumn: col.name,             // FK column
          joinType: 'LEFT JOIN'
        });
        count++;
      });
    });

    // Pass 2: heuristic — column named XxxId where Xxx matches another table name
    if (count === 0) {
      this.tables.forEach(table => {
        if (!table.columns) return;
        table.columns.forEach(col => {
          if (col.primaryKey || !col.name.endsWith('Id')) return;
          const prefix = col.name.slice(0, -2);
          const refTable = this.tables.find(t =>
            t.name !== table.name && (
              t.name.toLowerCase() === prefix.toLowerCase() ||
              t.name.toLowerCase() === prefix.toLowerCase() + 's' ||
              t.name.toLowerCase() === prefix.toLowerCase() + 'es'
            )
          );
          if (!refTable) return;
          const pkCol = refTable.columns?.find(c => c.primaryKey)?.name
            || refTable.columns?.find(c => c.name.toLowerCase().endsWith('id'))?.name
            || prefix + 'Id';
          const key = `${refTable.name}.${pkCol}→${table.name}.${col.name}`;
          if (seen.has(key)) return;
          seen.add(key);
          this.joins.push({
            leftTable: refTable.name,
            leftColumn: pkCol,
            rightTable: table.name,
            rightColumn: col.name,
            joinType: 'LEFT JOIN'
          });
          count++;
        });
      });
    }

    return count;
  },

  generateAlias(tableName, index) {
    // Generate short alias from table name
    const words = tableName.match(/[A-Z][a-z]*/g) || [tableName];
    if (words.length > 1) {
      return words.map(w => w[0].toLowerCase()).join('');
    }
    return tableName.substring(0, 1).toLowerCase();
  },

  addTable(name = '', alias = '', schema = 'dbo', columns = []) {
    const table = { name, alias, schema, columns };
    this.tables.push(table);
    this.renderTables();
  },

  renderTables() {
    const tablesList = this.container.querySelector("#tables-list");
    if (!tablesList) return;

    tablesList.innerHTML = this.tables.map((table, index) => {
      const displayName = table.schema ? `${table.schema}.${table.name}` : table.name;
      const columnCount = table.columns?.length > 0 ? ` (${table.columns.length} columns)` : '';
      return `
      <div class="table-row">
        <div class="table-field">
          <label>Table Name${columnCount}</label>
          <input type="text" class="table-name" data-index="${index}" value="${table.name}" placeholder="TableName">
        </div>
        <div class="table-field">
          <label>Alias</label>
          <input type="text" class="table-alias" data-index="${index}" value="${table.alias}" placeholder="t">
        </div>
        <button class="remove-btn remove-table" data-index="${index}">Remove</button>
      </div>
    `;
    }).join('');

    // Attach event listeners
    tablesList.querySelectorAll('.table-name').forEach(input => {
      input.addEventListener('input', (e) => {
        this.tables[e.target.dataset.index].name = e.target.value;
        this.updateJoinSelects();
      });
    });

    tablesList.querySelectorAll('.table-alias').forEach(input => {
      input.addEventListener('input', (e) => {
        this.tables[e.target.dataset.index].alias = e.target.value;
      });
    });

    tablesList.querySelectorAll('.remove-table').forEach(btn => {
      btn.addEventListener('click', (e) => {
        this.removeTable(parseInt(e.target.dataset.index));
      });
    });

    this.updateJoinSelects();
    this.renderConditions();
  },

  removeTable(index) {
    this.tables.splice(index, 1);
    this.renderTables();
  },

  addJoin(leftTable = '', leftColumn = '', rightTable = '', rightColumn = '', joinType = 'INNER JOIN') {
    const join = { leftTable, leftColumn, rightTable, rightColumn, joinType };
    this.joins.push(join);
    this.renderJoins();
  },

  renderJoins() {
    const joinsList = this.container.querySelector("#joins-list");
    if (!joinsList) return;

    const tableOptions = this.tables.map(t => {
      const displayName = t.schema ? `${t.schema}.${t.name}` : t.name;
      return `<option value="${t.name}">${displayName}${t.alias ? ' (' + t.alias + ')' : ''}</option>`;
    }).join('');

    joinsList.innerHTML = this.joins.map((join, index) => {
      // Get column suggestions for selected tables
      const leftTable = this.tables.find(t => t.name === join.leftTable);
      const rightTable = this.tables.find(t => t.name === join.rightTable);

      const leftColumnOptions = leftTable?.columns
        ? leftTable.columns.map(c => `<option value="${c.name}">${c.name}</option>`).join('')
        : '';
      const rightColumnOptions = rightTable?.columns
        ? rightTable.columns.map(c => `<option value="${c.name}">${c.name}</option>`).join('')
        : '';

      const showLeftDatalist = leftColumnOptions.length > 0;
      const showRightDatalist = rightColumnOptions.length > 0;

      return `
      <div class="join-row">
        <div class="join-field">
          <label>Left Table</label>
          <select class="join-left-table" data-index="${index}">
            <option value="">Select table</option>
            ${tableOptions}
          </select>
        </div>
        <div class="join-field">
          <label>Join Type</label>
          <select class="join-type" data-index="${index}">
            <option value="INNER JOIN" ${join.joinType === 'INNER JOIN' ? 'selected' : ''}>INNER JOIN</option>
            <option value="LEFT JOIN" ${join.joinType === 'LEFT JOIN' ? 'selected' : ''}>LEFT JOIN</option>
            <option value="RIGHT JOIN" ${join.joinType === 'RIGHT JOIN' ? 'selected' : ''}>RIGHT JOIN</option>
            <option value="FULL OUTER JOIN" ${join.joinType === 'FULL OUTER JOIN' ? 'selected' : ''}>FULL OUTER JOIN</option>
            <option value="CROSS JOIN" ${join.joinType === 'CROSS JOIN' ? 'selected' : ''}>CROSS JOIN</option>
          </select>
        </div>
        <div class="join-field">
          <label>Right Table</label>
          <select class="join-right-table" data-index="${index}">
            <option value="">Select table</option>
            ${tableOptions}
          </select>
        </div>
        <div class="join-field">
          <label>ON Left.Column</label>
          ${showLeftDatalist ? `
            <input type="text" list="left-columns-${index}" class="join-left-column" data-index="${index}" value="${join.leftColumn}" placeholder="Id">
            <datalist id="left-columns-${index}">
              ${leftColumnOptions}
            </datalist>
          ` : `
            <input type="text" class="join-left-column" data-index="${index}" value="${join.leftColumn}" placeholder="Id">
          `}
        </div>
        <div class="join-field">
          <label>= Right.Column</label>
          ${showRightDatalist ? `
            <input type="text" list="right-columns-${index}" class="join-right-column" data-index="${index}" value="${join.rightColumn}" placeholder="UserId">
            <datalist id="right-columns-${index}">
              ${rightColumnOptions}
            </datalist>
          ` : `
            <input type="text" class="join-right-column" data-index="${index}" value="${join.rightColumn}" placeholder="UserId">
          `}
        </div>
        <button class="remove-btn remove-join" data-index="${index}">Remove</button>
      </div>
    `;
    }).join('');

    // Set selected values
    this.joins.forEach((join, index) => {
      const leftSelect = joinsList.querySelector(`.join-left-table[data-index="${index}"]`);
      const rightSelect = joinsList.querySelector(`.join-right-table[data-index="${index}"]`);
      if (leftSelect) leftSelect.value = join.leftTable;
      if (rightSelect) rightSelect.value = join.rightTable;
    });

    // Attach event listeners
    joinsList.querySelectorAll('.join-left-table').forEach(select => {
      select.addEventListener('change', (e) => {
        const idx = e.target.dataset.index;
        this.joins[idx].leftTable = e.target.value;
        const inferred = this.inferJoinColumns(this.joins[idx]);
        if (inferred) {
          this.joins[idx].leftColumn = inferred.leftColumn;
          this.joins[idx].rightColumn = inferred.rightColumn;
        }
        this.renderJoins();
      });
    });

    joinsList.querySelectorAll('.join-right-table').forEach(select => {
      select.addEventListener('change', (e) => {
        const idx = e.target.dataset.index;
        this.joins[idx].rightTable = e.target.value;
        const inferred = this.inferJoinColumns(this.joins[idx]);
        if (inferred) {
          this.joins[idx].leftColumn = inferred.leftColumn;
          this.joins[idx].rightColumn = inferred.rightColumn;
        }
        this.renderJoins();
      });
    });

    joinsList.querySelectorAll('.join-type').forEach(select => {
      select.addEventListener('change', (e) => {
        this.joins[e.target.dataset.index].joinType = e.target.value;
      });
    });

    joinsList.querySelectorAll('.join-left-column').forEach(input => {
      input.addEventListener('input', (e) => {
        this.joins[e.target.dataset.index].leftColumn = e.target.value;
      });
    });

    joinsList.querySelectorAll('.join-right-column').forEach(input => {
      input.addEventListener('input', (e) => {
        this.joins[e.target.dataset.index].rightColumn = e.target.value;
      });
    });

    joinsList.querySelectorAll('.remove-join').forEach(btn => {
      btn.addEventListener('click', (e) => {
        this.removeJoin(parseInt(e.target.dataset.index));
      });
    });
  },

  inferJoinColumns(join) {
    const lt = this.tables.find(t => t.name === join.leftTable);
    const rt = this.tables.find(t => t.name === join.rightTable);
    if (!lt || !rt) return null;

    // Explicit references: right table's FK → left table
    for (const col of rt.columns || []) {
      if (col.references?.table === lt.name)
        return { leftColumn: col.references.column, rightColumn: col.name };
    }
    // Explicit references: left table's FK → right table
    for (const col of lt.columns || []) {
      if (col.references?.table === rt.name)
        return { leftColumn: col.name, rightColumn: col.references.column };
    }

    // Heuristic: right table has XxxId matching left table name
    for (const col of rt.columns || []) {
      if (col.primaryKey || !col.name.endsWith('Id')) continue;
      const prefix = col.name.slice(0, -2);
      if (lt.name.toLowerCase() === prefix.toLowerCase() ||
          lt.name.toLowerCase() === prefix.toLowerCase() + 's') {
        const pkCol = lt.columns?.find(c => c.primaryKey)?.name || prefix + 'Id';
        return { leftColumn: pkCol, rightColumn: col.name };
      }
    }
    // Heuristic: left table has XxxId matching right table name
    for (const col of lt.columns || []) {
      if (col.primaryKey || !col.name.endsWith('Id')) continue;
      const prefix = col.name.slice(0, -2);
      if (rt.name.toLowerCase() === prefix.toLowerCase() ||
          rt.name.toLowerCase() === prefix.toLowerCase() + 's') {
        const pkCol = rt.columns?.find(c => c.primaryKey)?.name || prefix + 'Id';
        return { leftColumn: col.name, rightColumn: pkCol };
      }
    }

    return null;
  },

  removeJoin(index) {
    this.joins.splice(index, 1);
    this.renderJoins();
  },

  updateJoinSelects() {
    this.renderJoins();
  },

  addCondition() {
    this.conditions.push({ connector: 'AND', table: '', column: '', operator: '=', value: '', value2: '' });
    this.renderConditions();
  },

  removeCondition(index) {
    this.conditions.splice(index, 1);
    this.renderConditions();
  },

  renderConditions() {
    const list = this.container.querySelector('#conditions-list');
    if (!list) return;

    const tableOptions = this.tables.map(t =>
      `<option value="${t.name}">${t.schema ? t.schema + '.' : ''}${t.name}${t.alias ? ' (' + t.alias + ')' : ''}</option>`
    ).join('');

    const noValueOps = new Set(['IS NULL', 'IS NOT NULL']);
    const twoValueOps = new Set(['BETWEEN']);

    list.innerHTML = this.conditions.map((cond, i) => {
      const colTable = this.tables.find(t => t.name === cond.table);
      const colOptions = colTable?.columns
        ? colTable.columns.map(c => `<option value="${c.name}">${c.name}</option>`).join('')
        : '';
      const hideValue = noValueOps.has(cond.operator);
      const showBetween = twoValueOps.has(cond.operator);
      const alias = colTable?.alias || cond.table;
      const colPlaceholder = alias ? `${alias}.column` : 'column';

      const connectorField = i === 0 ? '' : `
        <div class="condition-field">
          <label>Connector</label>
          <select class="cond-connector" data-index="${i}">
            <option value="AND" ${cond.connector === 'AND' ? 'selected' : ''}>AND</option>
            <option value="OR" ${cond.connector === 'OR' ? 'selected' : ''}>OR</option>
          </select>
        </div>`;

      return `
        <div class="condition-row${i === 0 ? ' first-condition' : ''}">
          ${connectorField}
          <div class="condition-field">
            <label>Table</label>
            <select class="cond-table" data-index="${i}">
              <option value="">Select table</option>
              ${tableOptions}
            </select>
          </div>
          <div class="condition-field">
            <label>Column</label>
            ${colOptions ? `
              <input type="text" list="cond-cols-${i}" class="cond-column" data-index="${i}" value="${cond.column}" placeholder="${colPlaceholder}">
              <datalist id="cond-cols-${i}">${colOptions}</datalist>
            ` : `
              <input type="text" class="cond-column" data-index="${i}" value="${cond.column}" placeholder="${colPlaceholder}">
            `}
          </div>
          <div class="condition-field">
            <label>Operator</label>
            <select class="cond-operator" data-index="${i}">
              ${['=','!=','<','>','<=','>=','LIKE','NOT LIKE','IN','NOT IN','IS NULL','IS NOT NULL','BETWEEN']
                .map(op => `<option value="${op}" ${cond.operator === op ? 'selected' : ''}>${op}</option>`).join('')}
            </select>
          </div>
          <div class="condition-field" ${hideValue ? 'style="visibility:hidden"' : ''}>
            <label>${showBetween ? 'From' : 'Value'}</label>
            <input type="text" class="cond-value" data-index="${i}" value="${cond.value}" placeholder="${cond.operator === 'IN' || cond.operator === 'NOT IN' ? "1, 2, 3" : "'value'"}">
            ${showBetween ? `<input type="text" class="cond-value2" data-index="${i}" value="${cond.value2}" placeholder="'to'" style="margin-top:4px">` : ''}
          </div>
          <button class="remove-btn remove-condition" data-index="${i}">Remove</button>
        </div>`;
    }).join('');

    // Set selected table values
    this.conditions.forEach((cond, i) => {
      const sel = list.querySelector(`.cond-table[data-index="${i}"]`);
      if (sel) sel.value = cond.table;
    });

    list.querySelectorAll('.cond-connector').forEach(el =>
      el.addEventListener('change', e => { this.conditions[e.target.dataset.index].connector = e.target.value; }));

    list.querySelectorAll('.cond-table').forEach(el =>
      el.addEventListener('change', e => {
        this.conditions[e.target.dataset.index].table = e.target.value;
        this.conditions[e.target.dataset.index].column = '';
        this.renderConditions();
      }));

    list.querySelectorAll('.cond-column').forEach(el =>
      el.addEventListener('input', e => { this.conditions[e.target.dataset.index].column = e.target.value; }));

    list.querySelectorAll('.cond-operator').forEach(el =>
      el.addEventListener('change', e => {
        this.conditions[e.target.dataset.index].operator = e.target.value;
        this.renderConditions();
      }));

    list.querySelectorAll('.cond-value').forEach(el =>
      el.addEventListener('input', e => { this.conditions[e.target.dataset.index].value = e.target.value; }));

    list.querySelectorAll('.cond-value2').forEach(el =>
      el.addEventListener('input', e => { this.conditions[e.target.dataset.index].value2 = e.target.value; }));

    list.querySelectorAll('.remove-condition').forEach(el =>
      el.addEventListener('click', e => { this.removeCondition(parseInt(e.target.dataset.index)); }));
  },

  generateSQL() {
    if (this.tables.length === 0) {
      alert('Please add at least one table');
      return;
    }

    const selectMode = this.container.querySelector("#select-mode")?.value || 'all';
    const columnList = this.container.querySelector("#column-list")?.value || '';

    let sql = 'SELECT\n    ';

    // SELECT clause
    if (selectMode === 'all') {
      sql += '*';
    } else if (selectMode === 'table-prefix') {
      sql += this.tables.map(t => {
        const alias = t.alias || t.name;
        return `${alias}.*`;
      }).join(',\n    ');
    } else if (selectMode === 'explicit') {
      sql += columnList || '*';
    }

    sql += '\nFROM\n';

    // FROM clause - first table
    const firstTable = this.tables[0];
    const firstTableName = firstTable.schema ? `[${firstTable.schema}].[${firstTable.name}]` : firstTable.name;
    sql += `    ${firstTableName}`;
    if (firstTable.alias) {
      sql += ` ${firstTable.alias}`;
    }
    sql += '\n';

    // JOIN clauses
    this.joins.forEach(join => {
      if (!join.leftTable || !join.rightTable) return;

      const leftTable = this.tables.find(t => t.name === join.leftTable);
      const rightTable = this.tables.find(t => t.name === join.rightTable);

      const leftAlias = leftTable?.alias || join.leftTable;
      const rightAlias = rightTable?.alias || join.rightTable;

      // Format right table name with schema if available
      const rightTableName = rightTable?.schema
        ? `[${rightTable.schema}].[${rightTable.name}]`
        : join.rightTable;

      sql += `    ${join.joinType} ${rightTableName}`;
      if (rightAlias !== join.rightTable) {
        sql += ` ${rightAlias}`;
      }

      if (join.joinType !== 'CROSS JOIN') {
        sql += ` ON ${leftAlias}.[${join.leftColumn}] = ${rightAlias}.[${join.rightColumn}]`;
      }

      sql += '\n';
    });

    // WHERE clause
    const validConditions = this.conditions.filter(c => c.column);
    if (validConditions.length > 0) {
      sql += 'WHERE\n';
      validConditions.forEach((cond, i) => {
        const t = this.tables.find(t => t.name === cond.table);
        const qualifier = t?.alias || cond.table;
        const colRef = qualifier ? `${qualifier}.[${cond.column}]` : `[${cond.column}]`;
        const noValue = cond.operator === 'IS NULL' || cond.operator === 'IS NOT NULL';
        const isBetween = cond.operator === 'BETWEEN';
        const isIn = cond.operator === 'IN' || cond.operator === 'NOT IN';

        let expr;
        if (noValue) {
          expr = `${colRef} ${cond.operator}`;
        } else if (isBetween) {
          expr = `${colRef} BETWEEN ${cond.value} AND ${cond.value2 || "'?'"}`;
        } else if (isIn) {
          expr = `${colRef} ${cond.operator} (${cond.value})`;
        } else {
          expr = `${colRef} ${cond.operator} ${cond.value}`;
        }

        const prefix = i === 0 ? '    ' : `    ${cond.connector} `;
        sql += `${prefix}${expr}\n`;
      });
    }

    sql += ';';

    this.context.setOutput(sql);
  },

  copyOutput() {
    const output = this.context.getOutput();
    if (output) {
      copyToClipboard(output, {
        onSuccess: () => {
          const copyBtn = this.container.querySelector("#copy-btn");
          const originalText = copyBtn.textContent;
          copyBtn.textContent = "✓ Copied!";
          setTimeout(() => {
            copyBtn.textContent = originalText;
          }, 2000);
        }
      });
    }
  },

  reset() {
    this.tables = [];
    this.joins = [];
    this.conditions = [];
    this.context.setOutput('');
    this.addTable('Users', 'u');
    this.addTable('Orders', 'o');
    this.addJoin();
    this.renderConditions();
    const jsonSchemaInput = this.container.querySelector("#json-schema-input");
    if (jsonSchemaInput) jsonSchemaInput.value = '';
  },

  onInput(input, context) {
    return { output: "" };
  }
};

// Standalone mode initialization
if (typeof window !== 'undefined' && !window.DevChef) {
  document.addEventListener('DOMContentLoaded', () => {
    const isStandalone = !document.querySelector('#workspace');

    if (isStandalone) {
      const standaloneContext = {
        input: "",
        output: "",
        setInput(val) { this.input = val; },
        setOutput(val) {
          this.output = val;
          const outputEl = document.querySelector("#output");
          if (outputEl) outputEl.value = val;
        },
        getInput() { return this.input; },
        getOutput() { return this.output; }
      };

      const template = document.querySelector('#tool-ui');
      if (template) {
        document.body.innerHTML = template.innerHTML;
        DevChefTool.init(document.body, standaloneContext);
      }
    }
  });
}
</script>

</body>
