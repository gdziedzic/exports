<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Builder - DevChef Tool</title>
</head>
<body>

<!-- DevChef Manifest -->
<script type="devchef-manifest">
{
  "id": "ai-prompt-builder",
  "name": "AI Prompt Builder",
  "category": "Developer Tools",
  "description": "Compose structured AI prompts with personas, tech stacks, and templates",
  "keywords": ["ai", "prompt", "llm", "chatgpt", "claude", "composer", "rules", "personas", "templates", "sharing"],
  "version": "10.0.0"
}
</script>

<!-- Tool UI Template -->
<template id="tool-ui">
  <div class="tool-container">
    <div class="tool-header">
      <h2 class="tool-title">AI Prompt Builder</h2>
      <p class="tool-description">Compose structured prompts with selectable personas and tech stack awareness</p>
    </div>

    <div class="intent-starter">
      <div class="intent-starter-header">
        <h3>Intent Starter</h3>
        <div class="intent-header-actions">
          <button id="intent-paste-btn" class="secondary" type="button" title="Paste from clipboard (Alt+V)">Paste</button>
          <button id="intent-clear-btn" class="secondary" type="button" title="Clear intent (Alt+Backspace)">Clear</button>
          <button id="intent-refine-toggle" class="secondary" type="button" title="Toggle refine (Alt+R)">Refine options</button>
        </div>
      </div>
      <div class="intent-mode-group" id="intent-mode-group">
        <button type="button" class="intent-mode-btn intent-primary-mode-btn" data-intent-mode="create">Create</button>
        <button type="button" class="intent-mode-btn intent-primary-mode-btn" data-intent-mode="analyze">Analyze</button>
        <button type="button" class="intent-mode-btn intent-primary-mode-btn" data-intent-mode="rewrite">Rewrite</button>
        <button type="button" class="intent-mode-btn intent-primary-mode-btn" data-intent-mode="plan">Plan</button>
      </div>
      <div class="intent-workflow-group" id="intent-workflow-group">
        <button type="button" class="intent-mode-btn" data-workflow-profile="rapid">Rapid</button>
        <button type="button" class="intent-mode-btn" data-workflow-profile="balanced">Balanced</button>
        <button type="button" class="intent-mode-btn" data-workflow-profile="deep">Deep</button>
      </div>
      <div class="intent-fields">
        <div class="intent-field">
          <label for="intent-goal">Goal</label>
          <textarea id="intent-goal" rows="2" placeholder="What outcome do you want?"></textarea>
        </div>
        <div class="intent-field">
          <label for="intent-input">Input / Context</label>
          <textarea id="intent-input" rows="2" placeholder="Paste context, draft text, notes, links, or data"></textarea>
        </div>
        <div class="intent-field">
          <label for="intent-output-options">Output format</label>
          <div class="intent-output-grid" id="intent-output-options">
            <button type="button" class="intent-mode-btn" data-intent-output="bullets">Bullet List</button>
            <button type="button" class="intent-mode-btn" data-intent-output="checklist">Checklist</button>
            <button type="button" class="intent-mode-btn" data-intent-output="table">Table</button>
            <button type="button" class="intent-mode-btn" data-intent-output="summary">Executive Summary</button>
            <button type="button" class="intent-mode-btn" data-intent-output="steps">Step-by-step Plan</button>
            <button type="button" class="intent-mode-btn" data-intent-output="json">Structured JSON</button>
          </div>
        </div>
      </div>
      <div class="intent-status" id="intent-status-chips"></div>
    </div>

    <div class="tool-layout">
      <!-- Left Panel: Components -->
      <div class="components-panel">
        <div class="panel-header">
          <h3>Prompt Components</h3>
          <div class="panel-actions">
            <button id="import-config-btn" class="icon-btn" title="Import Configuration">📥</button>
            <button id="export-config-btn" class="icon-btn" title="Export Configuration">📤</button>
            <button id="reset-config-btn" class="icon-btn" title="Reset to Default">🔄</button>
          </div>
        </div>

        <!-- Quick Actions Toolbar -->
        <div class="quick-actions-toolbar">
          <button id="enable-all-btn" class="quick-action-btn" title="Enable All (Ctrl+A)">✓ All</button>
          <button id="disable-all-btn" class="quick-action-btn" title="Disable All (Ctrl+D)">✗ None</button>
          <button id="invert-selection-btn" class="quick-action-btn" title="Invert Selection (Ctrl+I)">⇄ Invert</button>
          <div class="quick-action-divider"></div>
          <span class="quick-action-hint">💡 Click header to toggle • 1-9 keys • Space • ↑↓ navigate • Esc to close</span>
        </div>

        <div id="components-list" class="components-list">
          <!-- Components will be rendered here -->
        </div>

        <div class="add-component-section">
          <input type="text" id="new-component-name" placeholder="New component name..." />
          <button id="add-component-btn">+ Add Component</button>
        </div>
      </div>

      <!-- Right Panel: Preview & Export -->
      <div class="preview-panel">
        <div class="panel-header">
          <h3>Final Prompt</h3>
          <div class="panel-actions">
            <button id="share-btn" class="secondary" title="Share Configuration">🔗 Share</button>
            <button id="copy-prompt-btn" class="primary">📋 Copy</button>
            <button id="save-prompt-btn" class="secondary">💾 Save</button>
          </div>
        </div>

        <div class="preview-area">
          <textarea id="final-prompt" readonly placeholder="Your composed prompt will appear here..."></textarea>
        </div>

        <div class="stats-bar">
          <span id="char-count">0 characters</span>
          <span id="word-count">0 words</span>
        </div>

        <div class="templates-section">
          <div class="section-header collapsible" id="templates-header">
            <label class="section-label">Templates</label>
            <div class="template-actions">
              <button id="save-template-btn" class="icon-btn" title="Save as Template">💾</button>
              <button class="collapse-btn">▼</button>
            </div>
          </div>
          <div class="templates-content" id="templates-content">
            <div class="template-filter">
              <input type="text" id="template-search" placeholder="Search templates..." />
              <select id="template-category" class="category-select">
                <option value="">All Categories</option>
                <option value="development">Development</option>
                <option value="writing">Writing</option>
                <option value="analysis">Analysis</option>
                <option value="documentation">Documentation</option>
                <option value="custom">Custom</option>
              </select>
            </div>
            <div class="templates-grid" id="templates-grid">
              <!-- Templates will be rendered here -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <input type="file" id="file-input" accept=".json" style="display: none;">
    <div id="status-message" class="status-message"></div>

    <!-- Persona Selection Modal -->
    <div id="persona-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Select a Persona</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="personas-grid" id="personas-grid">
            <!-- Personas will be rendered here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Tech Stack Selection Modal -->
    <div id="techstack-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Select Technology Stack</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="techstack-search">
            <input type="text" id="techstack-search" placeholder="Search technologies..." />
          </div>
          <div class="techstack-grid" id="techstack-grid">
            <!-- Tech stacks will be rendered here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Share Configuration</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="share-section">
            <label class="share-label">Shareable Link</label>
            <div class="share-input-group">
              <input type="text" id="share-link" readonly class="share-link-input" />
              <button id="copy-link-btn" class="primary">📋 Copy</button>
            </div>
            <p class="share-hint">Share this link with others to import your configuration</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Save Template Modal -->
    <div id="save-template-modal" class="modal">
      <div class="modal-content modal-small">
        <div class="modal-header">
          <h3>Save as Template</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Template Name</label>
            <input type="text" id="template-name" placeholder="e.g., My Custom Template" class="form-input" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="template-description" placeholder="Brief description of this template..." class="form-input" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="template-category-select" class="form-input">
              <option value="custom">Custom</option>
              <option value="development">Development</option>
              <option value="writing">Writing</option>
              <option value="analysis">Analysis</option>
              <option value="documentation">Documentation</option>
            </select>
          </div>
          <div class="modal-actions">
            <button id="save-template-confirm-btn" class="primary">💾 Save Template</button>
            <button class="secondary modal-close">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- Tool Styles -->
<style>
  /* ========================================
     Global Performance Optimizations
     ======================================== */

  * {
    /* Smooth scrolling for better UX */
    scroll-behavior: smooth;
  }

  /* Use hardware acceleration for better performance */
  .component-item,
  .modal,
  .quick-action-btn,
  .icon-btn {
    will-change: transform;
    transform: translateZ(0);
    backface-visibility: hidden;
  }

  /* Optimize text rendering */
  .tool-container {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Subtle pulse animation for loading states */
  @keyframes pulse {
    0%, 100% {
      opacity: 1;
    }
    50% {
      opacity: 0.7;
    }
  }

  .updating {
    animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  .intent-starter {
    margin-top: 14px;
    padding: 14px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background: linear-gradient(160deg, var(--bg-secondary), color-mix(in srgb, var(--bg-secondary) 88%, var(--accent) 12%));
  }

  .intent-starter-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .intent-header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .intent-header-actions button {
    margin: 0;
    padding: 6px 10px;
    font-size: 11px;
    border-radius: var(--radius-lg);
  }

  .intent-starter-header h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 700;
  }

  .intent-mode-group {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 10px;
    padding: 10px;
    border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border-color) 65%);
    border-radius: 12px;
    background: color-mix(in srgb, var(--accent) 14%, var(--bg-primary) 86%);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
    position: relative;
  }

  .intent-mode-group .intent-primary-mode-btn {
    min-height: 42px;
    font-size: 13px;
    letter-spacing: 0.01em;
    border-width: 1.5px;
    background: linear-gradient(
      160deg,
      color-mix(in srgb, var(--bg-primary) 88%, var(--accent) 12%),
      color-mix(in srgb, var(--bg-primary) 78%, var(--accent) 22%)
    );
    box-shadow: 0 6px 16px color-mix(in srgb, var(--accent) 16%, transparent);
  }

  .intent-mode-group .intent-primary-mode-btn:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 10px 22px color-mix(in srgb, var(--accent) 24%, transparent);
  }

  .intent-mode-group .intent-primary-mode-btn.active {
    background: linear-gradient(155deg, var(--accent), color-mix(in srgb, var(--accent) 78%, black));
    color: white;
    border-color: color-mix(in srgb, var(--accent) 72%, black);
    box-shadow:
      0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent),
      0 14px 24px color-mix(in srgb, var(--accent) 34%, transparent);
  }

  .intent-workflow-group {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 10px;
  }

  .intent-workflow-group .intent-mode-btn {
    border-radius: 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 7px 8px;
  }

  .intent-mode-group::before {
    content: "Start here";
    position: absolute;
    top: -10px;
    left: 12px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent);
    color: white;
  }

  .intent-mode-btn {
    border: 1px solid var(--border-color);
    background: var(--bg-primary);
    color: var(--text-primary);
    border-radius: 999px;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition-fast);
  }

  .intent-mode-btn:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .intent-mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 24%, transparent);
  }

  .intent-mode-group .intent-mode-btn:not(.active) {
    animation: intent-nudge 2.4s ease-in-out infinite;
  }

  @keyframes intent-nudge {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-1px); }
  }

  .intent-fields {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .intent-output-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .intent-status {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .intent-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--border-color) 76%);
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 11px;
    color: var(--text-secondary);
    background: color-mix(in srgb, var(--bg-primary) 84%, var(--accent) 16%);
  }

  .intent-chip strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  .intent-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .intent-field label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .intent-field textarea,
  .intent-field input {
    width: 100%;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 8px 10px;
    font-size: 12px;
    transition: var(--transition-fast);
  }

  .intent-field textarea {
    resize: vertical;
    min-height: 56px;
    line-height: 1.45;
  }

  .intent-field textarea:focus,
  .intent-field input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
  }

  .tool-container[data-intent-refine="closed"] .quick-actions-toolbar,
  .tool-container[data-intent-refine="closed"] .add-component-section {
    display: none;
  }

  .tool-container[data-intent-mode="rewrite"] .component-item[data-id="tech-stack"],
  .tool-container[data-intent-mode="rewrite"] .component-item[data-id="constraints"],
  .tool-container[data-intent-mode="analyze"] .component-item[data-id="tech-stack"] {
    display: none;
  }

  .tool-layout {
    display: grid;
    grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
    gap: 20px;
    margin-top: 20px;
  }

  .components-panel,
  .preview-panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .components-panel {
    max-height: calc(100vh - 250px);
  }

  .preview-panel {
    min-height: 640px;
    overflow: visible;
  }

  .panel-header {
    padding: 16px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-primary);
  }

  .panel-header h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .panel-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    transition: background var(--transition-normal),
                border-color var(--transition-normal),
                transform var(--transition-fast);
  }

  .icon-btn:hover {
    background: var(--bg-secondary);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .icon-btn:active {
    transform: translateY(0);
  }

  /* Quick Actions Toolbar */
  .quick-actions-toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border-color);
    font-size: 12px;
  }

  .quick-action-btn {
    padding: 4px 10px;
    border: 1px solid var(--border-color);
    background: var(--bg-secondary);
    color: var(--text-primary);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    transition: all var(--transition-fast);
  }

  .quick-action-btn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .quick-action-divider {
    width: 1px;
    height: 16px;
    background: var(--border-color);
    margin: 0 4px;
  }

  .quick-action-hint {
    font-size: 11px;
    color: var(--text-secondary);
    margin-left: auto;
    font-style: italic;
  }

  .components-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    /* Enable smooth momentum scrolling on iOS */
    -webkit-overflow-scrolling: touch;
    /* Better scroll performance */
    scroll-behavior: smooth;
  }

  .component-item {
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color var(--transition-normal),
                box-shadow var(--transition-normal),
                transform var(--transition-fast);
    position: relative;
  }

  .component-item::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: var(--radius-sm);
    opacity: 0;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    transition: opacity var(--transition-normal);
    pointer-events: none;
  }

  .component-item.active {
    border-color: var(--accent);
    box-shadow: var(--shadow-lg);
  }

  .component-item.active::after {
    opacity: 1;
  }

  .component-item.active .component-header {
    background: color-mix(in srgb, var(--accent) 12%, transparent);
  }

  .component-item.has-options {
    border-left: 3px solid var(--accent);
  }

  .component-item.focused {
    box-shadow: 0 0 0 2px var(--accent), 0 4px 12px rgba(0,0,0,0.1);
    transform: translateY(-1px);
  }

  .component-item.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 35%, transparent);
  }

  .component-item.active.selected::after {
    background: color-mix(in srgb, var(--accent) 20%, transparent);
  }

  .component-item:hover {
    border-color: var(--accent);
    transform: translateX(2px);
  }

  .component-header {
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-secondary);
    cursor: pointer;
    user-select: none;
    flex-wrap: wrap;
  }

  .component-header:hover {
    background: var(--bg-hover);
  }

  .component-toggle {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border-color);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: all var(--transition-normal);
    background: var(--bg-secondary);
  }

  .component-toggle.checked {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 3px 10px color-mix(in srgb, var(--accent) 35%, transparent);
  }

  .component-toggle.checked::after {
    content: '✓';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #071027;
    text-shadow: 0 1px 2px rgba(255, 255, 255, 0.65);
    font-size: 12px;
    font-weight: bold;
  }

  .component-name {
    flex: 1;
    font-weight: 500;
    font-size: 14px;
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .component-name-text {
    font-weight: 500;
  }

  .component-preview {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 400;
    opacity: 0.7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }

  .component-item:not(.active) .component-preview {
    opacity: 0.5;
  }

  .component-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 3px;
    background: var(--bg-hover);
    color: var(--text-secondary);
    font-size: 10px;
    font-weight: 600;
    margin-right: 2px;
  }

  .component-item.active .component-number {
    background: var(--accent);
    color: white;
  }

  .component-badge {
    font-size: 11px;
    padding: 2px 8px;
    background: color-mix(in srgb, var(--accent) 15%, transparent);

  /**
   * Request animation frame wrapper for smooth DOM updates
   */
  function rafDebounce(func) {
    let rafId = null;
    return function executedFunction(...args) {
      if (rafId) {
        cancelAnimationFrame(rafId);
      }
      rafId = requestAnimationFrame(() => {
        func(...args);
        rafId = null;
      });
    };
  }

    { id: 'json', label: 'structured JSON' }

  const DEFAULT_OUTPUT_BY_MODE = {
    create: 'steps',
    analyze: 'summary',
    rewrite: 'bullets',
    plan: 'checklist'
  };
  const WORKFLOW_PROFILES = ['rapid', 'balanced', 'deep'];
  const CORE_COMPONENT_IDS = ['role', 'tech-stack', 'context', 'task', 'rules', 'output-format', 'constraints', 'examples'];
  const WORKFLOW_COMPONENTS = {
    rapid: new Set(['role', 'task', 'output-format']),
    balanced: new Set(['role', 'context', 'task', 'rules', 'output-format']),
    deep: new Set(CORE_COMPONENT_IDS)
  };

  function clearIntentFields() {
    state.intentGoal = '';
    state.intentInput = '';
    state.intentOutput = DEFAULT_OUTPUT_BY_MODE[state.intentMode] || 'steps';
    renderIntentControls();
    updatePreview();
    saveConfig();
    showStatus('Intent cleared', 'info');
  }

  async function pasteIntentContext() {
    try {
      const text = await navigator.clipboard.readText();
      if (!text) {
        showStatus('Clipboard is empty', 'info');
        return;
      }
      state.intentInput = text;
      renderIntentControls();
      updatePreview();
      saveConfig();
      showStatus('Clipboard pasted into Input/Context', 'success');
    } catch (error) {
      showStatus('Clipboard access denied', 'error');
    }
  }

  function normalizeComponents() {
    if (!state.config || !Array.isArray(state.config.components)) {
      state.config = deepClone(DEFAULT_CONFIG);
    }

    state.config.components.forEach((component, index) => {
      if (typeof component.order !== 'number') {
        component.order = index + 1;
      }

      if (component.id === 'role') {
        component.hasOptions = true;
        component.selectedPersona = resolvePersonaSelection(component);
      } else if (component.id === 'tech-stack') {
        component.hasOptions = true;
        component.selectedStacks = component.selectedStacks || [];
      } else {
        const presets = COMPONENT_PRESETS[component.id] || [];
        if (presets.length) {
          component.hasOptions = true;
          component.selectedPreset = resolvePresetSelection(component, presets);
        }
      }
    });
  }

  function ensureIntentState() {
    if (!INTENT_MODES.includes(state.intentMode)) state.intentMode = 'create';
    if (!WORKFLOW_PROFILES.includes(state.workflowProfile)) state.workflowProfile = 'balanced';
    if (typeof state.intentGoal !== 'string') state.intentGoal = '';
    if (typeof state.intentInput !== 'string') state.intentInput = '';
    if (!INTENT_OUTPUT_OPTIONS.some((option) => option.id === state.intentOutput)) {
      state.intentOutput = DEFAULT_OUTPUT_BY_MODE[state.intentMode];
    }
    state.showRefine = Boolean(state.showRefine);
  }

  function getIntentOutputLabel() {
    const selected = INTENT_OUTPUT_OPTIONS.find((option) => option.id === state.intentOutput);
    return selected?.label || state.intentOutput;
  }

  function applyWorkflowProfile(profile, options = {}) {
    const { silent = false } = options;
    if (!WORKFLOW_PROFILES.includes(profile)) return;

    state.workflowProfile = profile;
    state.showRefine = profile !== 'rapid';

    const enabledCoreComponents = WORKFLOW_COMPONENTS[profile] || WORKFLOW_COMPONENTS.balanced;
    if (state.config?.components?.length) {
      state.config.components.forEach((component) => {
        if (CORE_COMPONENT_IDS.includes(component.id)) {
          component.enabled = enabledCoreComponents.has(component.id);
        }
      });
    }

    renderComponents();
    renderIntentControls();
    updatePreview();
    saveConfig();
    if (!silent) {
      showStatus(`Workflow: ${profile}`, 'success');
    }
  }

  function renderIntentControls() {
    ensureIntentState();
    const container = document.querySelector('.tool-container');
    if (container) {
      container.dataset.intentMode = state.intentMode;
      container.dataset.intentRefine = state.showRefine ? 'open' : 'closed';

    document.querySelectorAll('.intent-mode-btn').forEach((button) => {
      button.classList.toggle('active', button.dataset.intentMode === state.intentMode);

    document.querySelectorAll('[data-workflow-profile]').forEach((button) => {

    const goalInput = document.getElementById('intent-goal');

    const inputArea = document.getElementById('intent-input');
    if (inputArea) inputArea.value = state.intentInput;

    document.querySelectorAll('[data-intent-output]').forEach((button) => {
      button.classList.toggle('active', button.dataset.intentOutput === state.intentOutput);
    });

    const refineToggle = document.getElementById('intent-refine-toggle');

    const intentModeGroup = document.getElementById('intent-mode-group');
    if (intentModeGroup) {
      intentModeGroup.addEventListener('click', (e) => {

        const button = e.target.closest('[data-workflow-profile]');
        if (!button) return;
        applyWorkflowProfile(button.dataset.workflowProfile);
      });
    }

    const intentOutputOptions = document.getElementById('intent-output-options');
    if (intentOutputOptions) {
      intentOutputOptions.addEventListener('click', (e) => {
        const button = e.target.closest('[data-intent-output]');
        if (!button) return;
        state.intentOutput = button.dataset.intentOutput;
        renderIntentControls();
        updatePreview();
        saveConfig();
      });
    }

    const refineToggle = document.getElementById('intent-refine-toggle');
    if (refineToggle) {
      refineToggle.addEventListener('click', () => {
        state.showRefine = !state.showRefine;
        renderIntentControls();
        saveConfig();
      });
    }

    const pasteIntentBtn = document.getElementById('intent-paste-btn');
    if (pasteIntentBtn) {
      pasteIntentBtn.addEventListener('click', () => {
        pasteIntentContext();
      });
    }

    const clearIntentBtn = document.getElementById('intent-clear-btn');
    if (clearIntentBtn) {
      clearIntentBtn.addEventListener('click', () => {
        clearIntentFields();
      });
    }

    ['intent-goal', 'intent-input'].forEach((id) => {
      const input = document.getElementById(id);
      if (!input) return;
      input.addEventListener('input', (e) => {
        if (id === 'intent-goal') state.intentGoal = e.target.value;
        if (id === 'intent-input') state.intentInput = e.target.value;
        updatePreview();
        debouncedSaveConfig();
      });
    });

    document.addEventListener('keydown', (e) => {
      if (!e.altKey || e.ctrlKey || e.metaKey) return;
      const targetTag = e.target?.tagName;
      const isTypingField = targetTag === 'INPUT' || targetTag === 'TEXTAREA' || targetTag === 'SELECT';

      if (e.key >= '1' && e.key <= '4') {
        e.preventDefault();
        const modeByIndex = ['create', 'analyze', 'rewrite', 'plan'];
        state.intentMode = modeByIndex[Number(e.key) - 1] || state.intentMode;
        state.intentOutput = DEFAULT_OUTPUT_BY_MODE[state.intentMode] || state.intentOutput;
        renderIntentControls();
        updatePreview();
        saveConfig();
        return;
      }

      if (e.key >= '5' && e.key <= '7') {
        e.preventDefault();
        const profileByIndex = ['rapid', 'balanced', 'deep'];
        const profile = profileByIndex[Number(e.key) - 5];
        if (profile) applyWorkflowProfile(profile);
        return;
      }

      if (e.key.toLowerCase() === 'r') {
        e.preventDefault();
        state.showRefine = !state.showRefine;
        renderIntentControls();
        saveConfig();
        return;
      }

      if (e.key.toLowerCase() === 'v') {
        e.preventDefault();
        pasteIntentContext();
        return;
      }

      if (e.key === 'Backspace' && !isTypingField) {
        e.preventDefault();
        clearIntentFields();
      }
    });

    document.querySelectorAll('.modal').forEach(modal => {

  function showPersonaModal(componentId) {
    const modal = document.getElementById('persona-modal');
    const grid = document.getElementById('personas-grid');

    const component = state.config.components.find(c => c.id === componentId);
    const selectedPersona = component?.selectedPersona || 'senior-engineer';

    grid.innerHTML = PERSONAS.map(persona => `
      <div class="persona-card ${persona.id === selectedPersona ? 'selected' : ''}" data-persona="${persona.id}">
        <div class="persona-name">${persona.name}</div>
        <div class="persona-description">${persona.description}</div>
      </div>
    `).join('');

    grid.addEventListener('click', (e) => {
      const card = e.target.closest('.persona-card');
      if (card) {
        const personaId = card.dataset.persona;
        selectPersona(componentId, personaId);
        closeModal();
      }
    });

    state.currentModal = { type: 'persona', componentId };
    modal.classList.add('show');
  }

  function showTechStackModal(componentId) {
    const modal = document.getElementById('techstack-modal');
    const grid = document.getElementById('techstack-grid');

    const component = state.config.components.find(c => c.id === componentId);
    const selectedStacks = component?.selectedStacks || [];

    renderTechStackGrid(grid, selectedStacks);

    grid.addEventListener('click', (e) => {
      const item = e.target.closest('.techstack-item');
      if (item) {
        const tech = item.dataset.tech;
        toggleTechStack(componentId, tech);
      }
    });

    state.currentModal = { type: 'techstack', componentId };
    modal.classList.add('show');
  }

  function renderTechStackGrid(grid, selectedStacks, filter = '') {
    let html = '';

    Object.entries(TECH_STACKS).forEach(([category, technologies]) => {
      const filtered = technologies.filter(tech =>
        tech.toLowerCase().includes(filter.toLowerCase())
      );

      if (filtered.length > 0) {
        filtered.forEach(tech => {
          const selected = selectedStacks.includes(tech) ? 'selected' : '';
          html += `<div class="techstack-item ${selected}" data-tech="${tech}">${tech}</div>`;
        });
      }
    });

    grid.innerHTML = html || '<p style="text-align: center; color: var(--text-secondary);">No technologies found</p>';
  }

  function filterTechStacks(query) {
    const component = state.config.components.find(c => c.id === state.currentModal?.componentId);
    const selectedStacks = component?.selectedStacks || [];
    const grid = document.getElementById('techstack-grid');
    renderTechStackGrid(grid, selectedStacks, query);
  }

  function selectPersona(componentId, personaId) {
    const component = state.config.components.find(c => c.id === componentId);
    const persona = PERSONAS.find(p => p.id === personaId);

    if (component && persona) {
      component.selectedPersona = personaId;
      component.content = persona.content;
      renderComponents();
      updatePreview();
      saveConfig();
      showStatus(`Persona changed to: ${persona.name}`, 'success');
    }
  }

  function toggleTechStack(componentId, tech) {
    const component = state.config.components.find(c => c.id === componentId);
    if (!component) return;

    if (!component.selectedStacks) {
      component.selectedStacks = [];
    }

    const index = component.selectedStacks.indexOf(tech);
    if (index > -1) {
      component.selectedStacks.splice(index, 1);
    } else {
      component.selectedStacks.push(tech);
    }

    // Update content
    const stackList = component.selectedStacks.join(', ') || '{{tech_stack}}';
    component.content = `Technology stack: ${stackList}\n\nPlease provide solutions and examples specific to these technologies.`;

    // Re-render grid
    const grid = document.getElementById('techstack-grid');
    renderTechStackGrid(grid, component.selectedStacks);

    renderComponents();
    updatePreview();
    saveConfig();
  }

  function closeModal() {
    document.querySelectorAll('.modal').forEach(modal => {
      modal.classList.remove('show');
    });
    state.currentModal = null;
  }

  function renderComponents() {
    const list = document.getElementById('components-list');
    const components = state.config.components.sort((a, b) => a.order - b.order);

    list.innerHTML = components.map((comp, index) => {
      let badge = '';
      if (comp.id === 'role' && comp.selectedPersona) {
        const persona = PERSONAS.find(p => p.id === comp.selectedPersona);
        badge = `<span class="component-badge">${persona?.name || 'Default'}</span>`;
      } else if (comp.id === 'tech-stack' && comp.selectedStacks?.length > 0) {
        badge = `<span class="component-badge">${comp.selectedStacks.length} selected</span>`;
      }

      // Generate preview text (first 60 characters)
      const contentPreview = (comp.content || '').trim().split('\n')[0].substring(0, 60);
      const preview = contentPreview ? `<div class="component-preview">${contentPreview}${contentPreview.length >= 60 ? '...' : ''}</div>` : '';

      const optionsHtml = renderComponentOptions(comp);
      const hasOptions = optionsHtml.trim().length > 0;

      const stateLabel = comp.enabled ? 'Enabled' : 'Disabled';
      const stateClass = comp.enabled ? 'on' : 'off';

      // Keyboard shortcut number (1-9)
      const keyNumber = index < 9 ? index + 1 : '';

      const pillGroup = `
        <div class="component-pill-group">
          ${badge}
          <span class="component-state ${stateClass}">${stateLabel}</span>
        </div>
      `;

      return `
        <div class="component-item ${comp.enabled ? 'active' : ''} ${hasOptions ? 'has-options' : ''}" data-id="${comp.id}" data-index="${index}" tabindex="0">
          <div class="component-header" data-action="header-click">
            ${keyNumber ? `<span class="component-number">${keyNumber}</span>` : ''}
            <div class="component-toggle ${comp.enabled ? 'checked' : ''}" data-action="toggle"></div>
            <div class="component-name">
              <div class="component-name-text">${comp.name}</div>
              ${preview}
            </div>
            <div class="component-actions">
              <button class="component-action" data-action="edit" title="Edit (Enter)">✏️</button>
              <button class="component-action" data-action="move-up" title="Move Up (Ctrl+↑)">&uarr;</button>
              <button class="component-action" data-action="move-down" title="Move Down (Ctrl+↓)">&darr;</button>
              <button class="component-action" data-action="delete" title="Delete (Del)">🗑️</button>
            </div>
            ${pillGroup}
          </div>
          <div class="component-body">
            ${optionsHtml}
            <textarea data-id="${comp.id}" placeholder="Enter content for ${comp.name}...">${comp.content || ''}</textarea>
            <div class="component-meta">
              <span>${(comp.content || '').length} characters</span>
              <span>${(comp.content || '').split(/\s+/).filter(w => w).length} words</span>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // Re-apply focus if there was a focused item
    if (state.focusedIndex !== undefined && state.focusedIndex >= 0) {
      const items = list.querySelectorAll('.component-item');
      if (items[state.focusedIndex]) {
        items[state.focusedIndex].classList.add('focused');
      }
    }
  }

  function renderComponentOptions(comp) {
    const parts = [];

    if (comp.id === 'tech-stack') {
      parts.push('<button class="component-select-btn" data-action="select-techstack">?? Select Technologies</button>');
    }

    if (comp.id === 'role') {
      const selectedPersona = resolvePersonaSelection(comp);
      const personaOptions = PERSONAS.map(persona => `<option value="${persona.id}" ${persona.id === selectedPersona ? 'selected' : ''}>${persona.name}</option>`).join('');
      parts.push(`
        <div class="component-option-group">
          <label class="component-select-label">
            <span>Persona preset</span>
            <select class="component-preset-select" data-component-id="${comp.id}">
              <option value="custom" ${selectedPersona === 'custom' ? 'selected' : ''}>Custom persona</option>
              ${personaOptions}
            </select>
          </label>
          <button class="component-select-btn" data-action="select-persona">?? Persona Library</button>
        </div>
      `);
    }

    const presets = COMPONENT_PRESETS[comp.id] || [];
    if (presets.length && comp.id !== 'role') {
      const selectedPreset = resolvePresetSelection(comp, presets);
      const presetOptions = presets.map(p => `<option value="${p.id}" ${p.id === selectedPreset ? 'selected' : ''}>${p.name}</option>`).join('');
      parts.push(`
        <div class="component-option-group">
          <label class="component-select-label">
            <span>Select ${comp.name}</span>
            <select class="component-preset-select" data-component-id="${comp.id}">
              <option value="custom" ${selectedPreset === 'custom' ? 'selected' : ''}>Custom</option>
              ${presetOptions}
            </select>
          </label>
        </div>
      `);
    }

    return parts.join('');
  }

  function resolvePersonaSelection(component) {
    const personaExists = PERSONAS.some(p => p.id === component.selectedPersona);
    if (component.selectedPersona && personaExists) {
      return component.selectedPersona;
    }

    const match = PERSONAS.find(p => (p.content || '').trim() === (component.content || '').trim());
    if (match) {
      component.selectedPersona = match.id;
      return match.id;
    }

    return 'custom';
  }

  function resolvePresetSelection(component, presets) {
    if (!presets.length) {
      return 'custom';
    }

    if (component.selectedPreset && component.selectedPreset !== 'custom') {
      const exists = presets.some(p => p.id === component.selectedPreset);
      if (exists) {
        return component.selectedPreset;
      }
    }

    const normalizedContent = (component.content || '').trim();
    const match = presets.find(p => (p.content || '').trim() === normalizedContent);
    if (match) {
      component.selectedPreset = match.id;
      return match.id;
    }

    return 'custom';
  }

  function handleComponentClick(e) {
    const action = e.target.dataset.action;
    const item = e.target.closest('.component-item');
    if (!item) return;

    const id = item.dataset.id;
    const index = parseInt(item.dataset.index);
    const component = state.config.components.find(c => c.id === id);

    if (!component) return;

    // Handle header click (click anywhere on header to toggle, except on action buttons)
    if (action === 'header-click' && !e.target.closest('.component-actions') && !e.target.closest('.component-action')) {
      // Support multi-select with Shift/Ctrl
      if (e.shiftKey || e.ctrlKey || e.metaKey) {
        item.classList.toggle('selected');
        if (!state.selectedComponents) state.selectedComponents = new Set();

        if (item.classList.contains('selected')) {
          state.selectedComponents.add(id);
        } else {
          state.selectedComponents.delete(id);
        }
        return;
      }

      // Normal toggle
      component.enabled = !component.enabled;
      renderComponents();
      updatePreview();
      saveConfig();
      return;
    }

    // Handle specific actions
    switch (action) {
      case 'toggle':
        component.enabled = !component.enabled;
        renderComponents();
        updatePreview();
        saveConfig();
        break;

      case 'edit':
        item.classList.toggle('expanded');
        e.stopPropagation();
        break;

      case 'select-persona':
        showPersonaModal(id);
        e.stopPropagation();
        break;

      case 'select-techstack':
        showTechStackModal(id);
        e.stopPropagation();
        break;

      case 'move-up':
        moveComponent(id, -1);
        e.stopPropagation();
        break;

      case 'move-down':
        moveComponent(id, 1);
        e.stopPropagation();
        break;

      case 'delete':
        if (confirm(`Delete component "${component.name}"?`)) {
          state.config.components = state.config.components.filter(c => c.id !== id);
          renderComponents();
          updatePreview();
          saveConfig();
          showStatus('Component deleted', 'info');
        }
        e.stopPropagation();
        break;
    }
  }

  // Bulk Operations
  function enableAllComponents() {
    state.config.components.forEach(comp => comp.enabled = true);
    renderComponents();
    updatePreview();
    saveConfig();
    showStatus('All components enabled', 'success');
  }

  function disableAllComponents() {
    state.config.components.forEach(comp => comp.enabled = false);
    renderComponents();
    updatePreview();
    saveConfig();
    showStatus('All components disabled', 'success');
  }

  function invertComponentSelection() {
    state.config.components.forEach(comp => comp.enabled = !comp.enabled);
    renderComponents();
    updatePreview();
    saveConfig();
    showStatus('Component selection inverted', 'success');
  }

  // Keyboard Navigation
  function handleKeyboardShortcuts(e) {
    // Ignore if typing in input/textarea
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.isContentEditable) {
      return;
    }

    const components = state.config.components.sort((a, b) => a.order - b.order);
    const list = document.getElementById('components-list');
    if (!list) return;
    const items = Array.from(list.querySelectorAll('.component-item'));
    const focusedItem = items.find(item => item.classList.contains('focused'));
    const focusedIndex = focusedItem ? parseInt(focusedItem.dataset.index) : -1;

    // Number keys 1-9 toggle components
    if (e.key >= '1' && e.key <= '9') {
      const index = parseInt(e.key) - 1;
      if (index < components.length) {
        components[index].enabled = !components[index].enabled;
        renderComponents();
        updatePreview();
        saveConfig();
      }
      return;
    }

    // Arrow key navigation
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const nextIndex = focusedIndex < items.length - 1 ? focusedIndex + 1 : 0;
      setFocusedComponent(nextIndex);
      return;
    }

    if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prevIndex = focusedIndex > 0 ? focusedIndex - 1 : items.length - 1;
      setFocusedComponent(prevIndex);
      return;
    }

    // Space or Enter to toggle focused component
    if ((e.key === ' ' || e.key === 'Enter') && focusedIndex >= 0) {
      e.preventDefault();
      const component = components[focusedIndex];
      if (e.key === 'Enter') {
        // Enter expands/collapses
        items[focusedIndex].classList.toggle('expanded');
      } else {
        // Space toggles enabled state
        component.enabled = !component.enabled;
        renderComponents();
        updatePreview();
        saveConfig();
      }
      return;
    }

    // Delete key to delete focused component
    if (e.key === 'Delete' && focusedIndex >= 0) {
      const component = components[focusedIndex];
      if (confirm(`Delete component "${component.name}"?`)) {
        state.config.components = state.config.components.filter(c => c.id !== component.id);
        renderComponents();
        updatePreview();
        saveConfig();
        showStatus('Component deleted', 'info');
      }
      return;
    }

    // Escape key to collapse expanded components
    if (e.key === 'Escape') {
      // Collapse all expanded components
      const expandedComponents = list.querySelectorAll('.component-item.expanded');
      if (expandedComponents.length > 0) {
        expandedComponents.forEach(comp => comp.classList.remove('expanded'));
        return;
      }

      // Clear focus if no other action taken
      items.forEach(item => item.classList.remove('focused'));
      state.focusedIndex = -1;
      return;
    }

    // Ctrl/Cmd shortcuts
    if (e.ctrlKey || e.metaKey) {
      // Ctrl+A: Enable all
      if (e.key === 'a') {
        e.preventDefault();
        enableAllComponents();
        return;
      }

      // Ctrl+D: Disable all
      if (e.key === 'd') {
        e.preventDefault();
        disableAllComponents();
        return;
      }

      // Ctrl+I: Invert selection
      if (e.key === 'i') {
        e.preventDefault();
        invertComponentSelection();
        return;
      }

      // Ctrl+Arrow to move components
      if (e.key === 'ArrowUp' && focusedIndex >= 0) {
        e.preventDefault();
        const component = components[focusedIndex];
        moveComponent(component.id, -1);
        state.focusedIndex = Math.max(0, focusedIndex - 1);
        return;
      }

      if (e.key === 'ArrowDown' && focusedIndex >= 0) {
        e.preventDefault();
        const component = components[focusedIndex];
        moveComponent(component.id, 1);
        state.focusedIndex = Math.min(components.length - 1, focusedIndex + 1);
        return;
      }
    }
  }

  function setFocusedComponent(index) {
    const list = document.getElementById('components-list');
    const items = Array.from(list.querySelectorAll('.component-item'));

    // Remove focus from all items
    items.forEach(item => item.classList.remove('focused'));

    // Add focus to target item
    if (items[index]) {
      items[index].classList.add('focused');
      items[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      state.focusedIndex = index;
    }
  }

  function handleComponentFocus(e) {
    const item = e.target.closest('.component-item');
    if (item) {
      const index = parseInt(item.dataset.index);
      setFocusedComponent(index);
    }
  }

  function handleComponentPresetChange(e) {
    const select = e.target.closest('.component-preset-select');
    if (!select) return;

    const componentId = select.dataset.componentId;
    const component = state.config.components.find(c => c.id === componentId);
    if (!component) return;

    if (componentId === 'role') {
      if (select.value === 'custom') {
        component.selectedPersona = 'custom';
        renderComponents();
        updatePreview();
        saveConfig();
        return;
      }
      selectPersona(componentId, select.value);
      return;
    }

    if (select.value === 'custom') {
      component.selectedPreset = 'custom';
      saveConfig();
      return;
    }

    const presets = COMPONENT_PRESETS[componentId] || [];
    const preset = presets.find(p => p.id === select.value);
    if (!preset) return;

    component.selectedPreset = preset.id;
    component.content = preset.content;
    renderComponents();
    updatePreview();
    saveConfig();
    showStatus(`${component.name} preset applied: ${preset.name}`, 'success');
  }

  function handleComponentInput(e) {
    if (e.target.tagName === 'TEXTAREA') {
      const id = e.target.dataset.id;
      const component = state.config.components.find(c => c.id === id);
      if (component) {
        component.content = e.target.value;

        if (component.id === 'role') {
          if (component.selectedPersona && component.selectedPersona !== 'custom') {
            const persona = PERSONAS.find(p => p.id === component.selectedPersona);
            if (!persona || persona.content !== component.content) {
              component.selectedPersona = 'custom';
              syncComponentPresetSelect(component.id, 'custom', e.target);
            }
          }
        } else {
          const presets = COMPONENT_PRESETS[component.id] || [];
          if (component.selectedPreset && component.selectedPreset !== 'custom') {
            const preset = presets.find(p => p.id === component.selectedPreset);
            if (!preset || preset.content !== component.content) {
              component.selectedPreset = 'custom';
              syncComponentPresetSelect(component.id, 'custom', e.target);
            }
          }
        }

        // Update meta info immediately for instant feedback
        const meta = e.target.nextElementSibling;
        if (meta) {
          const chars = e.target.value.length;
          const words = e.target.value.split(/\s+/).filter(w => w).length;
          meta.innerHTML = `
            <span>${chars} characters</span>
            <span>${words} words</span>
          `;
        }

        // Debounce expensive operations for smooth typing
        debouncedUpdatePreview();
        debouncedSaveConfig();
      }
    }
  }

  function syncComponentPresetSelect(componentId, value, inputElement) {
    const container = inputElement.closest('.component-item');
    if (!container) return;
    const select = container.querySelector(`.component-preset-select[data-component-id="${componentId}"]`);
    if (select) {
      select.value = value;
    }
  }

  function moveComponent(id, direction) {
    const index = state.config.components.findIndex(c => c.id === id);
    if (index === -1) return;

    const newIndex = index + direction;
    if (newIndex < 0 || newIndex >= state.config.components.length) return;

    // Swap
    [state.config.components[index], state.config.components[newIndex]] =
    [state.config.components[newIndex], state.config.components[index]];

    // Update orders
    state.config.components.forEach((comp, idx) => {
      comp.order = idx + 1;
    });

    renderComponents();
    updatePreview();
    saveConfig();
  }

  function handleAddComponent() {
    const input = document.getElementById('new-component-name');
    const name = input.value.trim();

    if (!name) {
      showStatus('Please enter a component name', 'error');
      return;
    }

    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');

    if (state.config.components.find(c => c.id === id)) {
      showStatus('Component with this name already exists', 'error');
      return;
    }

    state.config.components.push({
      id,
      name,
      enabled: true,
      order: state.config.components.length + 1,
      content: ''
    });

    input.value = '';
    renderComponents();
    updatePreview();
    saveConfig();
    showStatus(`Component "${name}" added`, 'success');
  }

  function updatePreview() {
    let prompt = composeIntentHeader();
    const enabledComponents = state.config.components
      .filter(c => c.enabled && c.content)
      .sort((a, b) => a.order - b.order);
    const intentOutput = INTENT_OUTPUT_OPTIONS.find((option) => option.id === state.intentOutput);
    const intentOutputLabel = intentOutput?.label || state.intentOutput;

    if (!state.showRefine) {
      const summaryLines = [];
      summaryLines.push(state.intentGoal || 'Help me with this request.');
      if (state.intentInput) summaryLines.push(`Context:\n${state.intentInput}`);
      if (intentOutputLabel) summaryLines.push(`Return format: ${intentOutputLabel}`);

      prompt += `Request:\n${summaryLines.join('\n\n')}`;
    } else {
      prompt += enabledComponents
        .map(c => `${c.name}:\n${c.content}`)
        .join('\n\n');
    }

    const textarea = document.getElementById('final-prompt');
    textarea.value = prompt;
    renderIntentControls();

    // Update stats
    const chars = prompt.length;
    const words = countWords(prompt);

    document.getElementById('char-count').textContent = `${chars} characters`;
    document.getElementById('word-count').textContent = `${words} words`;
  }

  function handleCopyPrompt() {
    const text = document.getElementById('final-prompt').value;
    copyToClipboard(text, {
      onSuccess: () => showStatus('Prompt copied to clipboard!', 'success'),
      onError: () => showStatus('Failed to copy prompt', 'error')
    });
  }

  function handleSavePrompt() {
    const prompt = document.getElementById('final-prompt').value;
    if (!prompt) {
      showStatus('No prompt to save', 'error');
      return;
    }

    downloadAsFile(prompt, `ai-prompt-${Date.now()}.txt`);
    showStatus('Prompt saved to file', 'success');
  }

  function handleImportConfig() {
    const input = document.getElementById('file-input');
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const config = JSON.parse(event.target.result);
          if (!config.components || !Array.isArray(config.components)) {
            throw new Error('Invalid configuration format');
          }
          state.config = config;
          normalizeComponents();
          renderComponents();
          updatePreview();
          saveConfig();
          showStatus('Configuration imported successfully', 'success');
        } catch (error) {
          showStatus(`Import failed: ${error.message}`, 'error');
        }
      };
      reader.readAsText(file);
      input.value = '';
    };
    input.click();
  }

  function handleExportConfig() {
    const json = JSON.stringify(state.config, null, 2);
    downloadAsFile(json, `prompt-config-${Date.now()}.json`, 'application/json');
    showStatus('Configuration exported', 'success');
  }

  function handleResetConfig() {
    if (confirm('Reset to default configuration? This will discard all changes.')) {
      state.config = deepClone(DEFAULT_CONFIG);
      normalizeComponents();
      renderComponents();
      updatePreview();
      saveConfig();
      showStatus('Configuration reset to defaults', 'info');
    }
  }

  function loadTemplate(templateId) {
    const template = TEMPLATES[templateId];
    if (!template) return;

    if (confirm(`Load "${template.name}" template? This will replace your current configuration.`)) {
      state.config.components = deepClone(template.components);
      normalizeComponents();
      renderComponents();
      updatePreview();
      saveConfig();
      showStatus(`Template "${template.name}" loaded`, 'success');
    }
  }

  function saveConfig() {
    saveToolState('ai-prompt-builder', {
      config: state.config,
      intent: {
        intentMode: state.intentMode,
        workflowProfile: state.workflowProfile,
        intentGoal: state.intentGoal,
        intentInput: state.intentInput,
        intentOutput: state.intentOutput,
        showRefine: state.showRefine
      }
    });
  }

  // Debounced versions for better performance
  const debouncedUpdatePreview = debounce(updatePreview, 150);
  const debouncedSaveConfig = debounce(saveConfig, 500);
  const rafUpdatePreview = rafDebounce(updatePreview);

  function loadConfig() {
    const saved = loadToolState('ai-prompt-builder');
    if (saved) {
      if (saved.config) state.config = saved.config;
      if (saved.intent) {
        state.intentMode = saved.intent.intentMode ?? state.intentMode;
        state.workflowProfile = saved.intent.workflowProfile ?? state.workflowProfile;
        state.intentGoal = saved.intent.intentGoal ?? state.intentGoal;
        state.intentInput = saved.intent.intentInput ?? state.intentInput;
        state.intentOutput = saved.intent.intentOutput ?? state.intentOutput;
        state.showRefine = saved.intent.showRefine ?? state.showRefine;
      }
    }
    ensureIntentState();
  }

  function showStatus(message, type = 'info') {
    const statusEl = document.getElementById('status-message');
    statusEl.textContent = message;
    statusEl.className = `status-message show ${type}`;

    setTimeout(() => {
      statusEl.classList.remove('show');
    }, 3000);
  }

  const debouncedFilterTemplates = debounce(function() { renderTemplates(); }, 200);

  // ============================================================
  // TEMPLATE MANAGEMENT
  // ============================================================

  function renderTemplates() {
    const grid = document.getElementById('templates-grid');
    const allTemplates = { ...TEMPLATES };

    // Add custom templates
    state.customTemplates.forEach(template => {
      allTemplates[template.id] = template;
    });

    const filtered = filterTemplatesBySearch(allTemplates);

    grid.innerHTML = Object.entries(filtered).map(([id, template]) => {
      const isCustom = state.customTemplates.some(t => t.id === id);
      const customClass = isCustom ? 'custom-template' : '';
      const deleteBtn = isCustom ? `<button class="delete-template-btn" data-template="${id}">×</button>` : '';

      return `
        <button class="template-btn ${customClass}" data-template="${id}">
          ${template.name}
          ${deleteBtn}
        </button>
      `;
    }).join('');
  }

  function filterTemplatesBySearch(templates) {
    const search = document.getElementById('template-search').value.toLowerCase();
    const category = document.getElementById('template-category').value;

    return Object.fromEntries(
      Object.entries(templates).filter(([id, template]) => {
        const matchesSearch = !search || template.name.toLowerCase().includes(search);
        const matchesCategory = !category || template.category === category;
        return matchesSearch && matchesCategory;
      })
    );
  }

  function filterTemplates() {
    debouncedFilterTemplates();
  }

  function handleTemplateClick(e) {
    const deleteBtn = e.target.closest('.delete-template-btn');
    if (deleteBtn) {
      e.stopPropagation();
      const templateId = deleteBtn.dataset.template;
      deleteCustomTemplate(templateId);
      return;
    }

    const templateBtn = e.target.closest('.template-btn');
    if (templateBtn) {
      const templateId = templateBtn.dataset.template;
      loadTemplate(templateId);
    }
  }

  function showSaveTemplateModal() {
    const modal = document.getElementById('save-template-modal');
    document.getElementById('template-name').value = '';
    document.getElementById('template-description').value = '';
    document.getElementById('template-category-select').value = 'custom';
    modal.classList.add('show');
  }

  function handleSaveCustomTemplate() {
    const name = document.getElementById('template-name').value.trim();
    const description = document.getElementById('template-description').value.trim();
    const category = document.getElementById('template-category-select').value;

    if (!name) {
      showStatus('Please enter a template name', 'error');
      return;
    }

    const id = 'custom-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-');

    // Check if template already exists
    if (state.customTemplates.some(t => t.id === id)) {
      if (!confirm('A template with this name already exists. Overwrite?')) {
        return;
      }
      state.customTemplates = state.customTemplates.filter(t => t.id !== id);
    }

    const template = {
      id,
      name,
      description,
      category,
      components: deepClone(state.config.components)
    };

    state.customTemplates.push(template);
    saveCustomTemplates();
    renderTemplates();
    closeModal();
    showStatus(`Template "${name}" saved`, 'success');
  }

  function deleteCustomTemplate(id) {
    const template = state.customTemplates.find(t => t.id === id);
    if (!template) return;

    if (confirm(`Delete template "${template.name}"?`)) {
      state.customTemplates = state.customTemplates.filter(t => t.id !== id);
      saveCustomTemplates();
      renderTemplates();
      showStatus(`Template "${template.name}" deleted`, 'info');
    }
  }

  function saveCustomTemplates() {
    saveToolState('ai-prompt-builder-templates', { items: state.customTemplates });
  }

  function loadCustomTemplates() {
    const saved = loadToolState('ai-prompt-builder-templates');
    if (saved?.items) {
      state.customTemplates = saved.items;
    }
  }

  // ============================================================
  // SHARING & COLLABORATION
  // ============================================================

  function handleShare() {
    const modal = document.getElementById('share-modal');
    const link = generateShareLink();
    document.getElementById('share-link').value = link;
    modal.classList.add('show');
  }

  function generateShareLink() {
    const config = {
      components: state.config.components,
      intent: {
        intentMode: state.intentMode,
        workflowProfile: state.workflowProfile,
        intentGoal: state.intentGoal,
        intentInput: state.intentInput,
        intentOutput: state.intentOutput,
        showRefine: state.showRefine
      },
      version: '10.0.0'
    };

    const json = JSON.stringify(config);
    const base64 = btoa(unescape(encodeURIComponent(json)));
    const url = window.location.href.split('#')[0] + '#share=' + base64;
    return url;
  }

  function copyShareLink() {
    const input = document.getElementById('share-link');
    copyToClipboard(input.value, {
      onSuccess: () => showStatus('Share link copied to clipboard!', 'success'),
      onError: () => showStatus('Failed to copy link', 'error')
    });
  }

  function loadFromURL() {
    const hash = window.location.hash;
    if (hash.startsWith('#share=')) {
      try {
        const base64 = hash.substring(7);
        const json = decodeURIComponent(escape(atob(base64)));
        const config = JSON.parse(json);

        if (config.components && Array.isArray(config.components)) {
          if (confirm('Load shared configuration? This will replace your current configuration.')) {
            state.config.components = config.components;
            if (config.intent) {
              state.intentMode = config.intent.intentMode ?? state.intentMode;
              state.workflowProfile = config.intent.workflowProfile ?? state.workflowProfile;
              state.intentGoal = config.intent.intentGoal ?? state.intentGoal;
              state.intentInput = config.intent.intentInput ?? state.intentInput;
              state.intentOutput = config.intent.intentOutput ?? state.intentOutput;
              state.showRefine = config.intent.showRefine ?? state.showRefine;
            }
            normalizeComponents();
            ensureIntentState();
            applyWorkflowProfile(state.workflowProfile, { silent: true });
            renderComponents();
            renderIntentControls();
            updatePreview();
            saveConfig();
            showStatus('Configuration loaded from shared link', 'success');
            window.location.hash = '';
          }
        }
      } catch (error) {
        console.error('Failed to load from URL:', error);
        showStatus('Invalid share link', 'error');
      }
    }
  }

  // ============================================================
  // COLLAPSIBLE SECTIONS
  // ============================================================

  function setupCollapsibles() {
    const headers = document.querySelectorAll('.section-header.collapsible');
    headers.forEach(header => {
      header.addEventListener('click', (e) => {
        // Don't toggle if clicking on a button inside the header
        if (e.target.closest('button:not(.collapse-btn)')) {
          return;
        }

        header.classList.toggle('collapsed');
        const content = header.nextElementSibling;
        if (content) {
          if (header.classList.contains('collapsed')) {
            content.style.maxHeight = '0';
          } else {
            content.style.maxHeight = content.scrollHeight + 'px';
          }
        }
      });

      // Set initial max-height for non-collapsed sections
      if (!header.classList.contains('collapsed')) {
        const content = header.nextElementSibling;
        if (content) {
          content.style.maxHeight = content.scrollHeight + 'px';
        }
      }
    });
  }

  if (typeof window !== 'undefined' && !window.DevChef) {
    document.addEventListener('DOMContentLoaded', () => {
      const template = document.querySelector('#tool-ui');
      if (!template) return;

      document.body.innerHTML = template.innerHTML;

      const standaloneContext = {
        input: '',
        output: '',
        setInput(value) { this.input = value; },
        setOutput(value) { this.output = value; },
        getInput() { return this.input; },
        getOutput() { return this.output; }
      };

      init(standaloneContext);
    });
  }

</script>
