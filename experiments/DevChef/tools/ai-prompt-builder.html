<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Builder - DevChef Tool</title>
</head>
<body>

<!-- DevChef Manifest -->
<script type="devchef-manifest">
{
  "id": "ai-prompt-builder",
  "name": "AI Prompt Builder",
  "category": "Developer Tools",
  "description": "Build structured AI prompts fast with outcome-driven starter recipes and focused slots for task, role, context, format, and tone",
  "keywords": ["ai", "prompt", "llm", "chatgpt", "claude", "builder", "template", "tone"],
  "version": "13.0.0"
}
</script>

<!-- Tool UI Template -->
<template id="tool-ui">
  <div class="apb-tool" data-preserve-legacy-controls>

    <section class="apb-starters" aria-labelledby="apb-starters-title">
      <div class="apb-section-head">
        <div>
          <h3 id="apb-starters-title" class="apb-section-title">Quick Starts</h3>
          <p class="apb-section-copy">Pick a ready-made prompt recipe, then adjust the slots if needed.</p>
        </div>
      </div>
      <div class="apb-starter-filters" id="apb-starter-filters"></div>
      <div class="apb-starter-grid" id="apb-starter-grid"></div>
    </section>

    <!-- Task slot — always open, required -->
    <div class="apb-slot apb-slot-task">
      <div class="apb-slot-label-row">
        <span class="apb-label">Task <span class="apb-required">required</span></span>
        <span class="apb-char-count" id="apb-char-count">0 chars</span>
      </div>
      <textarea
        id="apb-task"
        class="apb-task-input"
        placeholder="What do you need? e.g. &quot;Summarize this article into three key takeaways&quot;"
        rows="4"
      ></textarea>
    </div>

    <!-- Role slot — collapsible -->
    <div class="apb-slot apb-slot-collapsible" id="apb-role-slot">
      <button class="apb-slot-toggle" type="button" aria-expanded="false" data-slot="role">
        <span class="apb-label">Role</span>
        <span class="apb-summary" id="apb-role-summary">None</span>
        <span class="apb-chevron" aria-hidden="true">›</span>
      </button>
      <div class="apb-slot-body" id="apb-role-body" hidden>
        <div class="apb-pills" id="apb-role-pills"></div>
        <textarea id="apb-role-custom" class="apb-slot-textarea" rows="2"
          placeholder="Or describe a custom role…"></textarea>
      </div>
    </div>

    <!-- Context slot — collapsible -->
    <div class="apb-slot apb-slot-collapsible" id="apb-context-slot">
      <button class="apb-slot-toggle" type="button" aria-expanded="false" data-slot="context">
        <span class="apb-label">Context</span>
        <span class="apb-summary" id="apb-context-summary">Empty</span>
        <span class="apb-chevron" aria-hidden="true">›</span>
      </button>
      <div class="apb-slot-body" id="apb-context-body" hidden>
        <textarea id="apb-context" class="apb-slot-textarea" rows="4"
          placeholder="Paste text, data, notes, or anything relevant…"></textarea>
      </div>
    </div>

    <!-- Format slot — collapsible -->
    <div class="apb-slot apb-slot-collapsible" id="apb-format-slot">
      <button class="apb-slot-toggle" type="button" aria-expanded="false" data-slot="format">
        <span class="apb-label">Format</span>
        <span class="apb-summary" id="apb-format-summary">Default</span>
        <span class="apb-chevron" aria-hidden="true">›</span>
      </button>
      <div class="apb-slot-body" id="apb-format-body" hidden>
        <div class="apb-pills" id="apb-format-pills"></div>
        <textarea id="apb-format-custom" class="apb-slot-textarea" rows="2"
          placeholder="Or describe a custom output format…"></textarea>
      </div>
    </div>

    <!-- Tone slot — collapsible -->
    <div class="apb-slot apb-slot-collapsible" id="apb-tone-slot">
      <button class="apb-slot-toggle" type="button" aria-expanded="false" data-slot="tone">
        <span class="apb-label">Tone</span>
        <span class="apb-summary" id="apb-tone-summary">Neutral</span>
        <span class="apb-chevron" aria-hidden="true">›</span>
      </button>
      <div class="apb-slot-body" id="apb-tone-body" hidden>
        <div class="apb-pills" id="apb-tone-pills"></div>
        <textarea id="apb-tone-custom" class="apb-slot-textarea" rows="2"
          placeholder="Or describe a custom tone or writing style…"></textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="apb-actions">
      <button id="apb-copy-btn" class="apb-btn apb-btn-primary" type="button">Copy Prompt</button>
      <button id="apb-clear-btn" class="apb-btn apb-btn-secondary" type="button">Clear</button>
      <button id="apb-save-btn" class="apb-btn apb-btn-secondary" type="button">Save Template</button>
    </div>

    <!-- Templates strip -->
    <div class="apb-templates-wrap" id="apb-templates-wrap">
      <div class="apb-templates-strip" id="apb-templates-strip" role="list" aria-label="Saved templates"></div>
    </div>

    <!-- Save template dialog -->
    <div class="apb-dialog-backdrop" id="apb-dialog-backdrop">
      <div class="apb-dialog" role="dialog" aria-modal="true" aria-labelledby="apb-dialog-title">
        <h3 id="apb-dialog-title">Save Template</h3>
        <input id="apb-template-name-input" type="text" placeholder="Template name…" autocomplete="off" />
        <div class="apb-dialog-actions">
          <button id="apb-dialog-confirm" class="apb-btn apb-btn-primary" type="button">Save</button>
          <button id="apb-dialog-cancel" class="apb-btn apb-btn-secondary" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <div class="apb-toast" id="apb-toast" aria-live="polite"></div>
  </div>
</template>

<!-- Styles -->
<style>
  .apb-tool {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 760px;
    margin: 0 auto;
    padding: 16px 12px;
    position: relative;
  }

  .apb-starters {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 2px 0 4px;
  }

  .apb-section-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .apb-section-title {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .apb-section-copy {
    margin: 4px 0 0;
    font-size: 12px;
    line-height: 1.45;
    color: var(--text-secondary);
  }

  .apb-starter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }

  .apb-starter-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .apb-filter-chip {
    border: 1px solid var(--border-color);
    background: var(--bg-primary);
    color: var(--text-secondary);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s, color 0.12s;
  }

  .apb-filter-chip:hover {
    border-color: var(--accent);
    color: var(--text-primary);
  }

  .apb-filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .apb-starter-card {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 132px;
    padding: 12px;
    text-align: left;
    border: 1px solid var(--border-color);
    border-radius: 14px;
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--accent) 10%, var(--bg-secondary)) 0%, var(--bg-secondary) 100%);
    color: var(--text-primary);
    cursor: pointer;
    transition: transform 0.14s, border-color 0.14s, box-shadow 0.14s;
  }

  .apb-starter-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .apb-starter-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 38%, transparent);
  }

  .apb-starter-title {
    font-size: 13px;
    font-weight: 700;
  }

  .apb-starter-meta {
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .apb-starter-copy {
    font-size: 12px;
    line-height: 1.45;
    color: var(--text-secondary);
  }

  /* ── Slots ── */
  .apb-slot {
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background: var(--bg-secondary);
    overflow: hidden;
  }

  .apb-slot-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 6px;
  }

  .apb-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .apb-required {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    margin-left: 6px;
    text-transform: none;
    letter-spacing: 0;
  }

  .apb-char-count {
    font-size: 11px;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }

  .apb-task-input {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 6px 14px 12px;
    background: transparent;
    border: none;
    outline: none;
    resize: vertical;
    font-size: 14px;
    font-family: var(--font-sans);
    color: var(--text-primary);
    line-height: 1.55;
  }

  .apb-task-input::placeholder { color: var(--text-secondary); opacity: 0.7; }

  /* Collapsible slot toggle */
  .apb-slot-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 12px 14px;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    color: var(--text-primary);
    transition: background 0.12s;
  }

  .apb-slot-toggle:hover { background: var(--bg-tertiary); }
  .apb-slot-collapsible.open .apb-slot-toggle { background: var(--bg-tertiary); }

  .apb-summary {
    flex: 1;
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-style: italic;
  }

  .apb-slot-collapsible.filled .apb-summary {
    color: var(--text-primary);
    font-style: normal;
    font-weight: 500;
  }

  .apb-chevron {
    font-size: 16px;
    color: var(--text-secondary);
    transition: transform 0.15s;
    line-height: 1;
  }

  .apb-slot-collapsible.open .apb-chevron { transform: rotate(90deg); }

  /* Slot body */
  .apb-slot-body {
    padding: 0 14px 14px;
    border-top: 1px solid var(--border-color);
  }

  .apb-slot-textarea {
    display: block;
    width: 100%;
    box-sizing: border-box;
    margin-top: 10px;
    padding: 8px 10px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    outline: none;
    resize: vertical;
    font-size: 13px;
    font-family: var(--font-sans);
    color: var(--text-primary);
    line-height: 1.5;
    transition: border-color 0.1s;
  }

  .apb-slot-textarea:focus { border-color: var(--accent); }
  .apb-slot-textarea::placeholder { color: var(--text-secondary); opacity: 0.7; }

  /* Pills */
  .apb-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-top: 12px;
  }

  .apb-pill {
    border: 1px solid var(--border-color);
    background: var(--bg-primary);
    color: var(--text-primary);
    border-radius: 999px;
    padding: 5px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s, color 0.1s;
    white-space: nowrap;
  }

  .apb-pill:hover { border-color: var(--accent); }
  .apb-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Actions */
  .apb-actions {
    display: flex;
    gap: 8px;
    padding: 4px 0 2px;
    flex-wrap: wrap;
  }

  .apb-btn {
    padding: 8px 18px;
    border-radius: var(--radius-lg, 8px);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity 0.1s, transform 0.1s;
  }

  .apb-btn:active { transform: scale(0.97); }
  .apb-btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .apb-btn-primary:hover { opacity: 0.88; }
  .apb-btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border-color: var(--border-color); }
  .apb-btn-secondary:hover { border-color: var(--accent); }

  /* Templates strip */
  .apb-templates-wrap { min-height: 32px; }

  .apb-templates-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: thin;
  }

  .apb-template-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 999px;
    padding: 5px 8px 5px 12px;
    white-space: nowrap;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.1s;
    flex-shrink: 0;
  }

  .apb-template-chip:hover { border-color: var(--accent); }
  .apb-template-chip-name { font-weight: 600; color: var(--text-primary); }

  .apb-template-chip-del {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    font-size: 10px;
    color: var(--text-secondary);
    cursor: pointer;
    flex-shrink: 0;
  }

  .apb-template-chip-del:hover { color: var(--error, #e55); }

  /* Dialog — uses .open class to show/hide (avoids hidden-attr vs display:flex specificity issue) */
  .apb-dialog-backdrop {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    align-items: center;
    justify-content: center;
    z-index: 100;
    border-radius: 10px;
  }

  .apb-dialog-backdrop.open {
    display: flex;
  }

  .apb-dialog {
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 20px;
    width: 320px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  .apb-dialog h3 { margin: 0 0 14px; font-size: 15px; }

  .apb-dialog input {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 8px 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    margin-bottom: 14px;
  }

  .apb-dialog input:focus { border-color: var(--accent); }

  .apb-dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* Toast */
  .apb-toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 200;
  }

  .apb-toast.visible { opacity: 1; transform: translateY(0); }

  @media (max-width: 640px) {
    .apb-tool {
      padding-inline: 10px;
    }

    .apb-starter-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<!-- Module -->

      formatPresetId: 'bullets',
      tonePresetId: 'concise',
    }
  },
  {
    id: 'onboarding-guide',
    label: 'Onboarding Guide',
    category: 'Writing',
    description: 'Produce a first-day or first-week guide from scattered internal notes.',
    slots: {
      task: 'Turn these notes into a practical onboarding guide for a new teammate, including first steps, dependencies, and common pitfalls.',
      rolePresetId: 'teacher',
      contextText: 'Raw onboarding notes:\nRole context:\nRequired tools and accounts:',
      formatPresetId: 'steps',
      tonePresetId: 'professional',
    }
  },
  {
    id: 'customer-reply',
    label: 'Customer Reply',
    category: 'Comms',
    description: 'Write a professional customer-facing response from issue context.',
    slots: {
      task: 'Draft a customer response that acknowledges the issue, explains what is known, avoids overcommitting, and provides clear next steps.',
      rolePresetId: 'tech_writer',
      contextText: 'Customer message:\nInternal issue summary:\nAllowed commitments:\nDesired tone:',
      formatPresetId: 'prose',
      tonePresetId: 'professional',
    }
  },
  {
    id: 'learning-plan',
    label: 'Learning Plan',
    category: 'Learning',
    description: 'Create a study plan with milestones, exercises, and output goals.',
    slots: {
      task: 'Create a practical learning plan for the topic below, including milestones, exercises, and ways to measure progress.',
      rolePresetId: 'teacher',
      contextText: 'Topic:\nCurrent level:\nTime available:\nGoal outcome:',
      formatPresetId: 'steps',
      tonePresetId: 'detailed',
    }
  },
  {
    id: 'retro-summary',
    label: 'Retro Summary',
    category: 'Ops',
    description: 'Turn retrospective notes into themes, wins, and actions.',
    slots: {
      task: 'Summarize this retrospective into key themes, what worked, what did not, and the top follow-up actions.',
      rolePresetId: 'product_manager',
      contextText: 'Retro notes:\nParticipants:\nSprint or release context:',
      formatPresetId: 'table',
      tonePresetId: 'professional',
    }
  },
];

const TONES = [
  { id: 'professional', label: 'Professional', text: 'professional and business-appropriate' },
  { id: 'casual',       label: 'Casual',       text: 'casual and conversational' },
  { id: 'concise',      label: 'Concise',      text: 'concise and to the point, avoiding unnecessary words' },
  { id: 'detailed',     label: 'Detailed',     text: 'thorough and detailed, covering all aspects comprehensively' },
  { id: 'technical',    label: 'Technical',    text: 'technically precise, using correct domain terminology' },
  { id: 'creative',     label: 'Creative',     text: 'creative and engaging, using vivid language' },
];

// ── State ─────────────────────────────────────────────────────────────────────

let state = {
  starterPresetId: null,
  starterFilter: 'All',
  task: '',
  rolePresetId: null,
  roleCustom: '',
  contextText: '',
  formatPresetId: null,
  formatCustom: '',
  tonePresetId: null,
  toneCustom: '',
  templates: [],
};

let container = null;

// ── Helpers ───────────────────────────────────────────────────────────────────

const $ = id => container.querySelector(`#${id}`);

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function restore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) Object.assign(state, JSON.parse(raw));
  } catch {}
}

function toast(msg, isError = false) {
  const el = $('apb-toast');
  el.textContent = msg;
  el.style.color = isError ? 'var(--error, #e55)' : 'var(--success, #4c4)';
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 2000);
}

function resolveToneText(presetId, customText) {
  if (!presetId) return customText.trim();
  const preset = TONES.find(t => t.id === presetId);
  return preset ? preset.text : customText.trim();
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderPills(containerId, items, activeId, onSelect) {
  const wrap = $(containerId);
  wrap.innerHTML = '';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'apb-pill' + (item.id === activeId ? ' active' : '');
    btn.textContent = item.label;
    btn.dataset.id = item.id;
    btn.addEventListener('click', () => onSelect(item.id === activeId ? null : item.id));
    wrap.appendChild(btn);
  });
}

function updateRoleSummary() {
  const label = presetLabel(state.rolePresetId, ROLES, null);
  const text = label ?? state.roleCustom;
  $('apb-role-summary').textContent = slotSummary(text, 'None', 48);
  $('apb-role-slot').classList.toggle('filled', !!(state.rolePresetId || state.roleCustom.trim()));
}

function updateContextSummary() {
  $('apb-context-summary').textContent = slotSummary(state.contextText, 'Empty', 48);
  $('apb-context-slot').classList.toggle('filled', !!state.contextText.trim());
}

function updateFormatSummary() {
  const label = presetLabel(state.formatPresetId, FORMATS, null);
  const text = label ?? state.formatCustom;
  $('apb-format-summary').textContent = slotSummary(text, 'Default', 48);
  $('apb-format-slot').classList.toggle('filled', !!(state.formatPresetId || state.formatCustom.trim()));
}

function updateToneSummary() {
  const label = presetLabel(state.tonePresetId, TONES, null);
  const text = label ?? state.toneCustom;
  $('apb-tone-summary').textContent = slotSummary(text, 'Neutral', 48);
  $('apb-tone-slot').classList.toggle('filled', !!(state.tonePresetId || state.toneCustom.trim()));
}

function getStarterCategories() {
  return ['All', ...new Set(STARTER_PRESETS.map(preset => preset.category))];
}

function renderStarterFilters() {
  const wrap = $('apb-starter-filters');
  wrap.innerHTML = '';

  getStarterCategories().forEach(category => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'apb-filter-chip' + (category === state.starterFilter ? ' active' : '');
    button.textContent = category;
    button.addEventListener('click', () => {
      state.starterFilter = category;
      renderStarterFilters();
      renderStarterPresets();
      persist();
    });
    wrap.appendChild(button);
  });
}

function renderStarterPresets() {
  const grid = $('apb-starter-grid');
  grid.innerHTML = '';

  STARTER_PRESETS
    .filter(preset => state.starterFilter === 'All' || preset.category === state.starterFilter)
    .forEach(preset => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'apb-starter-card' + (preset.id === state.starterPresetId ? ' active' : '');
    button.addEventListener('click', () => applyStarterPreset(preset.id));

    const meta = document.createElement('div');
    meta.className = 'apb-starter-meta';
    meta.textContent = preset.category;

    const title = document.createElement('div');
    title.className = 'apb-starter-title';
    title.textContent = preset.label;

    const copy = document.createElement('div');
    copy.className = 'apb-starter-copy';
    copy.textContent = preset.description;

    button.append(meta, title, copy);
    grid.appendChild(button);
    });
}

function buildPrompt() {
  const role = resolveRoleText(state.rolePresetId, state.roleCustom);
  const format = resolveFormatText(state.formatPresetId, state.formatCustom);
  const tone = resolveToneText(state.tonePresetId, state.toneCustom);
  const base = assemblePrompt({ task: state.task, role, context: state.contextText, format });
  if (tone) return base + `\n\nTone: write in a ${tone} tone.`;
  return base;
}

function updateCharCount() {
  $('apb-char-count').textContent = `${buildPrompt().length} chars`;
}

function renderTemplates() {
  const strip = $('apb-templates-strip');
  strip.innerHTML = '';
  state.templates.forEach(tpl => {
    const chip = document.createElement('div');
    chip.className = 'apb-template-chip';
    chip.setAttribute('role', 'listitem');

    const name = document.createElement('span');
    name.className = 'apb-template-chip-name';
    name.textContent = tpl.name;
    name.addEventListener('click', () => applyTemplate(tpl.name));

    const del = document.createElement('span');
    del.className = 'apb-template-chip-del';
    del.textContent = '×';
    del.title = `Delete "${tpl.name}"`;
    del.addEventListener('click', e => { e.stopPropagation(); removeTemplate(tpl.name); });

    chip.appendChild(name);
    chip.appendChild(del);
    strip.appendChild(chip);
  });
}

// ── Slot toggle ───────────────────────────────────────────────────────────────

function toggleSlot(slotName) {
  const slot = $(`apb-${slotName}-slot`);
  const body = $(`apb-${slotName}-body`);
  const btn = slot.querySelector('.apb-slot-toggle');
  const isOpen = slot.classList.contains('open');
  slot.classList.toggle('open', !isOpen);
  body.hidden = isOpen;
  btn.setAttribute('aria-expanded', String(!isOpen));
}

// ── Actions ───────────────────────────────────────────────────────────────────

function copyPrompt() {
  const errors = validateSlots({ task: state.task });
  if (errors.length) { toast(errors[0], true); return; }
  const prompt = buildPrompt();
  copyToClipboard(prompt, { onSuccess: () => toast('✓ Copied!'), onError: () => toast('✗ Failed') });
}

function clearAll() {
  state.starterPresetId = null;
  state.starterFilter = 'All';
  state.task = ''; state.rolePresetId = null; state.roleCustom = '';
  state.contextText = ''; state.formatPresetId = null; state.formatCustom = '';
  state.tonePresetId = null; state.toneCustom = '';
  applyStateToDOM();
  persist();
}

function showSaveDialog() {
  $('apb-dialog-backdrop').classList.add('open');
  $('apb-template-name-input').value = '';
  setTimeout(() => $('apb-template-name-input').focus(), 50);
}

function hideSaveDialog() {
  $('apb-dialog-backdrop').classList.remove('open');
}

function confirmSave() {
  const name = $('apb-template-name-input').value.trim();
  if (!name) { toast('Enter a name', true); return; }
  try {
    const slots = {
      starterPresetId: state.starterPresetId,
      task: state.task, rolePresetId: state.rolePresetId, roleCustom: state.roleCustom,
      contextText: state.contextText, formatPresetId: state.formatPresetId, formatCustom: state.formatCustom,
      tonePresetId: state.tonePresetId, toneCustom: state.toneCustom,
    };
    state.templates = saveTemplate(name, slots, state.templates);
    renderTemplates(); persist(); hideSaveDialog(); toast(`✓ Saved "${name}"`);
  } catch (e) { toast(e.message, true); }
}

function applyTemplate(name) {
  const slots = loadTemplate(name, state.templates);
  if (!slots) return;
  Object.assign(state, slots);
  applyStateToDOM();
  persist(); toast(`Loaded "${name}"`);
}

function removeTemplate(name) {
  state.templates = deleteTemplate(name, state.templates);
  renderTemplates(); persist();
}

// ── Pill handlers ─────────────────────────────────────────────────────────────

function reRoleSelect(id) {
  state.rolePresetId = id;
  state.starterPresetId = null;
  renderPills('apb-role-pills', ROLES, state.rolePresetId, reRoleSelect);
  renderStarterPresets();
  updateRoleSummary(); updateCharCount(); persist();
}

function reFormatSelect(id) {
  state.formatPresetId = id;
  state.starterPresetId = null;
  renderPills('apb-format-pills', FORMATS, state.formatPresetId, reFormatSelect);
  renderStarterPresets();
  updateFormatSummary(); updateCharCount(); persist();
}

function reToneSelect(id) {
  state.tonePresetId = id;
  state.starterPresetId = null;
  if (id) { state.toneCustom = ''; $('apb-tone-custom').value = ''; }
  renderPills('apb-tone-pills', TONES, state.tonePresetId, reToneSelect);
  renderStarterPresets();
  updateToneSummary(); updateCharCount(); persist();
}

function applyStarterPreset(id) {
  const preset = STARTER_PRESETS.find(item => item.id === id);
  if (!preset) return;

  state = {
    ...state,
    starterPresetId: preset.id,
    starterFilter: preset.category,
    roleCustom: '',
    formatCustom: '',
    toneCustom: '',
    ...preset.slots,
  };

  applyStateToDOM();
  persist();
}

function applyStateToDOM() {
  $('apb-task').value = state.task;
  $('apb-role-custom').value = state.roleCustom;
  $('apb-context').value = state.contextText;
  $('apb-format-custom').value = state.formatCustom;
  $('apb-tone-custom').value = state.toneCustom || '';
  if (!state.starterFilter) state.starterFilter = 'All';
  renderStarterFilters();
  renderStarterPresets();
  renderPills('apb-role-pills', ROLES, state.rolePresetId, reRoleSelect);
  renderPills('apb-format-pills', FORMATS, state.formatPresetId, reFormatSelect);
  renderPills('apb-tone-pills', TONES, state.tonePresetId, reToneSelect);
  updateRoleSummary();
  updateContextSummary();
  updateFormatSummary();
  updateToneSummary();
  updateCharCount();
  renderTemplates();
}

// ── Init ──────────────────────────────────────────────────────────────────────

export function init(context) {
  container = context.container;
  restore();

  applyStateToDOM();

  // Task input
  $('apb-task').addEventListener('input', e => {
    state.task = e.target.value;
    state.starterPresetId = null;
    renderStarterPresets();
    updateCharCount();
    persist();
  });

  // Role custom text
  $('apb-role-custom').addEventListener('input', e => {
    state.roleCustom = e.target.value;
    if (state.roleCustom.trim()) {
      state.rolePresetId = null;
      state.starterPresetId = null;
    }
    renderPills('apb-role-pills', ROLES, state.rolePresetId, reRoleSelect);
    renderStarterPresets();
    updateRoleSummary(); updateCharCount(); persist();
  });

  // Context
  $('apb-context').addEventListener('input', e => {
    state.contextText = e.target.value;
    state.starterPresetId = null;
    renderStarterPresets();
    updateContextSummary(); updateCharCount(); persist();
  });

  // Format custom text
  $('apb-format-custom').addEventListener('input', e => {
    state.formatCustom = e.target.value;
    if (state.formatCustom.trim()) {
      state.formatPresetId = null;
      state.starterPresetId = null;
    }
    renderPills('apb-format-pills', FORMATS, state.formatPresetId, reFormatSelect);
    renderStarterPresets();
    updateFormatSummary(); updateCharCount(); persist();
  });

  // Tone custom text
  $('apb-tone-custom').addEventListener('input', e => {
    state.toneCustom = e.target.value;
    if (state.toneCustom.trim()) {
      state.tonePresetId = null;
      state.starterPresetId = null;
    }
    renderPills('apb-tone-pills', TONES, state.tonePresetId, reToneSelect);
    renderStarterPresets();
    updateToneSummary(); updateCharCount(); persist();
  });

  // Slot toggles
  container.querySelectorAll('.apb-slot-toggle').forEach(btn => {
    btn.addEventListener('click', () => toggleSlot(btn.dataset.slot));
  });

  // Actions
  $('apb-copy-btn').addEventListener('click', copyPrompt);
  $('apb-clear-btn').addEventListener('click', clearAll);
  $('apb-save-btn').addEventListener('click', showSaveDialog);

  // Dialog
  $('apb-dialog-confirm').addEventListener('click', confirmSave);
  $('apb-dialog-cancel').addEventListener('click', hideSaveDialog);
  $('apb-template-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmSave();
    if (e.key === 'Escape') hideSaveDialog();
  });
  $('apb-dialog-backdrop').addEventListener('click', e => {
    if (e.target === $('apb-dialog-backdrop')) hideSaveDialog();
  });

  // Keyboard shortcut: Ctrl+Enter / Cmd+Enter to copy
  container.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); copyPrompt(); }
  });
}

export function cleanup() {}
</script>

</body>
</html>
