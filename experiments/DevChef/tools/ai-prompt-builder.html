<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Builder - DevChef Tool</title>
</head>
<body>

<!-- DevChef Manifest -->
<script type="devchef-manifest">
{
  "id": "ai-prompt-builder",
  "name": "AI Prompt Builder",
  "category": "Developer Tools",
  "description": "Compose structured AI prompts with snippet management, personas, tech stacks, and templates",
  "keywords": ["ai", "prompt", "llm", "chatgpt", "claude", "composer", "rules", "personas", "templates", "sharing", "snippets"],
  "version": "11.0.0"
}
</script>

<!-- Tool UI Template -->
<template id="tool-ui">
  <div class="tool-container">
    <div class="tool-header">
      <h2 class="tool-title">AI Prompt Builder</h2>
      <p class="tool-description">Compose structured prompts with snippet management, personas and tech stack awareness</p>
    </div>

    <div class="intent-starter">
      <div class="intent-starter-header">
        <h3>Intent Starter</h3>
        <div class="intent-header-actions">
          <button id="intent-paste-btn" class="secondary" type="button" title="Paste from clipboard (Alt+V)">Paste</button>
          <button id="intent-clear-btn" class="secondary" type="button" title="Clear intent (Alt+Backspace)">Clear</button>
          <button id="intent-refine-toggle" class="secondary" type="button" title="Toggle refine (Alt+R)">Refine options</button>
        </div>
      </div>
      <div class="intent-mode-group" id="intent-mode-group">
        <button type="button" class="intent-mode-btn intent-primary-mode-btn" data-intent-mode="create">Create</button>
        <button type="button" class="intent-mode-btn intent-primary-mode-btn" data-intent-mode="analyze">Analyze</button>
        <button type="button" class="intent-mode-btn intent-primary-mode-btn" data-intent-mode="rewrite">Rewrite</button>
        <button type="button" class="intent-mode-btn intent-primary-mode-btn" data-intent-mode="plan">Plan</button>
      </div>
      <div class="intent-workflow-group" id="intent-workflow-group">
        <button type="button" class="intent-mode-btn" data-workflow-profile="rapid">Rapid</button>
        <button type="button" class="intent-mode-btn" data-workflow-profile="balanced">Balanced</button>
        <button type="button" class="intent-mode-btn" data-workflow-profile="deep">Deep</button>
      </div>
      <div class="intent-fields">
        <div class="intent-field">
          <label for="intent-goal">Goal</label>
          <textarea id="intent-goal" rows="2" placeholder="What outcome do you want?"></textarea>
        </div>
        <div class="intent-field">
          <label for="intent-input">Input / Context</label>
          <textarea id="intent-input" rows="2" placeholder="Paste context, draft text, notes, links, or data"></textarea>
        </div>
        <div class="intent-field">
          <label for="intent-output-options">Output format</label>
          <div class="intent-output-grid" id="intent-output-options">
            <button type="button" class="intent-mode-btn" data-intent-output="bullets">Bullet List</button>
            <button type="button" class="intent-mode-btn" data-intent-output="checklist">Checklist</button>
            <button type="button" class="intent-mode-btn" data-intent-output="table">Table</button>
            <button type="button" class="intent-mode-btn" data-intent-output="summary">Executive Summary</button>
            <button type="button" class="intent-mode-btn" data-intent-output="steps">Step-by-step Plan</button>
            <button type="button" class="intent-mode-btn" data-intent-output="json">Structured JSON</button>
          </div>
        </div>
      </div>
      <div class="intent-status" id="intent-status-chips"></div>
    </div>

    <div class="snippet-layout">
      <!-- Left Sidebar -->
      <div class="snippet-sidebar">
        <div class="snippet-sidebar-header">
          <div class="snippet-view-toggle">
            <button type="button" class="snippet-view-btn active" data-view="project">By Project</button>
            <button type="button" class="snippet-view-btn" data-view="tag">By Tag</button>
          </div>
          <input type="text" id="snippet-search" class="snippet-search" placeholder="Filter snippets..." />
        </div>

        <div class="snippet-compose-info" id="snippet-compose-info">
          <span>0 snippets in prompt</span>
        </div>

        <div class="snippet-tree" id="snippet-tree">
          <!-- Rendered by JS -->
        </div>

        <div class="snippet-sidebar-actions">
          <button id="add-snippet-btn" class="primary snippet-action-btn">+ Snippet</button>
          <button id="add-project-btn" class="secondary snippet-action-btn">+ Project</button>
        </div>

        <div class="templates-section">
          <div class="section-header collapsible" id="templates-header">
            <label class="section-label">Templates</label>
            <div class="template-actions">
              <button id="save-template-btn" class="icon-btn" title="Save as Template">Save</button>
              <button class="collapse-btn">&#9660;</button>
            </div>
          </div>
          <div class="templates-content" id="templates-content">
            <div class="template-filter">
              <input type="text" id="template-search" placeholder="Search templates..." />
              <select id="template-category" class="category-select">
                <option value="">All</option>
                <option value="development">Dev</option>
                <option value="writing">Writing</option>
                <option value="analysis">Analysis</option>
                <option value="documentation">Docs</option>
                <option value="custom">Custom</option>
              </select>
            </div>
            <div class="templates-grid" id="templates-grid"></div>
          </div>
        </div>

        <div class="snippet-sidebar-footer">
          <button id="import-config-btn" class="icon-btn" title="Import">Import</button>
          <button id="export-config-btn" class="icon-btn" title="Export">Export</button>
        </div>
      </div>

      <!-- Right Panel: Editor + Preview -->
      <div class="snippet-editor-panel">
        <div class="snippet-editor-area" id="snippet-editor-area">
          <div class="snippet-empty" id="snippet-empty-state">
            <p>Select a snippet to edit, or create a new one.</p>
          </div>
          <div class="snippet-editor-fields" id="snippet-editor-fields" style="display:none;">
            <div class="snippet-field-row">
              <label>Name</label>
              <input type="text" id="snippet-name" placeholder="Snippet name" />
            </div>
            <div class="snippet-field-row-inline">
              <div class="snippet-field-row">
                <label>Project</label>
                <select id="snippet-project"></select>
              </div>
              <div class="snippet-field-row">
                <label>Component Type</label>
                <select id="snippet-type"></select>
              </div>
            </div>
            <div class="snippet-field-row">
              <label>Tags</label>
              <div class="snippet-tags-selector" id="snippet-tags-selector"></div>
            </div>
            <div class="snippet-field-row">
              <label>Content</label>
              <textarea id="snippet-content" rows="8" placeholder="Snippet content..."></textarea>
            </div>
            <div class="snippet-editor-actions">
              <label class="snippet-include-label"><input type="checkbox" id="snippet-include-check" /> Include in prompt</label>
              <button id="snippet-copy-btn" class="secondary">Copy</button>
              <button id="snippet-duplicate-btn" class="secondary">Duplicate</button>
              <button id="snippet-delete-btn" class="secondary">Delete</button>
            </div>
          </div>
        </div>

        <div class="snippet-preview-section">
          <div class="snippet-preview-header">
            <h3>Composed Prompt</h3>
            <div class="panel-actions">
              <button id="share-btn" class="secondary" title="Share Configuration">Share</button>
              <button id="copy-prompt-btn" class="primary">Copy</button>
              <button id="save-prompt-btn" class="secondary">Save</button>
            </div>
          </div>
          <div class="preview-area">
            <textarea id="final-prompt" readonly placeholder="Your composed prompt will appear here..."></textarea>
          </div>
          <div class="stats-bar">
            <span id="char-count">0 characters</span>
            <span id="word-count">0 words</span>
          </div>
        </div>
      </div>
    </div>

    <input type="file" id="file-input" accept=".json" style="display: none;">
    <div id="status-message" class="status-message"></div>

    <!-- Persona Selection Modal -->
    <div id="persona-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Select a Persona</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="personas-grid" id="personas-grid"></div>
        </div>
      </div>
    </div>

    <!-- Tech Stack Selection Modal -->
    <div id="techstack-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Select Technology Stack</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="techstack-search">
            <input type="text" id="techstack-search" placeholder="Search technologies..." />
          </div>
          <div class="techstack-grid" id="techstack-grid"></div>
        </div>
      </div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Share Configuration</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="share-section">
            <label class="share-label">Shareable Link</label>
            <div class="share-input-group">
              <input type="text" id="share-link" readonly class="share-link-input" />
              <button id="copy-link-btn" class="primary">Copy</button>
            </div>
            <p class="share-hint">Share this link with others to import your configuration</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Save Template Modal -->
    <div id="save-template-modal" class="modal">
      <div class="modal-content modal-small">
        <div class="modal-header">
          <h3>Save as Template</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Template Name</label>
            <input type="text" id="template-name" placeholder="e.g., My Custom Template" class="form-input" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="template-description" placeholder="Brief description of this template..." class="form-input" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="template-category-select" class="form-input">
              <option value="custom">Custom</option>
              <option value="development">Development</option>
              <option value="writing">Writing</option>
              <option value="analysis">Analysis</option>
              <option value="documentation">Documentation</option>
            </select>
          </div>
          <div class="modal-actions">
            <button id="save-template-confirm-btn" class="primary">Save Template</button>
            <button class="secondary modal-close">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- Tool Styles -->
<style>
  * {
    scroll-behavior: smooth;
  }

  .modal,
  .icon-btn {
    will-change: transform;
    transform: translateZ(0);
    backface-visibility: hidden;
  }

  .tool-container {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .updating {
    animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  /* ========================================
     Intent Starter
     ======================================== */

  .intent-starter {
    margin-top: 14px;
    padding: 14px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background: linear-gradient(160deg, var(--bg-secondary), color-mix(in srgb, var(--bg-secondary) 88%, var(--accent) 12%));
  }

  .intent-starter-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .intent-header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .intent-header-actions button {
    margin: 0;
    padding: 6px 10px;
    font-size: 11px;
    border-radius: var(--radius-lg);
  }

  .intent-starter-header h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 700;
  }

  .intent-mode-group {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 10px;
    padding: 10px;
    border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border-color) 65%);
    border-radius: 12px;
    background: color-mix(in srgb, var(--accent) 14%, var(--bg-primary) 86%);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
    position: relative;
  }

  .intent-mode-group .intent-primary-mode-btn {
    min-height: 42px;
    font-size: 13px;
    letter-spacing: 0.01em;
    border-width: 1.5px;
    background: linear-gradient(160deg,
      color-mix(in srgb, var(--bg-primary) 88%, var(--accent) 12%),
      color-mix(in srgb, var(--bg-primary) 78%, var(--accent) 22%));
    box-shadow: 0 6px 16px color-mix(in srgb, var(--accent) 16%, transparent);
  }

  .intent-mode-group .intent-primary-mode-btn:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 10px 22px color-mix(in srgb, var(--accent) 24%, transparent);
  }

  .intent-mode-group .intent-primary-mode-btn.active {
    background: linear-gradient(155deg, var(--accent), color-mix(in srgb, var(--accent) 78%, black));
    color: white;
    border-color: color-mix(in srgb, var(--accent) 72%, black);
    box-shadow:
      0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent),
      0 14px 24px color-mix(in srgb, var(--accent) 34%, transparent);
  }

  .intent-workflow-group {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 10px;
  }

  .intent-workflow-group .intent-mode-btn {
    border-radius: 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 7px 8px;
  }

  .intent-mode-group::before {
    content: "Start here";
    position: absolute;
    top: -10px;
    left: 12px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent);
    color: white;
  }

  .intent-mode-btn {
    border: 1px solid var(--border-color);
    background: var(--bg-primary);
    color: var(--text-primary);
    border-radius: 999px;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition-fast);
  }

  .intent-mode-btn:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .intent-mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 24%, transparent);
  }

  .intent-mode-group .intent-mode-btn:not(.active) {
    animation: intent-nudge 2.4s ease-in-out infinite;
  }

  @keyframes intent-nudge {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-1px); }
  }

  .intent-fields {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .intent-output-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .intent-status {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .intent-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--border-color) 76%);
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 11px;
    color: var(--text-secondary);
    background: color-mix(in srgb, var(--bg-primary) 84%, var(--accent) 16%);
  }

  .intent-chip strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  .intent-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .intent-field label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .intent-field textarea,
  .intent-field input {
    width: 100%;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 8px 10px;
    font-size: 12px;
    transition: var(--transition-fast);
  }

  .intent-field textarea {
    resize: vertical;
    min-height: 56px;
    line-height: 1.45;
  }

  .intent-field textarea:focus,
  .intent-field input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
  }

  .tool-container[data-intent-refine="closed"] .snippet-layout {
    display: none;
  }

  /* ========================================
     Snippet Layout
     ======================================== */

  .snippet-layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    margin-top: 20px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    overflow: hidden;
    min-height: 600px;
  }

  .snippet-sidebar {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .snippet-sidebar-header {
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-primary);
  }

  .snippet-view-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 8px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .snippet-view-btn {
    flex: 1;
    padding: 6px 10px;
    border: none;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition-fast);
  }

  .snippet-view-btn.active {
    background: var(--accent);
    color: white;
  }

  .snippet-search {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    font-size: 12px;
    background: var(--bg-secondary);
    color: var(--text-primary);
  }

  .snippet-search:focus {
    outline: none;
    border-color: var(--accent);
  }

  .snippet-compose-info {
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    border-bottom: 1px solid var(--border-color);
    background: color-mix(in srgb, var(--accent) 8%, var(--bg-primary));
  }

  .snippet-tree {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    -webkit-overflow-scrolling: touch;
  }

  .snippet-project-group {
    margin-bottom: 6px;
  }

  .snippet-project-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: var(--radius-sm);
    user-select: none;
  }

  .snippet-project-header:hover {
    background: var(--bg-hover);
  }

  .snippet-project-header .snippet-group-count {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-secondary);
    opacity: 0.7;
  }

  .snippet-project-header .snippet-group-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity var(--transition-fast);
  }

  .snippet-project-header:hover .snippet-group-actions {
    opacity: 1;
  }

  .snippet-group-action-btn {
    background: transparent;
    border: none;
    font-size: 11px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    color: var(--text-secondary);
  }

  .snippet-group-action-btn:hover {
    background: var(--bg-primary);
    color: var(--accent);
  }

  .snippet-project-items {
    padding-left: 8px;
  }

  .snippet-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    transition: var(--transition-fast);
    border: 1px solid transparent;
  }

  .snippet-item:hover {
    background: var(--bg-hover);
  }

  .snippet-item.selected {
    background: color-mix(in srgb, var(--accent) 12%, var(--bg-primary));
    border-color: color-mix(in srgb, var(--accent) 30%, transparent);
  }

  .snippet-item input[type="checkbox"] {
    flex-shrink: 0;
    cursor: pointer;
    accent-color: var(--accent);
  }

  .snippet-item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-primary);
  }

  .snippet-type-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    font-weight: 600;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .snippet-sidebar-actions {
    padding: 8px 12px;
    border-top: 1px solid var(--border-color);
    display: flex;
    gap: 6px;
  }

  .snippet-action-btn {
    flex: 1;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 600;
    border-radius: var(--radius-sm);
    cursor: pointer;
  }

  .snippet-sidebar-footer {
    padding: 8px 12px;
    border-top: 1px solid var(--border-color);
    display: flex;
    gap: 6px;
    background: var(--bg-primary);
  }

  .snippet-sidebar-footer .icon-btn {
    flex: 1;
    text-align: center;
    font-size: 11px;
  }

  /* ========================================
     Snippet Editor Panel
     ======================================== */

  .snippet-editor-panel {
    display: flex;
    flex-direction: column;
    background: var(--bg-primary);
    overflow: hidden;
  }

  .snippet-editor-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .snippet-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-secondary);
    font-size: 13px;
    font-style: italic;
  }

  .snippet-editor-fields {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .snippet-field-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  // ============================================================================
  // Snippet Manager
  // ============================================================================

  class SnippetManager {
    constructor(storageKey) {
      this.storageKey = storageKey;
      this.projects = ['General'];
      this.snippets = [];
      this.enabledIds = [];
      this.selectedId = null;
      this.viewMode = 'project';
      this.filterText = '';
    }

    load() {
      const saved = loadToolState(this.storageKey);
      if (saved) {
        this.projects = saved.projects || ['General'];
        this.snippets = saved.snippets || [];
        this.enabledIds = saved.enabledIds || [];
      }
    }

    save() {
      saveToolState(this.storageKey, {
        projects: this.projects,
        snippets: this.snippets,
        enabledIds: this.enabledIds
      });
    }

    createSnippet(overrides = {}) {
      const snippet = {
        id: 'snip-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
        name: overrides.name || 'New Snippet',
        content: overrides.content || '',
        project: overrides.project || this.projects[0] || 'General',
        componentType: overrides.componentType || 'task',
        tags: overrides.tags || [],
        createdAt: Date.now(),
        updatedAt: Date.now()
      };
      this.snippets.push(snippet);
      this.save();
      return snippet;
    }

    updateSnippet(id, updates) {
      const snippet = this.snippets.find(s => s.id === id);
      if (snippet) {
        Object.assign(snippet, updates, { updatedAt: Date.now() });
        this.save();
      }
      return snippet;
    }

    deleteSnippet(id) {
      this.snippets = this.snippets.filter(s => s.id !== id);
      this.enabledIds = this.enabledIds.filter(eid => eid !== id);
      if (this.selectedId === id) this.selectedId = null;
      this.save();
    }

    duplicateSnippet(id) {
      const original = this.snippets.find(s => s.id === id);
      if (!original) return null;
      return this.createSnippet({
        name: original.name + ' (copy)',
        content: original.content,
        project: original.project,
        componentType: original.componentType,
        tags: [...original.tags]
      });
    }

    addProject(name) {
      if (name && !this.projects.includes(name)) {
        this.projects.push(name);
        this.save();
      }
    }

    deleteProject(name) {
      if (name === 'General') return;
      this.projects = this.projects.filter(p => p !== name);
      this.snippets.forEach(s => { if (s.project === name) s.project = 'General'; });
      this.save();
    }

    toggleEnabled(id) {
      const idx = this.enabledIds.indexOf(id);
      if (idx > -1) this.enabledIds.splice(idx, 1);
      else this.enabledIds.push(id);
      this.save();
    }

    isEnabled(id) {
      return this.enabledIds.includes(id);
    }

    getEnabledSnippets() {
      return this.snippets
        .filter(s => this.enabledIds.includes(s.id))
        .sort((a, b) => COMPONENT_TYPE_ORDER.indexOf(a.componentType) - COMPONENT_TYPE_ORDER.indexOf(b.componentType));
    }

    getByProject() {
      const groups = {};
      this.projects.forEach(p => { groups[p] = []; });
      this.getFiltered().forEach(s => {
        if (!groups[s.project]) groups[s.project] = [];
        groups[s.project].push(s);
      });
      return groups;
    }

    getByTag() {
      const groups = {};
      USE_CASE_TAGS.forEach(t => { groups[t.label] = []; });
      groups['Untagged'] = [];
      this.getFiltered().forEach(s => {
        if (!s.tags || s.tags.length === 0) {
          groups['Untagged'].push(s);
        } else {
          s.tags.forEach(tag => {
            const tagLabel = USE_CASE_TAGS.find(t => t.id === tag)?.label || tag;
            if (!groups[tagLabel]) groups[tagLabel] = [];
            groups[tagLabel].push(s);
          });
        }
      });
      return groups;
    }

    getFiltered() {
      if (!this.filterText) return this.snippets;
      const q = this.filterText.toLowerCase();
      return this.snippets.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.content.toLowerCase().includes(q) ||
        s.project.toLowerCase().includes(q)
      );
    }

    getSelected() {
      return this.snippets.find(s => s.id === this.selectedId) || null;
    }
  }

  function migrateComponentsToSnippets() {
    if (snippetMgr.snippets.length > 0) return;

    // Try legacy migration first
    const saved = loadToolState('ai-prompt-builder');
    if (saved?.config?.components?.length) {
      const components = saved.config.components;
      components.forEach(comp => {
        if (!comp.content) return;
        const componentType = LEGACY_ID_TO_TYPE[comp.id] || 'task';
        const snippet = snippetMgr.createSnippet({
          name: comp.name || comp.id,
          content: comp.content,
          project: 'General',
          componentType: componentType,
          tags: []
        });
        if (comp.enabled) {
          snippetMgr.enabledIds.push(snippet.id);
        }
      });
      snippetMgr.save();
      return;
    }

    // Seed defaults
    seedDefaultSnippets(snippetMgr);
  }

  // ============================================================================
  // Intent Logic
  // ============================================================================

  function ensureIntentState() {
    if (!INTENT_MODES.includes(state.intentMode)) state.intentMode = 'create';
    if (!WORKFLOW_PROFILES.includes(state.workflowProfile)) state.workflowProfile = 'balanced';
    if (typeof state.intentGoal !== 'string') state.intentGoal = '';
    if (typeof state.intentInput !== 'string') state.intentInput = '';
    if (!INTENT_OUTPUT_OPTIONS.some(o => o.id === state.intentOutput)) {
      state.intentOutput = DEFAULT_OUTPUT_BY_MODE[state.intentMode];
    }
    state.showRefine = Boolean(state.showRefine);
  }

  function getIntentOutputLabel() {
    const selected = INTENT_OUTPUT_OPTIONS.find(o => o.id === state.intentOutput);
    return selected?.label || state.intentOutput;
  }

  function clearIntentFields() {
    state.intentGoal = '';
    state.intentInput = '';
    state.intentOutput = DEFAULT_OUTPUT_BY_MODE[state.intentMode] || 'steps';
    renderIntentControls();
    updatePreview();
    saveConfig();
    showStatus('Intent cleared', 'info');
  }

  async function pasteIntentContext() {
    try {
      const text = await navigator.clipboard.readText();
      if (!text) { showStatus('Clipboard is empty', 'info'); return; }
      state.intentInput = text;
      renderIntentControls();
      updatePreview();
      saveConfig();
      showStatus('Clipboard pasted into Input/Context', 'success');
    } catch (error) {
      showStatus('Clipboard access denied', 'error');
    }
  }

  function applyWorkflowProfile(profile, options = {}) {
    const { silent = false } = options;
    if (!WORKFLOW_PROFILES.includes(profile)) return;

    state.workflowProfile = profile;
    state.showRefine = profile !== 'rapid';

    renderIntentControls();
    renderSnippetTree();
    renderSnippetEditor();
    updatePreview();
    saveConfig();
    if (!silent) {
      showStatus(`Workflow: ${profile}`, 'success');
    }
  }

  function renderIntentControls() {
    ensureIntentState();
    const container = document.querySelector('.tool-container');
    if (container) {
      container.dataset.intentMode = state.intentMode;
      container.dataset.intentRefine = state.showRefine ? 'open' : 'closed';
    }

    document.querySelectorAll('.intent-mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.intentMode === state.intentMode);
    });

    document.querySelectorAll('[data-workflow-profile]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.workflowProfile === state.workflowProfile);
    });

    const goalInput = document.getElementById('intent-goal');
    if (goalInput) goalInput.value = state.intentGoal;

    const inputArea = document.getElementById('intent-input');
    if (inputArea) inputArea.value = state.intentInput;

    document.querySelectorAll('[data-intent-output]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.intentOutput === state.intentOutput);
    });

    const refineToggle = document.getElementById('intent-refine-toggle');
    if (refineToggle) {
      refineToggle.textContent = state.showRefine ? 'Hide refine' : 'Refine options';
    }

    const intentStatusChips = document.getElementById('intent-status-chips');
    if (intentStatusChips) {
      intentStatusChips.innerHTML = `
        <span class="intent-chip">Mode <strong>${state.intentMode}</strong></span>
        <span class="intent-chip">Workflow <strong>${state.workflowProfile}</strong></span>
        <span class="intent-chip">Output <strong>${getIntentOutputLabel()}</strong></span>
        <span class="intent-chip">Refine <strong>${state.showRefine ? 'on' : 'off'}</strong></span>
        <span class="intent-chip">Shortcuts <strong>Alt+1..7 / Alt+R / Alt+V</strong></span>
      `;
    }
  }

  function composeIntentHeader() {
    if (!state.intentMode) return '';
    return `Intent:\nMode: ${state.intentMode}\n\n`;
  }

  // ============================================================================
  // Snippet Tree Rendering
  // ============================================================================

  function renderSnippetTree() {
    const tree = document.getElementById('snippet-tree');
    if (!tree) return;

    const groups = snippetMgr.viewMode === 'project'
      ? snippetMgr.getByProject()
      : snippetMgr.getByTag();

    let html = '';
    for (const [groupName, items] of Object.entries(groups)) {
      const isProject = snippetMgr.viewMode === 'project';
      const canDelete = isProject && groupName !== 'General';
      const deleteBtn = canDelete
        ? `<span class="snippet-group-actions"><button class="snippet-group-action-btn" data-delete-project="${groupName}" title="Delete project">x</button></span>`
        : '';

      html += `<div class="snippet-project-group">
        <div class="snippet-project-header" data-group="${groupName}">
          <span>${groupName} <span class="snippet-group-count">(${items.length})</span></span>
          ${deleteBtn}
        </div>
        <div class="snippet-project-items">`;

      items.forEach(snippet => {
        const isEnabled = snippetMgr.isEnabled(snippet.id);
        const isSelected = snippetMgr.selectedId === snippet.id;
        const typeLabel = COMPONENT_TYPES.find(t => t.id === snippet.componentType)?.label || snippet.componentType;

        html += `<div class="snippet-item ${isSelected ? 'selected' : ''}" data-snippet-id="${snippet.id}">
          <input type="checkbox" ${isEnabled ? 'checked' : ''} data-toggle-id="${snippet.id}" title="Include in prompt" />
          <span class="snippet-item-name">${escapeHtml(snippet.name)}</span>
          <span class="snippet-type-badge">${typeLabel}</span>
        </div>`;
      });

      html += `</div></div>`;
    }

    if (!html.trim() || snippetMgr.snippets.length === 0) {
      html = '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:12px;font-style:italic;">No snippets yet. Create one to get started.</div>';
    }

    tree.innerHTML = html;

    // Update compose info
    const composeInfo = document.getElementById('snippet-compose-info');
    if (composeInfo) {
      const count = snippetMgr.getEnabledSnippets().length;
      composeInfo.innerHTML = `<span>${count} snippet${count !== 1 ? 's' : ''} in prompt</span>`;
    }

    // Update view toggle buttons
    document.querySelectorAll('.snippet-view-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === snippetMgr.viewMode);
    });
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ============================================================================
  // Snippet Editor Rendering
  // ============================================================================

  function renderSnippetEditor() {
    const emptyState = document.getElementById('snippet-empty-state');
    const editorFields = document.getElementById('snippet-editor-fields');
    if (!emptyState || !editorFields) return;

    const snippet = snippetMgr.getSelected();
    if (!snippet) {
      emptyState.style.display = '';
      editorFields.style.display = 'none';
      return;
    }

    emptyState.style.display = 'none';
    editorFields.style.display = '';

    document.getElementById('snippet-name').value = snippet.name;

    // Project dropdown
    const projectSelect = document.getElementById('snippet-project');
    projectSelect.innerHTML = snippetMgr.projects.map(p =>
      `<option value="${escapeHtml(p)}" ${p === snippet.project ? 'selected' : ''}>${escapeHtml(p)}</option>`
    ).join('');

    // Component type dropdown
    const typeSelect = document.getElementById('snippet-type');
    typeSelect.innerHTML = COMPONENT_TYPES.map(t =>
      `<option value="${t.id}" ${t.id === snippet.componentType ? 'selected' : ''}>${t.label}</option>`
    ).join('');

    // Tags
    const tagsContainer = document.getElementById('snippet-tags-selector');
    tagsContainer.innerHTML = USE_CASE_TAGS.map(t => {
      const active = (snippet.tags || []).includes(t.id) ? 'active' : '';
      return `<span class="snippet-tag-chip ${active}" data-tag-id="${t.id}">${t.label}</span>`;
    }).join('');

    // Content
    document.getElementById('snippet-content').value = snippet.content;

    // Include checkbox
    document.getElementById('snippet-include-check').checked = snippetMgr.isEnabled(snippet.id);
  }

  // ============================================================================
  // Preview
  // ============================================================================

  function updatePreview() {
    let prompt = composeIntentHeader();
    const intentOutput = INTENT_OUTPUT_OPTIONS.find(o => o.id === state.intentOutput);
    const intentOutputLabel = intentOutput?.label || state.intentOutput;

    if (!state.showRefine) {
      const summaryLines = [];
      summaryLines.push(state.intentGoal || 'Help me with this request.');
      if (state.intentInput) summaryLines.push(`Context:\n${state.intentInput}`);
      if (intentOutputLabel) summaryLines.push(`Return format: ${intentOutputLabel}`);
      prompt += `Request:\n${summaryLines.join('\n\n')}`;
    } else {
      const enabled = snippetMgr.getEnabledSnippets();
      if (enabled.length > 0) {
        prompt += enabled
          .map(s => {
            const typeLabel = COMPONENT_TYPES.find(t => t.id === s.componentType)?.label || s.componentType;
            return `${typeLabel} - ${s.name}:\n${s.content}`;
          })
          .join('\n\n');
      } else {
        const summaryLines = [];
        summaryLines.push(state.intentGoal || 'Help me with this request.');
        if (state.intentInput) summaryLines.push(`Context:\n${state.intentInput}`);
        if (intentOutputLabel) summaryLines.push(`Return format: ${intentOutputLabel}`);
        prompt += `Request:\n${summaryLines.join('\n\n')}`;
      }
    }

    const textarea = document.getElementById('final-prompt');
    if (textarea) textarea.value = prompt;

    renderIntentControls();

    const chars = prompt.length;
    const words = countWords(prompt);
    const charEl = document.getElementById('char-count');
    const wordEl = document.getElementById('word-count');
    if (charEl) charEl.textContent = `${chars} characters`;
    if (wordEl) wordEl.textContent = `${words} words`;
  }

  // ============================================================================
  // Config Save/Load
  // ============================================================================

  function saveConfig() {
    saveToolState('ai-prompt-builder', {
      config: state.config,
      intent: {
        intentMode: state.intentMode,
        workflowProfile: state.workflowProfile,
        intentGoal: state.intentGoal,
        intentInput: state.intentInput,
        intentOutput: state.intentOutput,
        showRefine: state.showRefine
      }
    });
  }

  const debouncedUpdatePreview = debounce(updatePreview, 150);
  const debouncedSaveConfig = debounce(saveConfig, 500);
  const debouncedRenderTree = debounce(renderSnippetTree, 100);

  function loadConfig() {
    const saved = loadToolState('ai-prompt-builder');
    if (saved) {
      if (saved.config) state.config = saved.config;
      if (saved.intent) {
        state.intentMode = saved.intent.intentMode ?? state.intentMode;
        state.workflowProfile = saved.intent.workflowProfile ?? state.workflowProfile;
        state.intentGoal = saved.intent.intentGoal ?? state.intentGoal;
        state.intentInput = saved.intent.intentInput ?? state.intentInput;
        state.intentOutput = saved.intent.intentOutput ?? state.intentOutput;
        state.showRefine = saved.intent.showRefine ?? state.showRefine;
      }
    }
    ensureIntentState();
  }

  function showStatus(message, type = 'info') {
    const statusEl = document.getElementById('status-message');
    if (!statusEl) return;
    statusEl.textContent = message;
    statusEl.className = `status-message show ${type}`;
    setTimeout(() => { statusEl.classList.remove('show'); }, 3000);
  }

  // ============================================================================
  // Templates
  // ============================================================================

  const debouncedFilterTemplates = debounce(function() { renderTemplates(); }, 200);

  function renderTemplates() {
    const grid = document.getElementById('templates-grid');
    if (!grid) return;
    const allTemplates = { ...TEMPLATES };
    state.customTemplates.forEach(t => { allTemplates[t.id] = t; });

    const filtered = filterTemplatesBySearch(allTemplates);

    grid.innerHTML = Object.entries(filtered).map(([id, template]) => {
      const isCustom = state.customTemplates.some(t => t.id === id);
      const customClass = isCustom ? 'custom-template' : '';
      const deleteBtn = isCustom ? `<button class="delete-template-btn" data-template="${id}">x</button>` : '';
      return `<button class="template-btn ${customClass}" data-template="${id}">${template.name}${deleteBtn}</button>`;
    }).join('');
  }

  function filterTemplatesBySearch(templates) {
    const searchEl = document.getElementById('template-search');
    const catEl = document.getElementById('template-category');
    const search = searchEl ? searchEl.value.toLowerCase() : '';
    const category = catEl ? catEl.value : '';

    return Object.fromEntries(
      Object.entries(templates).filter(([id, template]) => {
        const matchesSearch = !search || template.name.toLowerCase().includes(search);
        const matchesCategory = !category || template.category === category;
        return matchesSearch && matchesCategory;
      })
    );
  }

  function filterTemplates() { debouncedFilterTemplates(); }

  function handleTemplateClick(e) {
    const deleteBtn = e.target.closest('.delete-template-btn');
    if (deleteBtn) {
      e.stopPropagation();
      deleteCustomTemplate(deleteBtn.dataset.template);
      return;
    }
    const templateBtn = e.target.closest('.template-btn');
    if (templateBtn) {
      loadTemplate(templateBtn.dataset.template);
    }
  }

  function loadTemplate(templateId) {
    const template = TEMPLATES[templateId] || state.customTemplates.find(t => t.id === templateId);
    if (!template) return;

    if (!confirm(`Load "${template.name}" template? This creates a project and snippets.`)) return;

    const projectName = template.name;
    snippetMgr.addProject(projectName);

    const components = template.components || [];
    const newIds = [];
    components.forEach(comp => {
      if (!comp.content) return;
      const componentType = LEGACY_ID_TO_TYPE[comp.id] || comp.id || 'task';
      const snippet = snippetMgr.createSnippet({
        name: comp.name || comp.id,
        content: comp.content,
        project: projectName,
        componentType: COMPONENT_TYPES.some(t => t.id === componentType) ? componentType : 'task',
        tags: []
      });
      newIds.push(snippet.id);
    });

    // Enable all new snippets
    newIds.forEach(id => {
      if (!snippetMgr.isEnabled(id)) snippetMgr.toggleEnabled(id);
    });
    snippetMgr.save();

    renderSnippetTree();
    renderSnippetEditor();
    updatePreview();
    showStatus(`Template "${template.name}" loaded as project`, 'success');
  }

  function showSaveTemplateModal() {
    const modal = document.getElementById('save-template-modal');
    document.getElementById('template-name').value = '';
    document.getElementById('template-description').value = '';
    document.getElementById('template-category-select').value = 'custom';
    modal.classList.add('show');
  }

  function handleSaveCustomTemplate() {
    const name = document.getElementById('template-name').value.trim();
    const description = document.getElementById('template-description').value.trim();
    const category = document.getElementById('template-category-select').value;

    if (!name) { showStatus('Please enter a template name', 'error'); return; }

    const id = 'custom-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-');

    if (state.customTemplates.some(t => t.id === id)) {
      if (!confirm('A template with this name already exists. Overwrite?')) return;
      state.customTemplates = state.customTemplates.filter(t => t.id !== id);
    }

    // Build components from enabled snippets
    const enabled = snippetMgr.getEnabledSnippets();
    const components = enabled.map((s, i) => ({
      id: s.componentType,
      name: s.name,
      enabled: true,
      order: i + 1,
      content: s.content
    }));

    const template = { id, name, description, category, components };
    state.customTemplates.push(template);
    saveCustomTemplates();
    renderTemplates();
    closeModal();
    showStatus(`Template "${name}" saved`, 'success');
  }

  function deleteCustomTemplate(id) {
    const template = state.customTemplates.find(t => t.id === id);
    if (!template) return;
    if (confirm(`Delete template "${template.name}"?`)) {
      state.customTemplates = state.customTemplates.filter(t => t.id !== id);
      saveCustomTemplates();
      renderTemplates();
      showStatus(`Template "${template.name}" deleted`, 'info');
    }
  }

  function saveCustomTemplates() {
    saveToolState('ai-prompt-builder-templates', { items: state.customTemplates });
  }

  function loadCustomTemplates() {
    const saved = loadToolState('ai-prompt-builder-templates');
    if (saved?.items) state.customTemplates = saved.items;
  }

  // ============================================================================
  // Modals (Persona, TechStack, Share)
  // ============================================================================

  function showPersonaModal() {
    const modal = document.getElementById('persona-modal');
    const grid = document.getElementById('personas-grid');
    const snippet = snippetMgr.getSelected();
    const currentContent = snippet?.content || '';

    const matchedPersona = PERSONAS.find(p => p.content === currentContent);
    const selectedId = matchedPersona?.id || '';

    grid.innerHTML = PERSONAS.map(persona => `
      <div class="persona-card ${persona.id === selectedId ? 'selected' : ''}" data-persona="${persona.id}">
        <div class="persona-name">${persona.name}</div>
        <div class="persona-description">${persona.description}</div>
      </div>
    `).join('');

    grid.onclick = (e) => {
      const card = e.target.closest('.persona-card');
      if (card) {
        const persona = PERSONAS.find(p => p.id === card.dataset.persona);
        if (persona && snippet) {
          snippetMgr.updateSnippet(snippet.id, { content: persona.content, name: persona.name });
          renderSnippetEditor();
          renderSnippetTree();
          updatePreview();
        }
        closeModal();
      }
    };

    modal.classList.add('show');
  }

  function showTechStackModal() {
    const modal = document.getElementById('techstack-modal');
    const grid = document.getElementById('techstack-grid');
    const snippet = snippetMgr.getSelected();

    // Parse selected stacks from content
    const selectedStacks = [];
    if (snippet?.content) {
      const match = snippet.content.match(/Technology stack: (.+)/);
      if (match && match[1] && !match[1].includes('{{')) {
        match[1].split(',').forEach(s => {
          const trimmed = s.trim();
          if (trimmed) selectedStacks.push(trimmed);
        });
      }
    }

    renderTechStackGrid(grid, selectedStacks);

    grid.onclick = (e) => {
      const item = e.target.closest('.techstack-item');
      if (!item || !snippet) return;
      const tech = item.dataset.tech;
      const idx = selectedStacks.indexOf(tech);
      if (idx > -1) selectedStacks.splice(idx, 1);
      else selectedStacks.push(tech);

      const stackList = selectedStacks.length > 0 ? selectedStacks.join(', ') : '{{tech_stack}}';
      snippetMgr.updateSnippet(snippet.id, {
        content: `Technology stack: ${stackList}\n\nPlease provide solutions and examples specific to these technologies.`
      });

      renderTechStackGrid(grid, selectedStacks);
      renderSnippetEditor();
      renderSnippetTree();
      updatePreview();
    };

    modal.classList.add('show');
  }

  function renderTechStackGrid(grid, selectedStacks, filter = '') {
    let html = '';
    Object.entries(TECH_STACKS).forEach(([category, technologies]) => {
      const filtered = technologies.filter(tech => tech.toLowerCase().includes(filter.toLowerCase()));
      filtered.forEach(tech => {
        const selected = selectedStacks.includes(tech) ? 'selected' : '';
        html += `<div class="techstack-item ${selected}" data-tech="${tech}">${tech}</div>`;
      });
    });
    grid.innerHTML = html || '<p style="text-align:center;color:var(--text-secondary);">No technologies found</p>';
  }

  function closeModal() {
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
    state.currentModal = null;
  }

  // ============================================================================
  // Share
  // ============================================================================

  function handleShare() {
    const modal = document.getElementById('share-modal');
    const link = generateShareLink();
    document.getElementById('share-link').value = link;
    modal.classList.add('show');
  }

  function generateShareLink() {
    const data = {
      snippets: snippetMgr.snippets,
      projects: snippetMgr.projects,
      enabledIds: snippetMgr.enabledIds,
      intent: {
        intentMode: state.intentMode,
        workflowProfile: state.workflowProfile,
        intentGoal: state.intentGoal,
        intentInput: state.intentInput,
        intentOutput: state.intentOutput,
        showRefine: state.showRefine
      },
      version: '11.0.0'
    };
    const json = JSON.stringify(data);
    const base64 = btoa(unescape(encodeURIComponent(json)));
    return window.location.href.split('#')[0] + '#share=' + base64;
  }

  function copyShareLink() {
    const input = document.getElementById('share-link');
    copyToClipboard(input.value, {
      onSuccess: () => showStatus('Share link copied!', 'success'),
      onError: () => showStatus('Failed to copy link', 'error')
    });
  }

  function loadFromURL() {
    const hash = window.location.hash;
    if (!hash.startsWith('#share=')) return;
    try {
      const base64 = hash.substring(7);
      const json = decodeURIComponent(escape(atob(base64)));
      const data = JSON.parse(json);

      if (data.snippets && Array.isArray(data.snippets)) {
        if (confirm('Load shared configuration? This will replace your current snippets.')) {
          snippetMgr.snippets = data.snippets;
          snippetMgr.projects = data.projects || ['General'];
          snippetMgr.enabledIds = data.enabledIds || [];
          snippetMgr.save();

          if (data.intent) {
            state.intentMode = data.intent.intentMode ?? state.intentMode;
            state.workflowProfile = data.intent.workflowProfile ?? state.workflowProfile;
            state.intentGoal = data.intent.intentGoal ?? state.intentGoal;
            state.intentInput = data.intent.intentInput ?? state.intentInput;
            state.intentOutput = data.intent.intentOutput ?? state.intentOutput;
            state.showRefine = data.intent.showRefine ?? state.showRefine;
          }
          ensureIntentState();
          renderSnippetTree();
          renderSnippetEditor();
          renderIntentControls();
          updatePreview();
          saveConfig();
          showStatus('Configuration loaded from shared link', 'success');
          window.location.hash = '';
        }
      } else if (data.components && Array.isArray(data.components)) {
        // Legacy share link support
        if (confirm('Load shared configuration (legacy format)?')) {
          data.components.forEach(comp => {
            if (!comp.content) return;
            const componentType = LEGACY_ID_TO_TYPE[comp.id] || 'task';
            const snippet = snippetMgr.createSnippet({
              name: comp.name || comp.id,
              content: comp.content,
              project: 'Imported',
              componentType: componentType
            });
            if (comp.enabled) snippetMgr.toggleEnabled(snippet.id);
          });
          snippetMgr.addProject('Imported');
          snippetMgr.save();
          renderSnippetTree();
          renderSnippetEditor();
          updatePreview();
          showStatus('Legacy config imported as snippets', 'success');
          window.location.hash = '';
        }
      }
    } catch (error) {
      console.error('Failed to load from URL:', error);
      showStatus('Invalid share link', 'error');
    }
  }

  // ============================================================================
  // Import / Export
  // ============================================================================

  function handleImportConfig() {
    const input = document.getElementById('file-input');
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const data = JSON.parse(event.target.result);
          if (data.snippets && Array.isArray(data.snippets)) {
            snippetMgr.snippets = data.snippets;
            snippetMgr.projects = data.projects || ['General'];
            snippetMgr.enabledIds = data.enabledIds || [];
            snippetMgr.selectedId = null;
            snippetMgr.save();
          } else if (data.components && Array.isArray(data.components)) {
            // Legacy import
            data.components.forEach(comp => {
              if (!comp.content) return;
              const componentType = LEGACY_ID_TO_TYPE[comp.id] || 'task';
              const snippet = snippetMgr.createSnippet({
                name: comp.name || comp.id,
                content: comp.content,
                project: 'Imported',
                componentType: componentType
              });
              if (comp.enabled) snippetMgr.toggleEnabled(snippet.id);
            });
            snippetMgr.addProject('Imported');
            snippetMgr.save();
          } else {
            throw new Error('Invalid configuration format');
          }
          renderSnippetTree();
          renderSnippetEditor();
          updatePreview();
          showStatus('Configuration imported successfully', 'success');
        } catch (error) {
          showStatus(`Import failed: ${error.message}`, 'error');
        }
      };
      reader.readAsText(file);
      input.value = '';
    };
    input.click();
  }

  function handleExportConfig() {
    const data = {
      projects: snippetMgr.projects,
      snippets: snippetMgr.snippets,
      enabledIds: snippetMgr.enabledIds,
      version: '11.0.0'
    };
    const json = JSON.stringify(data, null, 2);
    downloadAsFile(json, `prompt-snippets-${Date.now()}.json`, 'application/json');
    showStatus('Snippets exported', 'success');
  }

  function handleCopyPrompt() {
    const text = document.getElementById('final-prompt').value;
    copyToClipboard(text, {
      onSuccess: () => showStatus('Prompt copied to clipboard!', 'success'),
      onError: () => showStatus('Failed to copy prompt', 'error')
    });
  }

  function handleSavePrompt() {
    const prompt = document.getElementById('final-prompt').value;
    if (!prompt) { showStatus('No prompt to save', 'error'); return; }
    downloadAsFile(prompt, `ai-prompt-${Date.now()}.txt`);
    showStatus('Prompt saved to file', 'success');
  }

  // ============================================================================
  // Collapsible Sections
  // ============================================================================

  function setupCollapsibles() {
    const headers = document.querySelectorAll('.section-header.collapsible');
    headers.forEach(header => {
      header.addEventListener('click', (e) => {
        if (e.target.closest('button:not(.collapse-btn)')) return;
        header.classList.toggle('collapsed');
        const content = header.nextElementSibling;
        if (content) {
          content.style.maxHeight = header.classList.contains('collapsed') ? '0' : content.scrollHeight + 'px';
        }
      });
      if (!header.classList.contains('collapsed')) {
        const content = header.nextElementSibling;
        if (content) content.style.maxHeight = content.scrollHeight + 'px';
      }
    });
  }

  // ============================================================================
  // Event Listeners
  // ============================================================================

  function setupEventListeners() {
    // Intent mode group
    const intentModeGroup = document.getElementById('intent-mode-group');
    if (intentModeGroup) {
      intentModeGroup.addEventListener('click', (e) => {
        const button = e.target.closest('.intent-mode-btn');
        if (!button) return;
        state.intentMode = button.dataset.intentMode;
        state.intentOutput = DEFAULT_OUTPUT_BY_MODE[state.intentMode];
        renderIntentControls();
        updatePreview();
        saveConfig();
      });
    }

    // Workflow group
    const intentWorkflowGroup = document.getElementById('intent-workflow-group');
    if (intentWorkflowGroup) {
      intentWorkflowGroup.addEventListener('click', (e) => {
        const button = e.target.closest('[data-workflow-profile]');
        if (!button) return;
        applyWorkflowProfile(button.dataset.workflowProfile);
      });
    }

    // Output options
    const intentOutputOptions = document.getElementById('intent-output-options');
    if (intentOutputOptions) {
      intentOutputOptions.addEventListener('click', (e) => {
        const button = e.target.closest('[data-intent-output]');
        if (!button) return;
        state.intentOutput = button.dataset.intentOutput;
        renderIntentControls();
        updatePreview();
        saveConfig();
      });
    }

    // Refine toggle
    const refineToggle = document.getElementById('intent-refine-toggle');
    if (refineToggle) {
      refineToggle.addEventListener('click', () => {
        state.showRefine = !state.showRefine;
        renderIntentControls();
        saveConfig();
      });
    }

    // Paste / Clear intent
    document.getElementById('intent-paste-btn')?.addEventListener('click', pasteIntentContext);
    document.getElementById('intent-clear-btn')?.addEventListener('click', clearIntentFields);

    // Intent text fields
    ['intent-goal', 'intent-input'].forEach(id => {
      const input = document.getElementById(id);
      if (!input) return;
      input.addEventListener('input', (e) => {
        if (id === 'intent-goal') state.intentGoal = e.target.value;
        if (id === 'intent-input') state.intentInput = e.target.value;
        updatePreview();
        debouncedSaveConfig();
      });
    });

    // Alt-key shortcuts for intent
    document.addEventListener('keydown', (e) => {
      if (!e.altKey || e.ctrlKey || e.metaKey) return;

      if (e.key >= '1' && e.key <= '4') {
        e.preventDefault();
        const modeByIndex = ['create', 'analyze', 'rewrite', 'plan'];
        state.intentMode = modeByIndex[Number(e.key) - 1] || state.intentMode;
        state.intentOutput = DEFAULT_OUTPUT_BY_MODE[state.intentMode] || state.intentOutput;
        renderIntentControls(); updatePreview(); saveConfig();
        return;
      }
      if (e.key >= '5' && e.key <= '7') {
        e.preventDefault();
        const profileByIndex = ['rapid', 'balanced', 'deep'];
        const profile = profileByIndex[Number(e.key) - 5];
        if (profile) applyWorkflowProfile(profile);
        return;
      }
      if (e.key.toLowerCase() === 'r') {
        e.preventDefault();
        state.showRefine = !state.showRefine;
        renderIntentControls(); saveConfig();
        return;
      }
      if (e.key.toLowerCase() === 'v') {
        e.preventDefault();
        pasteIntentContext();
        return;
      }
      const targetTag = e.target?.tagName;
      const isTypingField = targetTag === 'INPUT' || targetTag === 'TEXTAREA' || targetTag === 'SELECT';
      if (e.key === 'Backspace' && !isTypingField) {
        e.preventDefault();
        clearIntentFields();
      }
    });

    // Snippet sidebar: view toggle
    document.querySelectorAll('.snippet-view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        snippetMgr.viewMode = btn.dataset.view;
        renderSnippetTree();
      });
    });

    // Snippet search
    const snippetSearch = document.getElementById('snippet-search');
    if (snippetSearch) {
      snippetSearch.addEventListener('input', (e) => {
        snippetMgr.filterText = e.target.value;
        debouncedRenderTree();
      });
    }

    // Snippet tree: click delegation
    const snippetTree = document.getElementById('snippet-tree');
    if (snippetTree) {
      snippetTree.addEventListener('click', (e) => {
        // Delete project button
        const delProjectBtn = e.target.closest('[data-delete-project]');
        if (delProjectBtn) {
          e.stopPropagation();
          const name = delProjectBtn.dataset.deleteProject;
          if (confirm(`Delete project "${name}"? Snippets will move to General.`)) {
            snippetMgr.deleteProject(name);
            renderSnippetTree();
            renderSnippetEditor();
            updatePreview();
          }
          return;
        }

        // Checkbox toggle
        const checkbox = e.target.closest('input[data-toggle-id]');
        if (checkbox) {
          e.stopPropagation();
          snippetMgr.toggleEnabled(checkbox.dataset.toggleId);
          snippetMgr.save();
          renderSnippetTree();
          renderSnippetEditor();
          updatePreview();
          return;
        }

        // Snippet item click (select for editing)
        const item = e.target.closest('.snippet-item');
        if (item) {
          snippetMgr.selectedId = item.dataset.snippetId;
          renderSnippetTree();
          renderSnippetEditor();
          return;
        }
      });
    }

    // Add snippet
    document.getElementById('add-snippet-btn')?.addEventListener('click', () => {
      const snippet = snippetMgr.createSnippet();
      snippetMgr.selectedId = snippet.id;
      renderSnippetTree();
      renderSnippetEditor();
      // Focus name field
      setTimeout(() => { document.getElementById('snippet-name')?.focus(); }, 50);
    });

    // Add project
    document.getElementById('add-project-btn')?.addEventListener('click', () => {
      const name = prompt('New project name:');
      if (name?.trim()) {
        snippetMgr.addProject(name.trim());
        renderSnippetTree();
        showStatus(`Project "${name.trim()}" added`, 'success');
      }
    });

    // Editor fields
    const snippetName = document.getElementById('snippet-name');
    if (snippetName) {
      snippetName.addEventListener('input', (e) => {
        const s = snippetMgr.getSelected();
        if (s) { snippetMgr.updateSnippet(s.id, { name: e.target.value }); debouncedRenderTree(); debouncedUpdatePreview(); }
      });
    }

    const snippetProject = document.getElementById('snippet-project');
    if (snippetProject) {
      snippetProject.addEventListener('change', (e) => {
        const s = snippetMgr.getSelected();
        if (s) { snippetMgr.updateSnippet(s.id, { project: e.target.value }); renderSnippetTree(); }
      });
    }

    const snippetType = document.getElementById('snippet-type');
    if (snippetType) {
      snippetType.addEventListener('change', (e) => {
        const s = snippetMgr.getSelected();
        if (s) { snippetMgr.updateSnippet(s.id, { componentType: e.target.value }); renderSnippetTree(); debouncedUpdatePreview(); }
      });
    }

    // Tags
    const tagsSelector = document.getElementById('snippet-tags-selector');
    if (tagsSelector) {
      tagsSelector.addEventListener('click', (e) => {
        const chip = e.target.closest('.snippet-tag-chip');
        if (!chip) return;
        const tagId = chip.dataset.tagId;
        const s = snippetMgr.getSelected();
        if (!s) return;
        const tags = s.tags || [];
        const idx = tags.indexOf(tagId);
        if (idx > -1) tags.splice(idx, 1);
        else tags.push(tagId);
        snippetMgr.updateSnippet(s.id, { tags });
        renderSnippetEditor();
        renderSnippetTree();
      });
    }

    const snippetContent = document.getElementById('snippet-content');
    if (snippetContent) {
      snippetContent.addEventListener('input', (e) => {
        const s = snippetMgr.getSelected();
        if (s) { snippetMgr.updateSnippet(s.id, { content: e.target.value }); debouncedUpdatePreview(); }
      });
    }

    // Include checkbox in editor
    const includeCheck = document.getElementById('snippet-include-check');
    if (includeCheck) {
      includeCheck.addEventListener('change', () => {
        const s = snippetMgr.getSelected();
        if (s) {
          snippetMgr.toggleEnabled(s.id);
          renderSnippetTree();
          updatePreview();
        }
      });
    }

    // Editor action buttons
    document.getElementById('snippet-copy-btn')?.addEventListener('click', () => {
      const s = snippetMgr.getSelected();
      if (s) {
        copyToClipboard(s.content, {
          onSuccess: () => showStatus('Snippet copied!', 'success'),
          onError: () => showStatus('Failed to copy', 'error')
        });
      }
    });

    document.getElementById('snippet-duplicate-btn')?.addEventListener('click', () => {
      const s = snippetMgr.getSelected();
      if (s) {
        const dup = snippetMgr.duplicateSnippet(s.id);
        if (dup) {
          snippetMgr.selectedId = dup.id;
          renderSnippetTree();
          renderSnippetEditor();
          showStatus('Snippet duplicated', 'success');
        }
      }
    });

    document.getElementById('snippet-delete-btn')?.addEventListener('click', () => {
      const s = snippetMgr.getSelected();
      if (s && confirm(`Delete snippet "${s.name}"?`)) {
        snippetMgr.deleteSnippet(s.id);
        renderSnippetTree();
        renderSnippetEditor();
        updatePreview();
        showStatus('Snippet deleted', 'info');
      }
    });

    // Preview buttons
    document.getElementById('copy-prompt-btn')?.addEventListener('click', handleCopyPrompt);
    document.getElementById('save-prompt-btn')?.addEventListener('click', handleSavePrompt);
    document.getElementById('share-btn')?.addEventListener('click', handleShare);

    // Import / Export
    document.getElementById('import-config-btn')?.addEventListener('click', handleImportConfig);
    document.getElementById('export-config-btn')?.addEventListener('click', handleExportConfig);

    // Template management
    document.getElementById('save-template-btn')?.addEventListener('click', showSaveTemplateModal);
    document.getElementById('save-template-confirm-btn')?.addEventListener('click', handleSaveCustomTemplate);
    document.getElementById('template-search')?.addEventListener('input', filterTemplates);
    document.getElementById('template-category')?.addEventListener('change', filterTemplates);
    document.getElementById('templates-grid')?.addEventListener('click', handleTemplateClick);

    // Share modal
    document.getElementById('copy-link-btn')?.addEventListener('click', copyShareLink);

    // Tech stack search
    document.getElementById('techstack-search')?.addEventListener('input', (e) => {
      const snippet = snippetMgr.getSelected();
      const selectedStacks = [];
      if (snippet?.content) {
        const match = snippet.content.match(/Technology stack: (.+)/);
        if (match && match[1] && !match[1].includes('{{')) {
          match[1].split(',').forEach(s => { const t = s.trim(); if (t) selectedStacks.push(t); });
        }
      }
      const grid = document.getElementById('techstack-grid');
      renderTechStackGrid(grid, selectedStacks, e.target.value);
    });
  }

  function setupModals() {
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal || e.target.classList.contains('modal-close')) {
          closeModal();
        }
      });
    });
  }

  // ============================================================================
  // Init / Cleanup
  // ============================================================================

  export function init(context) {
    console.log('AI Prompt Builder v11 (snippets) initialized');

    loadConfig();
    loadCustomTemplates();
    ensureIntentState();

    snippetMgr.load();
    migrateComponentsToSnippets();

    loadFromURL();

    renderSnippetTree();
    renderSnippetEditor();
    renderTemplates();
    renderIntentControls();
    updatePreview();

    setupEventListeners();
    setupModals();
    setupCollapsibles();
  }

  export function cleanup(context) {
    console.log('AI Prompt Builder cleanup');
    saveConfig();
    snippetMgr.save();
  }

  // ============================================================================
  // Standalone mode
  // ============================================================================

  if (typeof window !== 'undefined' && !window.DevChef) {
    document.addEventListener('DOMContentLoaded', () => {
      const template = document.querySelector('#tool-ui');
      if (!template) return;
      document.body.innerHTML = template.innerHTML;
      const standaloneContext = {
        input: '', output: '',
        setInput(value) { this.input = value; },
        setOutput(value) { this.output = value; },
        getInput() { return this.input; },
        getOutput() { return this.output; }
      };
      init(standaloneContext);
    });
  }

</script>

</body>
</html>
