<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Forge</title>
</head>
<body>

<!-- DevChef Manifest -->
<script type="devchef-manifest">
{
  "id": "prompt-forge",
  "name": "Prompt Forge",
  "description": "Assemble AI prompts with presets, recipes, and one-click templates",
  "category": "AI",
  "keywords": ["prompt", "ai", "builder", "template", "recipe"],
  "version": "11.0.0"
}
</script>

<!-- Tool UI Template -->
<template id="tool-ui">
  <div class="tool-container prompt-forge-tool">
    <!-- Header -->
    <div class="forge-header">
      <div class="forge-brand">
        <div class="forge-logo">⚡</div>
        <div>
          <h2 class="forge-title">Prompt Forge</h2>
          <div class="forge-tagline">Assemble prompts fast • <kbd>⌘1-8</kbd> Quick Fire • <kbd>⌘S</kbd> Save • <kbd>⌘C</kbd> Copy</div>
        </div>
      </div>
      <div class="forge-header-actions">
        <button class="forge-btn" id="exportBtn" title="Export templates as JSON">📤 Export</button>
        <button class="forge-btn" id="importBtn" title="Import templates from JSON">📥 Import</button>
      </div>
    </div>

    <div class="forge-main-grid">
      <!-- Sidebar -->
      <aside class="forge-sidebar">
        <!-- Quick Fire -->
        <div class="forge-panel">
          <div class="forge-panel-header">
            <span class="forge-panel-title">Quick Fire</span>
            <span class="forge-panel-badge">⌘1-8</span>
          </div>
          <div class="forge-panel-body">
            <div class="forge-quick-fire-grid" id="quickFireGrid"></div>
          </div>
        </div>

        <!-- Recipes -->
        <div class="forge-panel">
          <div class="forge-panel-header">
            <span class="forge-panel-title">Recipes</span>
          </div>
          <div class="forge-panel-body">
            <div class="forge-recipe-list" id="recipeList"></div>
          </div>
        </div>

        <!-- Snippet Browser -->
        <div class="forge-panel">
          <div class="forge-panel-header">
            <span class="forge-panel-title">Snippets</span>
            <button class="forge-btn forge-btn-sm" id="forgeNewSnippetBtn">+ New</button>
          </div>
          <div class="forge-panel-body">
            <div class="forge-snippet-browser">
              <div class="forge-snippet-view-toggle">
                <button class="forge-snippet-view-btn active" data-view="project">By Project</button>
                <button class="forge-snippet-view-btn" data-view="tag">By Tag</button>
              </div>
              <input type="text" class="forge-snippet-search" id="forgeSnippetSearch" placeholder="Filter snippets..." />
              <div class="forge-snippet-tree" id="forgeSnippetTree"></div>
              <button class="forge-btn forge-btn-sm" id="forgeNewProjectBtn" style="margin-top:6px;width:100%">+ Project</button>
            </div>
          </div>
        </div>

        <!-- History -->
        <div class="forge-panel">
          <div class="forge-panel-header">
            <span class="forge-panel-title">History</span>
          </div>
          <div class="forge-panel-body">
            <div class="forge-history-list" id="historyList"></div>
          </div>
        </div>
      </aside>

      <!-- Builder -->
      <main class="forge-builder">
        <!-- Score Bar -->
        <div class="forge-score-bar">
          <span class="forge-score-label">Score</span>
          <div class="forge-score-track">
            <div class="forge-score-fill" id="scoreFill" style="width: 0%"></div>
          </div>
          <span class="forge-score-value" id="scoreValue">0%</span>
          <span class="forge-score-tips" id="scoreTips">Add objective</span>
        </div>

        <!-- Intent-first Section -->
        <div class="forge-section-card forge-intent-card">
          <div class="forge-section-header forge-intent-header">
            <h3><span>🧭</span> Intent</h3>
            <div class="forge-intent-header-actions">
              <button class="forge-btn forge-btn-sm" id="intentPasteBtn" type="button" title="Paste context (Alt+V)">Paste</button>
              <button class="forge-btn forge-btn-sm" id="intentClearBtn" type="button" title="Clear intent (Alt+Backspace)">Clear</button>
              <button class="forge-btn forge-btn-sm" id="toggleRefineBtn" type="button" title="Toggle refine (Alt+R)">Refine options</button>
            </div>
          </div>
          <div class="forge-section-body">
            <div class="forge-intent-modes" id="intentModes">
              <button class="forge-intent-mode-btn forge-intent-primary-btn" type="button" data-intent-mode="create">Create</button>
              <button class="forge-intent-mode-btn forge-intent-primary-btn" type="button" data-intent-mode="analyze">Analyze</button>
              <button class="forge-intent-mode-btn forge-intent-primary-btn" type="button" data-intent-mode="rewrite">Rewrite</button>
              <button class="forge-intent-mode-btn forge-intent-primary-btn" type="button" data-intent-mode="plan">Plan</button>
            </div>
            <div class="forge-workflow-modes" id="workflowModes">
              <button class="forge-intent-mode-btn" type="button" data-workflow-profile="rapid">Rapid</button>
              <button class="forge-intent-mode-btn" type="button" data-workflow-profile="balanced">Balanced</button>
              <button class="forge-intent-mode-btn" type="button" data-workflow-profile="deep">Deep</button>
            </div>
            <div class="forge-form-row forge-form-row-single">
              <div class="forge-form-group">
                <label>Goal</label>
                <textarea id="intentGoal" placeholder="What outcome do you want?"></textarea>
              </div>
            </div>
            <div class="forge-form-row forge-form-row-single">
              <div class="forge-form-group">
                <label>Input / Context</label>
                <textarea id="intentInput" placeholder="Paste context, draft text, notes, links, data..."></textarea>
              </div>
            </div>
            <div class="forge-form-row forge-form-row-single">
              <div class="forge-form-group">
                <label>Output Format</label>
                <div class="forge-intent-output-grid" id="intentOutputOptions">
                  <button class="forge-intent-mode-btn" type="button" data-intent-output="bullets">Bullet List</button>
                  <button class="forge-intent-mode-btn" type="button" data-intent-output="checklist">Checklist</button>
                  <button class="forge-intent-mode-btn" type="button" data-intent-output="table">Table</button>
                  <button class="forge-intent-mode-btn" type="button" data-intent-output="summary">Executive Summary</button>
                  <button class="forge-intent-mode-btn" type="button" data-intent-output="steps">Step-by-step Plan</button>
                  <button class="forge-intent-mode-btn" type="button" data-intent-output="json">Structured JSON</button>
                </div>
              </div>
            </div>
            <div class="forge-intent-status" id="intentStatusChips"></div>
          </div>
        </div>

        <!-- Snippet Editor -->
        <div class="forge-section-card" id="forgeSnippetEditorCard" style="display:none">
          <div class="forge-section-header">
            <h3><span>📝</span> Snippet Editor</h3>
          </div>
          <div class="forge-section-body" id="forgeSnippetEditorBody">
            <!-- Rendered dynamically -->
          </div>
        </div>

        <!-- Modifiers Section -->
        <div class="forge-section-card" id="modifiersCard">
          <div class="forge-section-header">
            <h3><span>⚡</span> Quality Modifiers</h3>
            <div class="forge-section-toggle">
              <span class="forge-section-tag">Click to add</span>
              <div class="forge-section-check checked" data-section-toggle="includeGuardrails" title="Include in prompt">✓</div>
            </div>
          </div>
          <div class="forge-section-body" id="modifiersSection">
            <label style="margin-bottom: 8px;">Guardrails</label>
            <div class="forge-toggle-grid" id="guardrailsGrid"></div>

            <label style="margin: 14px 0 8px;">Boosters</label>
            <div class="forge-toggle-grid" id="boostersGrid"></div>

            <label style="margin: 14px 0 8px;">Quick Clauses</label>
            <div class="forge-clause-palette" id="clausePalette"></div>

            <div class="forge-form-group">
              <label>Additional Instructions</label>
              <textarea id="extraInstructions" placeholder="Extra directives (or use clauses above)..."></textarea>
            </div>
          </div>
        </div>
      </main>

      <!-- Output -->
      <aside class="forge-output-panel forge-panel">
        <div class="forge-output-header">
          <span class="forge-panel-title">Assembled Prompt</span>
          <div class="forge-output-actions">
            <button class="forge-btn forge-btn-icon" id="clearBtn" title="Clear">🗑️</button>
            <button class="forge-btn forge-btn-primary" id="copyBtn">📋 Copy</button>
          </div>
        </div>
        <div class="forge-output-body">
          <pre class="forge-output-pre" id="outputPre"></pre>
        </div>
      </aside>
    </div>
  </div>

  <!-- Save Template Modal -->
  <div class="forge-modal-overlay" id="saveModal">
    <div class="forge-modal">
      <div class="forge-modal-header">
        <h3>💾 Save Template</h3>
        <button class="forge-btn forge-btn-icon" id="closeSaveModal">✕</button>
      </div>
      <div class="forge-modal-body">
        <div class="forge-form-group">
          <label>Template Name</label>
          <input id="templateNameInput" placeholder="e.g., Feature Dev, Bug Triage..." />
        </div>
      </div>
      <div class="forge-modal-footer">
        <button class="forge-btn" id="cancelSaveBtn">Cancel</button>
        <button class="forge-btn forge-btn-primary" id="confirmSaveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="forge-modal-overlay" id="importModal">
    <div class="forge-modal">
      <div class="forge-modal-header">
        <h3>📥 Import Templates</h3>
        <button class="forge-btn forge-btn-icon" id="closeImportModal">✕</button>
      </div>
      <div class="forge-modal-body">
        <div class="forge-form-group">
          <label>Paste JSON</label>
          <textarea id="importInput" style="min-height: 120px;" placeholder='{"templates": {...}}'></textarea>
        </div>
      </div>
      <div class="forge-modal-footer">
        <button class="forge-btn" id="cancelImportBtn">Cancel</button>
        <button class="forge-btn forge-btn-primary" id="confirmImportBtn">Import</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="forge-toast" id="toast">
    <span id="toastIcon">✓</span>
    <span id="toastText">Copied!</span>
  </div>
</template>

<!-- Tool Styles -->
<style>
  /* Container */
  .prompt-forge-tool {
    padding: 0;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
    font-family: var(--font-sans);
  }

  /* Header */
  .forge-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-secondary);
  }

  .forge-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .forge-logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--success));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: var(--shadow-sm);
  }

  .forge-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin: 0;
  }

  .forge-tagline {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .forge-header-actions {
    display: flex;
    gap: 8px;
  }

  /* Main Grid */
  .forge-main-grid {
    display: grid;
    grid-template-columns: 260px 1fr 380px;
    gap: 16px;
    align-items: start;
    padding: 20px 24px;
  }

  /* Sidebar */
  .forge-sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .forge-panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .forge-panel-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-tertiary);
  }

  .forge-panel-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
  }

  .forge-panel-badge {
    font-size: 9px;
    padding: 3px 7px;
    background: var(--accent);
    color: white;
    border-radius: 20px;
    font-weight: 700;
  }

  .forge-panel-body {
    padding: 10px;
  }

  /* Quick Fire */
  .forge-quick-fire-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .forge-qf-btn {
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 10px 8px;
    cursor: pointer;
    transition: all var(--transition-fast);
    text-align: left;
  }

  .forge-qf-btn:hover {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  .forge-qf-btn.active {
    border-color: var(--accent);
    background: var(--accent-light);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 10%, transparent);
  }

  .forge-qf-icon { font-size: 16px; margin-bottom: 4px; }
  .forge-qf-label { font-size: 11px; font-weight: 600; color: var(--text-primary); display: block; }
  .forge-qf-key { font-size: 9px; color: var(--text-secondary); font-family: var(--font-mono); margin-top: 2px; }

  /* Recipe List */
  .forge-recipe-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 280px;
    overflow-y: auto;
  }

  .forge-recipe-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .forge-recipe-item:hover {
    background: var(--bg-tertiary);
    border-color: var(--border-color);
  }

  .forge-recipe-item.selected {
    background: var(--accent-light);
    border-color: var(--accent);
  }

  .forge-recipe-icon {
    font-size: 14px;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-tertiary);
    border-radius: var(--radius-md);
  }

  .forge-recipe-item.selected .forge-recipe-icon {
    background: var(--accent);
    color: white;
    font-size: 12px;
  }

  .forge-recipe-info { flex: 1; min-width: 0; }
  .forge-recipe-name { font-size: 12px; font-weight: 600; }
  .forge-recipe-desc { font-size: 10px; color: var(--text-secondary); }

  /* History List */
  .forge-history-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 160px;
    overflow-y: auto;
  }

  .forge-history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    background: var(--bg-tertiary);
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: all var(--transition-fast);
    gap: 6px;
  }

  .forge-history-item:hover { background: var(--bg-hover); }
  .forge-history-name {
    font-size: 11px;
    font-weight: 600;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .forge-history-time { font-size: 9px; color: var(--text-secondary); font-family: var(--font-mono); }
  .forge-history-actions { display: flex; gap: 2px; }
  .forge-history-actions .forge-btn-icon { padding: 4px; font-size: 10px; }

  /* Builder */
  .forge-builder {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .forge-intent-header {
    cursor: default;
  }

  .forge-intent-header-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .forge-intent-header-actions .forge-btn {
    padding: 6px 10px;
    font-size: 11px;
    line-height: 1;
  }

  .forge-intent-modes {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px;
    padding: 10px;
    border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border-color) 65%);
    border-radius: 12px;
    background: color-mix(in srgb, var(--accent-light) 35%, var(--bg-tertiary) 65%);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
    position: relative;
  }

  .forge-intent-modes .forge-intent-primary-btn {
    min-height: 42px;
    font-size: 13px;
    letter-spacing: 0.01em;
    border-width: 1.5px;
    background: linear-gradient(
      160deg,
      color-mix(in srgb, var(--bg-tertiary) 88%, var(--accent) 12%),
      color-mix(in srgb, var(--bg-tertiary) 76%, var(--accent) 24%)
    );
    box-shadow: 0 6px 16px color-mix(in srgb, var(--accent) 16%, transparent);
  }

  .forge-intent-modes .forge-intent-primary-btn:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 10px 22px color-mix(in srgb, var(--accent) 26%, transparent);
  }

  .forge-intent-modes .forge-intent-primary-btn.active {
    background: linear-gradient(155deg, var(--accent), color-mix(in srgb, var(--accent) 76%, black));
    color: white;
    border-color: color-mix(in srgb, var(--accent) 72%, black);
    box-shadow:
      0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent),
      0 14px 24px color-mix(in srgb, var(--accent) 34%, transparent);
  }

  .forge-workflow-modes {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  .forge-workflow-modes .forge-intent-mode-btn {
    border-radius: 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 7px 8px;
  }

  .forge-intent-modes::before {
    content: "Start here";
    position: absolute;
    top: -10px;
    left: 12px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent);
    color: white;
  }

  .forge-intent-output-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .forge-intent-status {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .forge-intent-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    border-radius: 999px;
    border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--border-color) 76%);
    background: color-mix(in srgb, var(--bg-tertiary) 84%, var(--accent-light) 16%);
    color: var(--text-secondary);
    padding: 5px 10px;
  }

  .forge-intent-chip strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  .forge-intent-mode-btn {
    border: 1px solid var(--border-color);
    background: color-mix(in srgb, var(--bg-tertiary) 86%, var(--accent) 14%);
    color: var(--text-primary);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    padding: 8px 10px;
    cursor: pointer;
    transition: var(--transition-fast);
  }

  .forge-intent-mode-btn:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .forge-intent-mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
  }

  .forge-intent-modes .forge-intent-mode-btn:not(.active) {
    animation: intent-nudge 2.4s ease-in-out infinite;
  }

  @keyframes intent-nudge {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-1px); }
  }

  .forge-builder:not(.refine-open) #forgeSnippetEditorCard,
  .forge-builder:not(.refine-open) #modifiersCard {
    display: none;
  }

  /* Score Bar */
  .forge-score-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
  }

  .forge-score-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .forge-score-track {
    flex: 1;
    height: 6px;
    background: var(--bg-tertiary);
    border-radius: 3px;
    overflow: hidden;
  }
  .forge-score-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 3px;
    transition: width var(--transition-slow);
  }
  .forge-score-value {
    font-size: 13px;
    font-weight: 700;
    font-family: var(--font-mono);
    min-width: 45px;
    text-align: right;
  }
  .forge-score-tips {
    font-size: 10px;
    color: var(--text-secondary);
    max-width: 180px;
    text-align: right;
  }

  /* Section Cards */
  .forge-section-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .forge-section-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background var(--transition-fast);
    background: var(--bg-tertiary);
  }

  .forge-section-header:hover { background: var(--bg-hover); }

  .forge-section-header h3 {
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0;
  }

  .forge-section-header h3 span { font-size: 15px; }

  .forge-section-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .forge-section-check {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border-color);

class SnippetManager {
  constructor(storageKey) {
    this.storageKey = storageKey;
    this.projects = ['General'];
    this.snippets = [];
    this.enabledIds = [];
    this.selectedId = null;
    this.viewMode = 'project';
    this.filterText = '';
  }
  load() {
    const saved = loadToolState(this.storageKey);
    if (saved) {
      this.projects = saved.projects || ['General'];
      this.snippets = saved.snippets || [];
      this.enabledIds = saved.enabledIds || [];
    }
  }
  save() {
    saveToolState(this.storageKey, { projects: this.projects, snippets: this.snippets, enabledIds: this.enabledIds });
  }
  createSnippet(overrides = {}) {
    const s = {
      id: 'snip-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
      name: overrides.name || 'New Snippet', content: overrides.content || '',
      project: overrides.project || this.projects[0] || 'General',
      componentType: overrides.componentType || 'task', tags: overrides.tags || [],
      createdAt: Date.now(), updatedAt: Date.now()
    };
    this.snippets.push(s);
    this.save();
    return s;
  }
  updateSnippet(id, updates) {
    const s = this.snippets.find(x => x.id === id);
    if (s) { Object.assign(s, updates, { updatedAt: Date.now() }); this.save(); }
    return s;
  }
  deleteSnippet(id) {
    this.snippets = this.snippets.filter(x => x.id !== id);
    this.enabledIds = this.enabledIds.filter(x => x !== id);
    if (this.selectedId === id) this.selectedId = null;
    this.save();
  }
  duplicateSnippet(id) {
    const o = this.snippets.find(x => x.id === id);
    if (!o) return null;
    return this.createSnippet({ name: o.name + ' (copy)', content: o.content, project: o.project, componentType: o.componentType, tags: [...o.tags] });
  }
  addProject(name) {
    if (name && !this.projects.includes(name)) { this.projects.push(name); this.save(); }
  }
  deleteProject(name) {
    if (name === 'General') return;
    this.projects = this.projects.filter(p => p !== name);
    this.snippets.forEach(s => { if (s.project === name) s.project = 'General'; });
    this.save();
  }
  toggleEnabled(id) {
    const idx = this.enabledIds.indexOf(id);
    if (idx > -1) this.enabledIds.splice(idx, 1); else this.enabledIds.push(id);
    this.save();
  }
  getEnabledSnippets() {
    return this.snippets.filter(s => this.enabledIds.includes(s.id))
      .sort((a, b) => COMPONENT_TYPE_ORDER.indexOf(a.componentType) - COMPONENT_TYPE_ORDER.indexOf(b.componentType));
  }
  getByProject() {
    const groups = {};
    this.projects.forEach(p => { groups[p] = []; });
    this.getFiltered().forEach(s => {
      if (!groups[s.project]) groups[s.project] = [];
      groups[s.project].push(s);
    });
    return groups;
  }
  getByTag() {
    const groups = {};
    USE_CASE_TAGS.forEach(t => { groups[t.label] = []; });
    groups['Untagged'] = [];
    this.getFiltered().forEach(s => {
      if (!s.tags || !s.tags.length) { groups['Untagged'].push(s); }
      else { s.tags.forEach(tag => { const lbl = USE_CASE_TAGS.find(t => t.id === tag)?.label || tag; if (!groups[lbl]) groups[lbl] = []; groups[lbl].push(s); }); }
    });
    return groups;
  }
  getFiltered() {
    if (!this.filterText) return this.snippets;
    const q = this.filterText.toLowerCase();
    return this.snippets.filter(s => s.name.toLowerCase().includes(q) || s.content.toLowerCase().includes(q) || s.project.toLowerCase().includes(q));
  }
}

function loadFromStorage() {
  const saved = loadToolState('prompt-forge');
  if (saved) {
    if (saved.templates) templates = saved.templates;
    if (saved.history) history = saved.history;
    if (saved.lastState) {
      // Only load keys that exist in current state shape
      const validKeys = Object.keys(state);
      const filtered = {};
      validKeys.forEach(k => {
        if (saved.lastState.hasOwnProperty(k)) filtered[k] = saved.lastState[k];
      });
      state = { ...state, ...filtered };
    }
  }
}

function saveToStorage() {
  saveToolState('prompt-forge', {
    templates,
    history: history.slice(0, 20),
    lastState: state
  });
}

function renderSnippetTree() {
  const tree = $('forgeSnippetTree');
  if (!tree) return;
  const groups = snippetMgr.viewMode === 'project' ? snippetMgr.getByProject() : snippetMgr.getByTag();
  let html = '';
  for (const [groupName, items] of Object.entries(groups)) {
    if (items.length === 0 && snippetMgr.filterText) continue;
    html += `<div class="forge-snippet-group-header" data-group="${groupName}">
      <span>${groupName}</span><span style="font-size:9px">${items.length}</span>
    </div>`;
    items.forEach(s => {
      const checked = snippetMgr.enabledIds.includes(s.id) ? 'checked' : '';
      const selected = snippetMgr.selectedId === s.id ? 'selected' : '';
      const typeLabel = COMPONENT_TYPES.find(t => t.id === s.componentType)?.label || s.componentType;
      html += `<div class="forge-snippet-item ${selected}" data-snippet-id="${s.id}">
        <input type="checkbox" ${checked} data-snippet-check="${s.id}" />
        <span class="forge-snippet-item-name">${s.name}</span>
        <span class="forge-snippet-item-badge">${typeLabel}</span>
      </div>`;
    });
  }
  if (!html) html = '<div class="forge-snippet-empty">No snippets yet</div>';
  tree.innerHTML = html;

  // Update view toggle
  document.querySelectorAll('.forge-snippet-view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === snippetMgr.viewMode);
  });
}

function enableOrCreateSnippet(name, content, componentType) {
  let s = snippetMgr.snippets.find(x => x.name === name && x.componentType === componentType);
  if (!s) {
    s = snippetMgr.createSnippet({ name, content, componentType });
  } else {
    snippetMgr.updateSnippet(s.id, { content });
  }
  if (!snippetMgr.enabledIds.includes(s.id)) {
    snippetMgr.enabledIds.push(s.id);
  }
  return s;
}

function ensureIntentState() {
  if (!INTENT_MODES.some(mode => mode.id === state.intentMode)) {
    state.intentMode = 'create';
  }
  if (!WORKFLOW_PROFILES.includes(state.workflowProfile)) {
    state.workflowProfile = 'balanced';
  }
  if (typeof state.intentGoal !== 'string') state.intentGoal = '';
  if (typeof state.intentInput !== 'string') state.intentInput = '';
  if (!INTENT_OUTPUT_OPTIONS.some(option => option.id === state.intentOutputFormat)) {
    state.intentOutputFormat = DEFAULT_OUTPUT_BY_MODE[state.intentMode];
  }
  state.showRefine = Boolean(state.showRefine);
}

function getIntentOutputLabel() {
  const selected = INTENT_OUTPUT_OPTIONS.find(option => option.id === state.intentOutputFormat);
  return selected?.label || state.intentOutputFormat;
}

function renderIntentControls() {
  ensureIntentState();
  const builder = document.querySelector('.forge-builder');
  if (builder) {
    builder.dataset.intentMode = state.intentMode;

    button.classList.toggle('active', button.dataset.intentMode === state.intentMode);

      <span class="forge-qf-key">⌘${qf.key}</span>
    </button>
  `).join('');
}

function renderRecipes() {
  const list = $('recipeList');
  if (!list) return;
  list.innerHTML = RECIPES.map(r => `
    <div class="forge-recipe-item" data-recipe="${r.id}">
      <div class="forge-recipe-icon">${r.icon}</div>
      <div class="forge-recipe-info">
        <div class="forge-recipe-name">${r.name}</div>
        <div class="forge-recipe-desc">${r.desc}</div>
      </div>
    </div>
  `).join('');
}

function renderGuardrails() {
  const grid = $('guardrailsGrid');
  if (!grid) return;
  grid.innerHTML = GUARDRAILS.map(g => `
    <label class="forge-toggle-chip ${state.guardrails.includes(g.id) ? 'active' : ''}" data-guardrail="${g.id}">
      <input type="checkbox" ${state.guardrails.includes(g.id) ? 'checked' : ''} />
      <span class="forge-chip-check">✓</span>
      <span>${g.label}</span>
    </label>
  `).join('');
}

function renderBoosters() {
  const grid = $('boostersGrid');
  if (!grid) return;
  grid.innerHTML = BOOSTERS.map(b => `
    <label class="forge-toggle-chip ${state.boosters.includes(b.id) ? 'active' : ''}" data-booster="${b.id}">
      <input type="checkbox" ${state.boosters.includes(b.id) ? 'checked' : ''} />
      <span class="forge-chip-check">✓</span>
      <span>${b.label}</span>
    </label>
  `).join('');
}

function renderClauses() {
  const palette = $('clausePalette');
  if (!palette) return;
  palette.innerHTML = CLAUSES.map((c, i) => `
    <button class="forge-clause-chip" data-clause="${i}" title="${c}">${c}</button>
  `).join('');
}

function renderTemplates() {
  // Templates are now saved as snippets, but keep template list for backward compat
}

function renderHistory() {
  const list = $('historyList');
  if (!list) return;
  if (!history.length) {
    list.innerHTML = '<div style="color: var(--text-secondary); font-size: 11px; padding: 6px;">No history</div>';
    return;
  }
  list.innerHTML = history.slice(0, 8).map((h, i) => `
    <div class="forge-history-item" data-history="${i}">
      <span class="forge-history-name">${h.name || 'Prompt'}</span>
      <span class="forge-history-time">${formatTime(h.time)}</span>
    </div>
  `).join('');
}

// ============ EVENT LISTENERS ============
function attachListeners() {
  const intentModes = $('intentModes');
  if (intentModes) {
    intentModes.addEventListener('click', e => {
      const button = e.target.closest('.forge-intent-mode-btn');
      if (!button) return;
      state.intentMode = button.dataset.intentMode;
      state.intentOutputFormat = DEFAULT_OUTPUT_BY_MODE[state.intentMode];
      renderIntentControls();
      updatePrompt();
    });
  }

  const workflowModes = $('workflowModes');
  if (workflowModes) {
    workflowModes.addEventListener('click', e => {
      const button = e.target.closest('[data-workflow-profile]');
      if (!button) return;
      applyWorkflowProfile(button.dataset.workflowProfile);
    });
  }

  const intentOutputOptions = $('intentOutputOptions');
  if (intentOutputOptions) {
    intentOutputOptions.addEventListener('click', e => {
      const button = e.target.closest('[data-intent-output]');
      if (!button) return;
      state.intentOutputFormat = button.dataset.intentOutput;
      renderIntentControls();
      updatePrompt();
    });
  }

  const toggleRefineBtn = $('toggleRefineBtn');
  if (toggleRefineBtn) {
    toggleRefineBtn.addEventListener('click', () => {
      state.showRefine = !state.showRefine;
      renderIntentControls();
    });
  }

  const intentPasteBtn = $('intentPasteBtn');
  if (intentPasteBtn) {
    intentPasteBtn.addEventListener('click', () => {
      pasteIntentContext();
    });
  }

  const intentClearBtn = $('intentClearBtn');
  if (intentClearBtn) {
    intentClearBtn.addEventListener('click', () => {
      clearIntentFields();
    });
  }

  ['intentGoal', 'intentInput'].forEach(id => {
    const el = $(id);
    if (!el) return;
    el.addEventListener('input', e => {
      state[id] = e.target.value;
      updatePrompt();
    });
  });

  // Extra instructions
  const extraEl = $('extraInstructions');
  if (extraEl) {
    extraEl.addEventListener('input', e => {
      state.extraInstructions = e.target.value;
      updatePrompt();
    });
  }

  // Quick Fire
  const qfGrid = $('quickFireGrid');
  if (qfGrid) {
    qfGrid.addEventListener('click', e => {
      const btn = e.target.closest('.forge-qf-btn');
      if (btn) applyQuickFire(btn.dataset.qf);
    });
  }

  // Recipes
  const recipeList = $('recipeList');
  if (recipeList) {
    recipeList.addEventListener('click', e => {
      const item = e.target.closest('.forge-recipe-item');
      if (item) applyRecipe(item.dataset.recipe);
    });
  }

  // Guardrails
  const guardrailsGrid = $('guardrailsGrid');
  if (guardrailsGrid) {
    guardrailsGrid.addEventListener('click', e => {
      const chip = e.target.closest('.forge-toggle-chip');
      if (chip) toggleArrayItem('guardrails', chip.dataset.guardrail, renderGuardrails);
    });
  }

  // Boosters
  const boostersGrid = $('boostersGrid');
  if (boostersGrid) {
    boostersGrid.addEventListener('click', e => {
      const chip = e.target.closest('.forge-toggle-chip');
      if (chip) toggleArrayItem('boosters', chip.dataset.booster, renderBoosters);
    });
  }

  // Clauses
  const clausePalette = $('clausePalette');
  if (clausePalette) {
    clausePalette.addEventListener('click', e => {
      const chip = e.target.closest('.forge-clause-chip');
      if (chip) {
        const clause = CLAUSES[parseInt(chip.dataset.clause)];
        const extra = $('extraInstructions');
        if (extra) {
          extra.value = extra.value ? extra.value + '\n- ' + clause : '- ' + clause;
          state.extraInstructions = extra.value;
          updatePrompt();
        }
      }
    });
  }

  // Section toggles (guardrails only now)
  document.querySelectorAll('[data-section-toggle]').forEach(toggle => {
    toggle.addEventListener('click', e => {
      e.stopPropagation();
      const key = toggle.dataset.sectionToggle;
      state[key] = !state[key];
      updateSectionVisibility();
      updatePrompt();
    });
  });

  // History
  const historyList = $('historyList');
  if (historyList) {
    historyList.addEventListener('click', e => {
      const item = e.target.closest('.forge-history-item');
      if (item && history[item.dataset.history]) {
        const savedState = history[item.dataset.history].state;
        // Only load valid keys
        const validKeys = Object.keys(state);
        validKeys.forEach(k => {
          if (savedState.hasOwnProperty(k)) state[k] = savedState[k];
        });
        renderSnippetTree();
        renderSnippetEditor();
        renderGuardrails();
        renderBoosters();
        renderIntentControls();
        updatePrompt();
      }
    });
  }

  // Buttons
  const copyBtn = $('copyBtn');
  if (copyBtn) copyBtn.addEventListener('click', copyPrompt);

  const clearBtn = $('clearBtn');
  if (clearBtn) clearBtn.addEventListener('click', clearAll);

  const newTemplateBtn = $('newTemplateBtn');
  if (newTemplateBtn) {
    newTemplateBtn.addEventListener('click', () => {
      openModal('saveModal');
      setTimeout(() => {
        const input = $('templateNameInput');
        if (input) input.focus();
      }, 100);
    });
  }

  const exportBtn = $('exportBtn');
  if (exportBtn) exportBtn.addEventListener('click', exportTemplates);

  const importBtn = $('importBtn');
  if (importBtn) importBtn.addEventListener('click', () => openModal('importModal'));

  // Modals
  const closeSaveModal = $('closeSaveModal');
  if (closeSaveModal) closeSaveModal.addEventListener('click', () => closeModal('saveModal'));

  const cancelSaveBtn = $('cancelSaveBtn');
  if (cancelSaveBtn) cancelSaveBtn.addEventListener('click', () => closeModal('saveModal'));

  const closeImportModal = $('closeImportModal');
  if (closeImportModal) closeImportModal.addEventListener('click', () => closeModal('importModal'));

  const cancelImportBtn = $('cancelImportBtn');
  if (cancelImportBtn) cancelImportBtn.addEventListener('click', () => closeModal('importModal'));

  const confirmSaveBtn = $('confirmSaveBtn');
  if (confirmSaveBtn) confirmSaveBtn.addEventListener('click', saveCurrentTemplate);

  const templateNameInput = $('templateNameInput');
  if (templateNameInput) {
    templateNameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        saveCurrentTemplate();
      }
    });
  }

  const confirmImportBtn = $('confirmImportBtn');
  if (confirmImportBtn) {
    confirmImportBtn.addEventListener('click', () => {
      try {
        const importInput = $('importInput');
        if (!importInput) return;
        const data = JSON.parse(importInput.value);
        if (data.snippets) {
          // Import snippet data
          data.snippets.forEach(s => {
            if (!snippetMgr.snippets.find(x => x.id === s.id)) {
              snippetMgr.snippets.push(s);
            }
          });
          if (data.projects) {
            data.projects.forEach(p => snippetMgr.addProject(p));
          }
          snippetMgr.save();
          renderSnippetTree();
        }
        const incoming = data.templates || data;
        if (typeof incoming === 'object' && !Array.isArray(incoming)) {
          Object.assign(templates, incoming);
        }
        saveToStorage();
        closeModal('importModal');
        importInput.value = '';
        showToast('Imported!');
      } catch (e) {
        alert('Invalid JSON');
      }
    });
  }

  // Close modal on overlay click
  document.querySelectorAll('.forge-modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    });
  });

  // Snippet browser
  const snippetTree = $('forgeSnippetTree');
  if (snippetTree) {
    snippetTree.addEventListener('click', e => {
      const checkEl = e.target.closest('[data-snippet-check]');
      if (checkEl) {
        e.stopPropagation();
        snippetMgr.toggleEnabled(checkEl.dataset.snippetCheck);
        renderSnippetTree();
        updatePrompt();
        return;
      }
      const item = e.target.closest('.forge-snippet-item');
      if (item) {
        snippetMgr.selectedId = item.dataset.snippetId;
        renderSnippetTree();
        renderSnippetEditor();
      }
    });
  }

  const viewToggle = document.querySelector('.forge-snippet-view-toggle');
  if (viewToggle) {
    viewToggle.addEventListener('click', e => {
      const btn = e.target.closest('.forge-snippet-view-btn');
      if (btn) { snippetMgr.viewMode = btn.dataset.view; renderSnippetTree(); }
    });
  }

  const snippetSearch = $('forgeSnippetSearch');
  if (snippetSearch) {
    snippetSearch.addEventListener('input', e => { snippetMgr.filterText = e.target.value; renderSnippetTree(); });
  }

  const newSnippetBtn = $('forgeNewSnippetBtn');
  if (newSnippetBtn) {
    newSnippetBtn.addEventListener('click', () => {
      const s = snippetMgr.createSnippet();
      snippetMgr.selectedId = s.id;
      renderSnippetTree();
      renderSnippetEditor();
    });
  }

  const newProjectBtn = $('forgeNewProjectBtn');
  if (newProjectBtn) {
    newProjectBtn.addEventListener('click', () => {
      const name = prompt('Project name:');
      if (name) { snippetMgr.addProject(name); renderSnippetTree(); }
    });
  }

  // Snippet editor delegation
  document.addEventListener('click', e => {
    const editorBody = $('forgeSnippetEditorBody');
    if (!editorBody || !editorBody.contains(e.target)) return;
    const s = snippetMgr.snippets.find(x => x.id === snippetMgr.selectedId);
    if (!s) return;

    if (e.target.id === 'forgeSnipEnabled') {
      snippetMgr.toggleEnabled(s.id);
      renderSnippetTree();
      updatePrompt();
      return;
    }
    if (e.target.id === 'forgeSnipCopy') {
      copyToClipboard(s.content, { onSuccess: () => showToast('Copied!') });
      return;
    }
    if (e.target.id === 'forgeSnipDuplicate') {
      const dup = snippetMgr.duplicateSnippet(s.id);
      if (dup) { snippetMgr.selectedId = dup.id; renderSnippetTree(); renderSnippetEditor(); showToast('Duplicated!'); }
      return;
    }
    if (e.target.id === 'forgeSnipDelete') {
      if (confirm(`Delete "${s.name}"?`)) { snippetMgr.deleteSnippet(s.id); renderSnippetTree(); renderSnippetEditor(); updatePrompt(); showToast('Deleted'); }
      return;
    }
    const tag = e.target.closest('.forge-snippet-tag-chip');
    if (tag) {
      const tagId = tag.dataset.tag;
      const tags = s.tags || [];
      const idx = tags.indexOf(tagId);
      if (idx > -1) tags.splice(idx, 1); else tags.push(tagId);
      snippetMgr.updateSnippet(s.id, { tags });
      renderSnippetEditor();
    }
  });

  document.addEventListener('input', e => {
    const editorBody = $('forgeSnippetEditorBody');
    if (!editorBody || !editorBody.contains(e.target)) return;
    const s = snippetMgr.snippets.find(x => x.id === snippetMgr.selectedId);
    if (!s) return;

    if (e.target.id === 'forgeSnipName') { snippetMgr.updateSnippet(s.id, { name: e.target.value }); renderSnippetTree(); }
    if (e.target.id === 'forgeSnipContent') { snippetMgr.updateSnippet(s.id, { content: e.target.value }); updatePrompt(); }
  });

  document.addEventListener('change', e => {
    const editorBody = $('forgeSnippetEditorBody');
    if (!editorBody || !editorBody.contains(e.target)) return;
    const s = snippetMgr.snippets.find(x => x.id === snippetMgr.selectedId);
    if (!s) return;

    if (e.target.id === 'forgeSnipProject') { snippetMgr.updateSnippet(s.id, { project: e.target.value }); renderSnippetTree(); }
    if (e.target.id === 'forgeSnipType') { snippetMgr.updateSnippet(s.id, { componentType: e.target.value }); renderSnippetTree(); updatePrompt(); }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    const isTyping = isInputFocused();
    if (e.key === 'Escape') {
      closeModal('saveModal');
      closeModal('importModal');
    }
    if (e.altKey && !e.ctrlKey && !e.metaKey) {
      if (e.key >= '1' && e.key <= '4') {
        e.preventDefault();
        const modeByIndex = ['create', 'analyze', 'rewrite', 'plan'];
        state.intentMode = modeByIndex[Number(e.key) - 1] || state.intentMode;
        state.intentOutputFormat = DEFAULT_OUTPUT_BY_MODE[state.intentMode] || state.intentOutputFormat;
        renderIntentControls();
        updatePrompt();
        return;
      }
      if (e.key >= '5' && e.key <= '7') {
        e.preventDefault();
        const profileByIndex = ['rapid', 'balanced', 'deep'];
        const profile = profileByIndex[Number(e.key) - 5];
        if (profile) applyWorkflowProfile(profile);
        return;
      }
      if (e.key.toLowerCase() === 'r') {
        e.preventDefault();
        state.showRefine = !state.showRefine;
        renderIntentControls();
        return;
      }
      if (e.key.toLowerCase() === 'v') {
        e.preventDefault();
        pasteIntentContext();
        return;
      }
      if (e.key === 'Backspace' && !isTyping) {
        e.preventDefault();
        clearIntentFields();
        return;
      }
    }
    if ((e.metaKey || e.ctrlKey) && e.key >= '1' && e.key <= '8') {
      e.preventDefault();
      const qf = QUICK_FIRES[parseInt(e.key) - 1];
      if (qf) applyQuickFire(qf.id);
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'c' && !isTyping) {
      e.preventDefault();
      copyPrompt();
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 's') {
      e.preventDefault();
      openModal('saveModal');
      setTimeout(() => {
        const input = $('templateNameInput');
        if (input) input.focus();
      }, 100);
    }
  });
}

function isInputFocused() {
  const a = document.activeElement;
  return a && ['INPUT', 'TEXTAREA', 'SELECT'].includes(a.tagName);
}

function toggleArrayItem(key, id, renderFn) {
  if (state[key].includes(id)) state[key] = state[key].filter(x => x !== id);
  else state[key].push(id);
  renderFn();
  updatePrompt();
}

function clearIntentFields() {
  state.intentGoal = '';
  state.intentInput = '';
  renderIntentControls();
  updatePrompt();
  showToast('Intent cleared');
}

async function pasteIntentContext() {
  if (!navigator.clipboard?.readText) {
    showToast('Clipboard unavailable');
    return;
  }

  try {
    const value = await navigator.clipboard.readText();
    if (!value.trim()) {
      showToast('Clipboard is empty');
      return;
    }
    state.intentInput = value;
    renderIntentControls();
    updatePrompt();
    showToast('Context pasted');
  } catch (err) {
    showToast('Clipboard blocked');
  }
}

function applyWorkflowProfile(profile) {
  if (!WORKFLOW_PROFILES.includes(profile)) return;
  state.workflowProfile = profile;

  if (profile === 'rapid') {
    state.showRefine = false;
    state.includeGuardrails = false;
  } else if (profile === 'balanced') {
    state.showRefine = true;
    state.includeGuardrails = true;
  } else {
    state.showRefine = true;
    state.includeGuardrails = true;
  }

  renderIntentControls();
  updateSectionVisibility();
  updatePrompt();
}

function updateSectionVisibility() {
  renderIntentControls();
  const card = $('modifiersCard');
  const toggle = document.querySelector('[data-section-toggle="includeGuardrails"]');
  if (card && toggle) {
    card.classList.toggle('forge-disabled', !state.includeGuardrails);
    toggle.classList.toggle('checked', state.includeGuardrails);
  }
}

// ============ ACTIONS ============
function applyQuickFire(id) {
  const qf = QUICK_FIRES.find(q => q.id === id);
  if (!qf) return;

  document.querySelectorAll('.forge-qf-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-qf="${id}"]`);
  if (btn) btn.classList.add('active');

  state.showRefine = true;
  state.workflowProfile = 'deep';

  // Clear enabled snippets
  snippetMgr.enabledIds = [];

  const r = qf.recipe;
  if (r.persona) {
    const p = PERSONAS.find(x => x.id === r.persona);
    if (p && p.text) enableOrCreateSnippet(p.label, p.text, 'persona');
  }
  if (r.pattern) {
    const p = PATTERNS.find(x => x.id === r.pattern);
    if (p && p.text) enableOrCreateSnippet(p.label, p.text, 'task');
  }
  if (r.devTask) {
    const d = DEV_TASKS.find(x => x.id === r.devTask);
    if (d && d.text) enableOrCreateSnippet(d.label, d.text, 'context');
  }
  if (r.guardrails) state.guardrails = [...r.guardrails];
  if (r.boosters) state.boosters = [...r.boosters];
  state.includeGuardrails = true;

  snippetMgr.save();
  renderSnippetTree();
  renderSnippetEditor();
  renderGuardrails();
  renderBoosters();
  renderIntentControls();
  updatePrompt();
  showToast(`${qf.label} mode!`);
}

function applyRecipe(id) {
  const recipe = RECIPES.find(r => r.id === id);
  if (!recipe) return;

  document.querySelectorAll('.forge-recipe-item').forEach(r => r.classList.remove('selected'));
  const item = document.querySelector(`[data-recipe="${id}"]`);
  if (item) item.classList.add('selected');

  state.showRefine = true;
  state.workflowProfile = 'deep';

  // Clear enabled snippets
  snippetMgr.enabledIds = [];

  const c = recipe.config;
  if (c.persona) {
    const p = PERSONAS.find(x => x.id === c.persona);
    if (p && p.text) enableOrCreateSnippet(p.label, p.text, 'persona');
  }
  if (c.voice) {
    const v = VOICES.find(x => x.id === c.voice);
    if (v && v.text) enableOrCreateSnippet(v.label, v.text, 'persona');
  }
  if (c.pattern) {
    const p = PATTERNS.find(x => x.id === c.pattern);
    if (p && p.text) enableOrCreateSnippet(p.label, p.text, 'task');
  }
  if (c.objective) {
    const o = OBJECTIVES.find(x => x.id === c.objective);
    if (o && o.text) enableOrCreateSnippet(o.label, o.text, 'rules');
  }
  if (c.deliverable) {
    const d = DELIVERABLES.find(x => x.id === c.deliverable);
    if (d && d.text) enableOrCreateSnippet(d.label, d.text, 'output-format');
  }
  if (c.devTask) {
    const d = DEV_TASKS.find(x => x.id === c.devTask);
    if (d && d.text) enableOrCreateSnippet(d.label, d.text, 'context');
  }
  if (c.guardrails) state.guardrails = [...c.guardrails];
  if (c.boosters) state.boosters = [...c.boosters];
  state.includeGuardrails = true;

  snippetMgr.save();
  renderSnippetTree();
  renderSnippetEditor();
  renderGuardrails();
  renderBoosters();
  renderIntentControls();
  updatePrompt();
  showToast(`${recipe.name} recipe!`);
}

function loadTemplate(name) {
  if (!templates[name]) return;
  const t = templates[name];
  // Migrate old template fields to snippets
  const validKeys = Object.keys(state);
  validKeys.forEach(k => {
    if (t.hasOwnProperty(k)) state[k] = t[k];
  });
  // Convert old state fields to snippets if present
  if (t.persona && t.persona !== 'custom') {
    const p = PERSONAS.find(x => x.id === t.persona);
    if (p && p.text) enableOrCreateSnippet(p.label, p.text, 'persona');
  }
  if (t.pattern && t.pattern !== 'custom') {
    const p = PATTERNS.find(x => x.id === t.pattern);
    if (p && p.text) enableOrCreateSnippet(p.label, p.text, 'task');
  }
  if (t.objective && t.objective !== 'custom') {
    const o = OBJECTIVES.find(x => x.id === t.objective);
    if (o && o.text) enableOrCreateSnippet(o.label, o.text, 'rules');
  }
  snippetMgr.save();
  renderSnippetTree();
  renderSnippetEditor();
  renderGuardrails();
  renderBoosters();
  renderIntentControls();
  updatePrompt();
  showToast(`Loaded: ${name}`);
}

function clearAll() {
  state = {
    intentMode: 'create',
    workflowProfile: 'balanced',
    intentGoal: '',
    intentInput: '',
    intentOutputFormat: 'steps',
    showRefine: false,
    extraInstructions: '',
    guardrails: [],
    boosters: [],
    includeGuardrails: true
  };
  snippetMgr.enabledIds = [];
  snippetMgr.selectedId = null;
  snippetMgr.save();
  renderSnippetTree();
  renderSnippetEditor();
  renderGuardrails();
  renderBoosters();
  renderIntentControls();
  updatePrompt();
  showToast('Cleared!');
}

function exportTemplates() {
  const data = JSON.stringify({
    templates,
    lastState: state,
    snippets: snippetMgr.snippets,
    projects: snippetMgr.projects,
    enabledIds: snippetMgr.enabledIds
  }, null, 2);
  downloadAsFile(data, 'prompt-forge-templates.json', 'application/json');
  showToast('Exported!');
}

// ============ PROMPT ASSEMBLY ============
function updatePrompt() {
  const prompt = assemblePrompt();
  const outputPre = $('outputPre');
  if (outputPre) {
    if (prompt.trim()) {
      outputPre.innerHTML = highlightPrompt(prompt);
    } else {
      outputPre.innerHTML = '<span style="color: var(--text-secondary);">Enable snippets and configure options to build your prompt.</span>';
    }
  }
  updateScore();
  saveToStorage();
}

function assemblePrompt() {
  const lines = [];
  const selectedIntentOutput = INTENT_OUTPUT_OPTIONS.find(o => o.id === state.intentOutputFormat);
  const outputLabel = selectedIntentOutput?.label || state.intentOutputFormat;

  if (state.intentMode) {
    lines.push('--- INTENT ---');
    lines.push(`Mode: ${state.intentMode}`);
    lines.push('');
  }

  if (!state.showRefine) {
    lines.push('--- REQUEST ---');
    lines.push(state.intentGoal || 'Help me with this request.');
    if (state.intentInput) lines.push(`Context:\n${state.intentInput}`);
    if (outputLabel) lines.push(`Return format: ${outputLabel}`);
    return lines.join('\n').trim();
  }

  // Enabled snippets
  const enabled = snippetMgr.getEnabledSnippets();
  if (enabled.length) {
    enabled.forEach(s => {
      const typeLabel = COMPONENT_TYPES.find(t => t.id === s.componentType)?.label || s.componentType;
      lines.push(`--- ${typeLabel.toUpperCase()} ---`);
      lines.push(s.content);
      lines.push('');
    });
  }

  // Intent fields
  if (state.intentGoal) {
    lines.push('--- GOAL ---');
    lines.push(state.intentGoal);
    lines.push('');
  }
  if (state.intentInput) {
    lines.push('--- CONTEXT ---');
    lines.push(state.intentInput);
    lines.push('');
  }
  if (outputLabel) {
    lines.push(`Output format: ${outputLabel}`);
    lines.push('');
  }

  // Guardrails (kept toggle-based)
  if (state.includeGuardrails && state.guardrails.length) {
    lines.push('--- GUARDRAILS ---');
    state.guardrails.forEach(id => { const g = GUARDRAILS.find(x => x.id === id); if (g) lines.push(`• ${g.label}: ${g.text}`); });
    lines.push('');
  }
  if (state.includeGuardrails && state.boosters.length) {
    lines.push('--- QUALITY BOOSTERS ---');
    state.boosters.forEach(id => { const b = BOOSTERS.find(x => x.id === id); if (b) lines.push(`• ${b.label}: ${b.text}`); });
    lines.push('');
  }
  if (state.extraInstructions) {
    lines.push('--- INSTRUCTIONS ---');
    lines.push(state.extraInstructions);
    lines.push('');
  }

  while (lines.length && lines[lines.length - 1] === '') lines.pop();
  return lines.join('\n');
}

function highlightPrompt(text) {
  return text.replace(/^(---.*---)$/gm, '<span class="section-label">$1</span>');
}

function updateScore() {
  let score = 0;
  const tips = [];
  const enabled = snippetMgr.getEnabledSnippets();
  const hasType = type => enabled.some(s => s.componentType === type);

  if (hasType('persona')) score += 15; else tips.push('Add persona');
  if (hasType('task')) score += 25; else tips.push('Add task');
  if (hasType('rules') || hasType('output-format')) score += 20; else tips.push('Add rules/format');
  if (hasType('context')) score += 10;
  if (hasType('constraints')) score += 5;
  if (state.guardrails.length) score += 10;
  if (state.boosters.length) score += 10;
  if (state.intentGoal) score += 5;

  score = Math.min(100, score);

  const scoreFill = $('scoreFill');
  if (scoreFill) scoreFill.style.width = score + '%';

  const scoreValue = $('scoreValue');
  if (scoreValue) {
    scoreValue.textContent = score + '%';
    scoreValue.style.color = score >= 70 ? 'var(--success)' : score >= 40 ? 'var(--warning)' : 'var(--error)';
  }

  const scoreTips = $('scoreTips');
  if (scoreTips) scoreTips.textContent = tips.slice(0, 2).join(', ') || 'Good!';
}

function copyPrompt() {
  const text = assemblePrompt();
  if (!text.trim()) {
    showToast('Nothing to copy!');
    return;
  }

  copyToClipboard(text, {
    onSuccess: () => {
      history.unshift({
        name: state.intentGoal ? state.intentGoal.substring(0, 30) : 'Prompt',
        time: Date.now(),
        state: { ...state }
      });
      history = history.slice(0, 20);
      renderHistory();
      saveToStorage();

      const btn = $('copyBtn');
      if (btn) {
        const original = btn.innerHTML;
        btn.innerHTML = '✓ Copied!';
        btn.classList.add('forge-btn-success');
        setTimeout(() => {
          btn.innerHTML = original;
          btn.classList.remove('forge-btn-success');
        }, 1500);
      }
    },
    onError: () => {
      showToast('Failed to copy!');
    }
  });
}

// ============ UTILITIES ============
function openModal(id) {
  const modal = $(id);
  if (modal) modal.classList.add('active');
}

function closeModal(id) {
  const modal = $(id);
  if (modal) modal.classList.remove('active');
}

function saveCurrentTemplate() {
  const input = $('templateNameInput');
  if (!input) return;
  const name = input.value.trim();
  if (name) {
    templates[name] = { ...state };
    saveToStorage();
    closeModal('saveModal');
    input.value = '';
    showToast(`Saved: ${name}`);
  }
}

function showToast(msg) {
  const toast = $('toast');
  const toastText = $('toastText');
  if (toast && toastText) {
    toastText.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }
}

function formatTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
  return new Date(ts).toLocaleDateString();
}
