<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Forge</title>
</head>
<body>

<!-- DevChef Manifest -->
<script type="devchef-manifest">
{
  "id": "prompt-forge",
  "name": "Prompt Forge",
  "description": "Advanced prompt engineering with reusable strategy patterns, few-shot examples, chain-of-thought, and template import/export",
  "category": "Developer Tools",
  "keywords": ["prompt", "ai", "advanced", "chain-of-thought", "few-shot", "examples", "engineering", "llm", "claude", "chatgpt"],
  "version": "13.0.0"
}
</script>

<!-- Tool UI Template -->
<template id="tool-ui">
  <div class="pf-tool" data-preserve-legacy-controls>

    <section class="pf-patterns" aria-labelledby="pf-patterns-title">
      <div class="pf-section-head">
        <div>
          <h3 id="pf-patterns-title" class="pf-section-title">Prompt Patterns</h3>
          <p class="pf-section-copy">Load an advanced scaffold, then tune examples, reasoning, and output constraints.</p>
        </div>
      </div>
      <div class="pf-pattern-grid" id="pf-pattern-grid"></div>
    </section>

    <section class="pf-controls" aria-labelledby="pf-controls-title">
      <div class="pf-section-head">
        <div>
          <h3 id="pf-controls-title" class="pf-section-title">Advanced Controls</h3>
          <p class="pf-section-copy">Apply reliability directives that are useful when prompts need stronger structure.</p>
        </div>
      </div>
      <div class="pf-control-grid" id="pf-control-grid"></div>
    </section>

    <!-- Task slot — always open, required -->
    <div class="pf-slot pf-slot-task">
      <div class="pf-slot-label-row">
        <span class="pf-label">Task <span class="pf-required">required</span></span>
        <div class="pf-task-controls">
          <span class="pf-char-count" id="pf-char-count">0 chars</span>
          <button class="pf-cot-toggle" id="pf-cot-btn" type="button" title="Chain-of-Thought: ask AI to reason step by step before answering">CoT</button>
        </div>
      </div>
      <textarea
        id="pf-task"
        class="pf-task-input"
        placeholder="What do you need? e.g. &quot;Write unit tests for the auth module in TypeScript&quot;"
        rows="4"
      ></textarea>
    </div>

    <!-- Role slot — collapsible -->
    <div class="pf-slot pf-slot-collapsible" id="pf-role-slot">
      <button class="pf-slot-toggle" type="button" aria-expanded="false" data-slot="role">
        <span class="pf-label">Role</span>
        <span class="pf-summary" id="pf-role-summary">None</span>
        <span class="pf-chevron" aria-hidden="true">›</span>
      </button>
      <div class="pf-slot-body" id="pf-role-body" hidden>
        <div class="pf-pills" id="pf-role-pills"></div>
        <textarea id="pf-role-custom" class="pf-slot-textarea" rows="2"
          placeholder="Or describe a custom role…"></textarea>
      </div>
    </div>

    <!-- Context slot — collapsible -->
    <div class="pf-slot pf-slot-collapsible" id="pf-context-slot">
      <button class="pf-slot-toggle" type="button" aria-expanded="false" data-slot="context">
        <span class="pf-label">Context</span>
        <span class="pf-summary" id="pf-context-summary">Empty</span>
        <span class="pf-chevron" aria-hidden="true">›</span>
      </button>
      <div class="pf-slot-body" id="pf-context-body" hidden>
        <textarea id="pf-context" class="pf-slot-textarea" rows="4"
          placeholder="Paste code, error messages, specs, or any relevant context…"></textarea>
      </div>
    </div>

    <!-- Examples slot — collapsible (few-shot) -->
    <div class="pf-slot pf-slot-collapsible" id="pf-examples-slot">
      <button class="pf-slot-toggle" type="button" aria-expanded="false" data-slot="examples">
        <span class="pf-label">Examples <span class="pf-label-hint">few-shot</span></span>
        <span class="pf-summary" id="pf-examples-summary">None</span>
        <span class="pf-chevron" aria-hidden="true">›</span>
      </button>
      <div class="pf-slot-body" id="pf-examples-body" hidden>
        <p class="pf-examples-help">Add input/output pairs to guide the AI with concrete examples.</p>
        <div id="pf-examples-list"></div>
        <button class="pf-add-example-btn" id="pf-add-example-btn" type="button">+ Add Example</button>
      </div>
    </div>

    <!-- Format slot — collapsible -->
    <div class="pf-slot pf-slot-collapsible" id="pf-format-slot">
      <button class="pf-slot-toggle" type="button" aria-expanded="false" data-slot="format">
        <span class="pf-label">Format</span>
        <span class="pf-summary" id="pf-format-summary">Default</span>
        <span class="pf-chevron" aria-hidden="true">›</span>
      </button>
      <div class="pf-slot-body" id="pf-format-body" hidden>
        <div class="pf-pills" id="pf-format-pills"></div>
        <textarea id="pf-format-custom" class="pf-slot-textarea" rows="2"
          placeholder="Or describe a custom output format…"></textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="pf-actions">
      <button id="pf-copy-btn" class="pf-btn pf-btn-primary" type="button">Copy Prompt</button>
      <button id="pf-clear-btn" class="pf-btn pf-btn-secondary" type="button">Clear</button>
      <button id="pf-save-btn" class="pf-btn pf-btn-secondary" type="button">Save Template</button>
      <button id="pf-export-btn" class="pf-btn pf-btn-secondary" type="button" title="Export templates as JSON">Export</button>
      <button id="pf-import-btn" class="pf-btn pf-btn-secondary" type="button" title="Import templates from JSON">Import</button>
      <input id="pf-import-file" type="file" accept=".json" style="display:none" />
    </div>

    <!-- Templates strip -->
    <div class="pf-templates-wrap" id="pf-templates-wrap">
      <div class="pf-templates-strip" id="pf-templates-strip" role="list" aria-label="Saved templates"></div>
    </div>

    <!-- Save template dialog -->
    <div class="pf-dialog-backdrop" id="pf-dialog-backdrop">
      <div class="pf-dialog" role="dialog" aria-modal="true" aria-labelledby="pf-dialog-title">
        <h3 id="pf-dialog-title">Save Template</h3>
        <input id="pf-template-name-input" type="text" placeholder="Template name…" autocomplete="off" />
        <div class="pf-dialog-actions">
          <button id="pf-dialog-confirm" class="pf-btn pf-btn-primary" type="button">Save</button>
          <button id="pf-dialog-cancel" class="pf-btn pf-btn-secondary" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <div class="pf-toast" id="pf-toast" aria-live="polite"></div>
  </div>
</template>

<!-- Styles -->
<style>
  .pf-tool {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 780px;
    margin: 0 auto;
    padding: 16px 12px;
    position: relative;
  }

  .pf-patterns {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 2px 0 4px;
  }

  .pf-section-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .pf-section-title {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .pf-section-copy {
    margin: 4px 0 0;
    font-size: 12px;
    line-height: 1.45;
    color: var(--text-secondary);
  }

  .pf-pattern-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
  }

  .pf-control-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }

  .pf-pattern-card {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 148px;
    padding: 12px;
    text-align: left;
    border: 1px solid var(--border-color);
    border-radius: 14px;
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--accent) 9%, var(--bg-secondary)) 0%, var(--bg-secondary) 100%);
    color: var(--text-primary);
    cursor: pointer;
    transition: transform 0.14s, border-color 0.14s, box-shadow 0.14s;
  }

  .pf-pattern-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .pf-pattern-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 38%, transparent);
  }

  .pf-pattern-kicker {
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .pf-pattern-title {
    font-size: 13px;
    font-weight: 700;
  }

  .pf-pattern-copy {
    font-size: 12px;
    line-height: 1.45;
    color: var(--text-secondary);
  }

  .pf-control-card {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 112px;
    padding: 11px 12px;
    text-align: left;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    cursor: pointer;
    transition: border-color 0.12s, transform 0.12s, box-shadow 0.12s;
  }

  .pf-control-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .pf-control-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 34%, transparent);
    background: color-mix(in srgb, var(--accent) 8%, var(--bg-secondary));
  }

  .pf-control-title {
    font-size: 12px;
    font-weight: 700;
  }

  .pf-control-copy {
    font-size: 12px;
    line-height: 1.45;
    color: var(--text-secondary);
  }

  /* ── Slots ── */
  .pf-slot {
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background: var(--bg-secondary);
    overflow: hidden;
  }

  .pf-slot-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 6px;
  }

  .pf-task-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pf-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .pf-label-hint {
    font-size: 10px;
    font-weight: 500;
    color: var(--accent);
    margin-left: 5px;
    text-transform: none;
    letter-spacing: 0;
    font-style: italic;
  }

  .pf-required {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    margin-left: 6px;
    text-transform: none;
    letter-spacing: 0;
  }

  .pf-char-count {
    font-size: 11px;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }

  /* Chain-of-Thought toggle */
  .pf-cot-toggle {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--border-color);
    background: var(--bg-primary);
    color: var(--text-secondary);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.12s;
  }

  .pf-cot-toggle:hover { border-color: var(--accent); color: var(--accent); }

  .pf-cot-toggle.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .pf-task-input {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 6px 14px 12px;
    background: transparent;
    border: none;
    outline: none;
    resize: vertical;
    font-size: 14px;
    font-family: var(--font-sans);
    color: var(--text-primary);
    line-height: 1.55;
  }

  .pf-task-input::placeholder { color: var(--text-secondary); opacity: 0.7; }

  /* Collapsible slot toggle */
  .pf-slot-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 12px 14px;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    color: var(--text-primary);
    transition: background 0.12s;
  }

  .pf-slot-toggle:hover { background: var(--bg-tertiary); }
  .pf-slot-collapsible.open .pf-slot-toggle { background: var(--bg-tertiary); }

  .pf-summary {
    flex: 1;
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-style: italic;
  }

  .pf-slot-collapsible.filled .pf-summary {
    color: var(--text-primary);
    font-style: normal;
    font-weight: 500;
  }

  .pf-chevron {
    font-size: 16px;
    color: var(--text-secondary);
    transition: transform 0.15s;
    line-height: 1;
  }

  .pf-slot-collapsible.open .pf-chevron { transform: rotate(90deg); }

  /* Slot body */
  .pf-slot-body {
    padding: 0 14px 14px;
    border-top: 1px solid var(--border-color);
  }

  .pf-slot-textarea {
    display: block;
    width: 100%;
    box-sizing: border-box;
    margin-top: 10px;
    padding: 8px 10px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    outline: none;
    resize: vertical;
    font-size: 13px;
    font-family: var(--font-sans);
    color: var(--text-primary);
    line-height: 1.5;
    transition: border-color 0.1s;
  }

  .pf-slot-textarea:focus { border-color: var(--accent); }
  .pf-slot-textarea::placeholder { color: var(--text-secondary); opacity: 0.7; }

  /* Pills */
  .pf-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-top: 12px;
  }

  .pf-pill {
    border: 1px solid var(--border-color);
    background: var(--bg-primary);
    color: var(--text-primary);
    border-radius: 999px;
    padding: 5px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s, color 0.1s;
    white-space: nowrap;
  }

  .pf-pill:hover { border-color: var(--accent); }

  .pf-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Examples */
  .pf-examples-help {
    font-size: 12px;
    color: var(--text-secondary);
    margin: 10px 0 8px;
    line-height: 1.4;
  }

  .pf-example-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
    position: relative;
  }

  .pf-example-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .pf-example-textarea {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 7px 9px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    outline: none;
    resize: vertical;
    font-size: 12px;
    font-family: var(--font-sans);
    color: var(--text-primary);
    line-height: 1.45;
    transition: border-color 0.1s;
  }

  .pf-example-textarea:focus { border-color: var(--accent); }
  .pf-example-textarea::placeholder { color: var(--text-secondary); opacity: 0.6; }

  .pf-example-del {
    position: absolute;
    top: 0;
    right: -4px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid var(--border-color);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s, border-color 0.1s;
  }

  .pf-example-del:hover { color: var(--error, #e55); border-color: var(--error, #e55); }

  .pf-add-example-btn {
    margin-top: 4px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px dashed var(--border-color);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: border-color 0.1s, color 0.1s;
  }

  .pf-add-example-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Actions */
  .pf-actions {
    display: flex;
    gap: 8px;
    padding: 4px 0 2px;
    flex-wrap: wrap;
  }

  .pf-btn {
    padding: 8px 18px;
    border-radius: var(--radius-lg, 8px);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity 0.1s, transform 0.1s;
  }

  .pf-btn:active { transform: scale(0.97); }

  .pf-btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .pf-btn-primary:hover { opacity: 0.88; }

  .pf-btn-secondary {
    background: var(--bg-secondary);
    color: var(--text-primary);
    border-color: var(--border-color);
  }

  .pf-btn-secondary:hover { border-color: var(--accent); }

  /* Templates strip */
  .pf-templates-wrap { min-height: 32px; }

  .pf-templates-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: thin;
  }

  .pf-template-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 999px;
    padding: 5px 8px 5px 12px;
    white-space: nowrap;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.1s;
    flex-shrink: 0;
  }

  .pf-template-chip:hover { border-color: var(--accent); }

  .pf-template-chip-name {
    font-weight: 600;
    color: var(--text-primary);
  }

  .pf-template-chip-del {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    font-size: 10px;
    color: var(--text-secondary);
    cursor: pointer;
    flex-shrink: 0;
  }

  .pf-template-chip-del:hover { color: var(--error, #e55); }

  /* Dialog — uses .open class to show/hide (avoids hidden-attr vs display:flex specificity issue) */
  .pf-dialog-backdrop {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    align-items: center;
    justify-content: center;
    z-index: 100;
    border-radius: 10px;
  }

  .pf-dialog-backdrop.open {
    display: flex;
  }

  .pf-dialog {
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 20px;
    width: 320px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  .pf-dialog h3 {
    margin: 0 0 14px;
    font-size: 15px;
  }

  .pf-dialog input {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 8px 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    margin-bottom: 14px;
  }

  .pf-dialog input:focus { border-color: var(--accent); }

  .pf-dialog-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* Toast */
  .pf-toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 200;
  }

  .pf-toast.visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 640px) {
    .pf-tool {
      padding-inline: 10px;
    }

    .pf-pattern-grid,
    .pf-example-pair {
      grid-template-columns: 1fr;
    }
  }
</style>

<!-- Module -->
<script type="module">
import {
  ROLES,
  FORMATS,
  assemblePrompt,
  resolveRoleText,
  resolveFormatText,
  validateSlots,
  saveTemplate,
  loadTemplate,
  deleteTemplate,
  serializeTemplates,
  parseTemplates,
  slotSummary,
  presetLabel,
} from '../core/prompt-slots.js';
import { copyToClipboard } from '../core/tool-utils.js';

const STORAGE_KEY = 'promptForge_v13';

const ADVANCED_CONTROLS = [
  {
    id: 'clarify-first',
    label: 'Clarify First',
    text: 'If critical information is missing, ask up to three concise clarifying questions before answering.'
  },
  {
    id: 'state-assumptions',
    label: 'State Assumptions',
    text: 'Explicitly list the assumptions you are making and mark them as assumptions.'
  },
  {
    id: 'self-check',
    label: 'Self-Check',
    text: 'Before finalizing, perform a brief self-check for correctness, completeness, and consistency with the instructions.'
  },
  {
    id: 'failure-modes',
    label: 'Failure Modes',
    text: 'Include likely failure modes, edge cases, or ways the proposed answer could go wrong.'
  },
  {
    id: 'cite-evidence',
    label: 'Use Evidence',
    text: 'Ground the answer in the provided context and call out which details support each key conclusion.'
  },
  {
    id: 'separate-facts',
    label: 'Facts vs Inference',
    text: 'Separate confirmed facts from inferences, hypotheses, or recommendations.'
  },
];

const PATTERN_PRESETS = [
  {
    id: 'debug-investigation',
    label: 'Debug Investigation',
    family: 'Diagnosis',
    description: 'Structure a failure analysis with evidence, hypotheses, and next experiments.',
    guidance: [
      'State observable symptoms before proposing root causes.',
      'Rank likely causes and explain why each is plausible.',
      'Recommend the next checks or logs that would reduce uncertainty fastest.'
    ],
    slots: {
      task: 'Investigate the issue below and produce a diagnosis that prioritizes evidence, likely causes, and the next debugging actions.',
      rolePresetId: 'reviewer',
      contextText: 'System or code context:\nError output:\nWhat changed recently:\nObserved symptoms:\nWhat has already been tried:',
      formatPresetId: 'playbook',
      chainOfThought: true,
      examples: [

// ── State ────────────────────────────────────────────────────────────────────

let state = {
  patternPresetId: null,
  task: '',
  rolePresetId: null,
  roleCustom: '',
  contextText: '',
  formatPresetId: null,
  formatCustom: '',
  chainOfThought: false,
  directives: [],
  examples: [],          // [{ input: string, output: string }]
  templates: [],
};

let container = null;

// ── Helpers ──────────────────────────────────────────────────────────────────

const $ = id => container.querySelector(`#${id}`);

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function restore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) Object.assign(state, JSON.parse(raw));
  } catch {}
}

function toast(msg, isError = false) {
  const el = $('pf-toast');
  el.textContent = msg;
  el.style.color = isError ? 'var(--error, #e55)' : 'var(--success, #4c4)';
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 2500);
}

function resolvePatternGuidance() {
  if (!state.patternPresetId) return '';
  const preset = PATTERN_PRESETS.find(item => item.id === state.patternPresetId);
  if (!preset?.guidance?.length) return '';
  return preset.guidance.map((line, index) => `${index + 1}. ${line}`).join('\n');
}

function resolveDirectiveText() {
  if (!Array.isArray(state.directives) || state.directives.length === 0) return '';
  const lines = ADVANCED_CONTROLS
    .filter(control => state.directives.includes(control.id))
    .map((control, index) => `${index + 1}. ${control.text}`);
  return lines.length ? lines.join('\n') : '';
}

// ── Prompt assembly ───────────────────────────────────────────────────────────

function buildPrompt() {
  const role = resolveRoleText(state.rolePresetId, state.roleCustom);
  const format = resolveFormatText(state.formatPresetId, state.formatCustom);
  const base = assemblePrompt({ task: state.task, role, context: state.contextText, format });

  const extras = [];

  if (state.examples && state.examples.length > 0) {
    const filled = state.examples.filter(ex => ex.input.trim() || ex.output.trim());
    if (filled.length > 0) {
      const exBlock = filled.map((ex, i) =>
        `Example ${i + 1}:\nInput: ${ex.input.trim()}\nOutput: ${ex.output.trim()}`
      ).join('\n\n');
      extras.push(`Examples:\n${exBlock}`);
    }
  }

  if (state.chainOfThought) {
    extras.push('Think step by step before giving your final answer.');
  }

  const guidance = resolvePatternGuidance();
  if (guidance) {
    extras.push(`Strategy guidance:\n${guidance}`);
  }

  const directives = resolveDirectiveText();
  if (directives) {
    extras.push(`Reliability directives:\n${directives}`);
  }

  if (extras.length === 0) return base;
  return base + '\n\n' + extras.join('\n\n');
}

// ── Render ───────────────────────────────────────────────────────────────────

function renderPills(containerId, items, activeId, onSelect) {
  const wrap = $(containerId);
  wrap.innerHTML = '';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pf-pill' + (item.id === activeId ? ' active' : '');
    btn.textContent = item.label;
    btn.dataset.id = item.id;
    btn.addEventListener('click', () => onSelect(item.id === activeId ? null : item.id));
    wrap.appendChild(btn);
  });
}

function renderPatternPresets() {
  const grid = $('pf-pattern-grid');
  grid.innerHTML = '';

  PATTERN_PRESETS.forEach(preset => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'pf-pattern-card' + (preset.id === state.patternPresetId ? ' active' : '');
    button.addEventListener('click', () => applyPatternPreset(preset.id));

    const kicker = document.createElement('div');
    kicker.className = 'pf-pattern-kicker';
    kicker.textContent = preset.family;

    const title = document.createElement('div');
    title.className = 'pf-pattern-title';
    title.textContent = preset.label;

    const copy = document.createElement('div');
    copy.className = 'pf-pattern-copy';
    copy.textContent = preset.description;

    button.append(kicker, title, copy);
    grid.appendChild(button);
  });
}

function renderAdvancedControls() {
  const grid = $('pf-control-grid');
  grid.innerHTML = '';

  ADVANCED_CONTROLS.forEach(control => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'pf-control-card' + (state.directives.includes(control.id) ? ' active' : '');
    button.addEventListener('click', () => toggleDirective(control.id));

    const title = document.createElement('div');
    title.className = 'pf-control-title';
    title.textContent = control.label;

    const copy = document.createElement('div');
    copy.className = 'pf-control-copy';
    copy.textContent = control.text;

    button.append(title, copy);
    grid.appendChild(button);
  });
}

function updateRoleSummary() {
  const el = $('pf-role-summary');
  const slot = $('pf-role-slot');
  const label = presetLabel(state.rolePresetId, ROLES, null);
  const text = label ?? state.roleCustom;
  el.textContent = slotSummary(text, 'None', 48);
  slot.classList.toggle('filled', !!(state.rolePresetId || state.roleCustom.trim()));
}

function updateContextSummary() {
  const el = $('pf-context-summary');
  const slot = $('pf-context-slot');
  el.textContent = slotSummary(state.contextText, 'Empty', 48);
  slot.classList.toggle('filled', !!state.contextText.trim());
}

function updateFormatSummary() {
  const el = $('pf-format-summary');
  const slot = $('pf-format-slot');
  const label = presetLabel(state.formatPresetId, FORMATS, null);
  const text = label ?? state.formatCustom;
  el.textContent = slotSummary(text, 'Default', 48);
  slot.classList.toggle('filled', !!(state.formatPresetId || state.formatCustom.trim()));
}

function updateExamplesSummary() {
  const el = $('pf-examples-summary');
  const slot = $('pf-examples-slot');
  const filled = (state.examples || []).filter(ex => ex.input.trim() || ex.output.trim());
  if (filled.length === 0) {
    el.textContent = 'None';
    slot.classList.remove('filled');
  } else {
    el.textContent = `${filled.length} example${filled.length > 1 ? 's' : ''}`;
    slot.classList.add('filled');
  }
}

function updateCharCount() {
  $('pf-char-count').textContent = `${buildPrompt().length} chars`;
}

function updateCotButton() {
  $('pf-cot-btn').classList.toggle('active', !!state.chainOfThought);
}

function renderExamples() {
  const list = $('pf-examples-list');
  list.innerHTML = '';
  (state.examples || []).forEach((ex, i) => {
    const pair = document.createElement('div');
    pair.className = 'pf-example-pair';

    const inputCol = document.createElement('div');
    const inputLabel = document.createElement('div');
    inputLabel.className = 'pf-example-label';
    inputLabel.textContent = 'Input';
    const inputTa = document.createElement('textarea');
    inputTa.className = 'pf-example-textarea';
    inputTa.rows = 3;
    inputTa.placeholder = 'e.g. "Translate this to French"';
    inputTa.value = ex.input;
    inputTa.addEventListener('input', e => {
      state.patternPresetId = null;
      state.examples[i].input = e.target.value;
      renderPatternPresets();
      updateExamplesSummary(); updateCharCount(); persist();
    });
    inputCol.appendChild(inputLabel);
    inputCol.appendChild(inputTa);

    const outputCol = document.createElement('div');
    const outputLabel = document.createElement('div');
    outputLabel.className = 'pf-example-label';
    outputLabel.textContent = 'Output';
    const outputTa = document.createElement('textarea');
    outputTa.className = 'pf-example-textarea';
    outputTa.rows = 3;
    outputTa.placeholder = 'e.g. "Traduire ceci en français"';
    outputTa.value = ex.output;
    outputTa.addEventListener('input', e => {
      state.patternPresetId = null;
      state.examples[i].output = e.target.value;
      renderPatternPresets();
      updateExamplesSummary(); updateCharCount(); persist();
    });
    outputCol.appendChild(outputLabel);
    outputCol.appendChild(outputTa);

    const del = document.createElement('button');
    del.className = 'pf-example-del';
    del.type = 'button';
    del.textContent = '×';
    del.title = 'Remove example';
    del.addEventListener('click', () => {
      state.patternPresetId = null;
      state.examples.splice(i, 1);
      renderPatternPresets();
      renderExamples(); updateExamplesSummary(); updateCharCount(); persist();
    });

    pair.appendChild(inputCol);
    pair.appendChild(outputCol);
    pair.appendChild(del);
    list.appendChild(pair);
  });

  $('pf-add-example-btn').style.display =
    (state.examples || []).length >= 5 ? 'none' : 'block';
}

function renderTemplates() {
  const strip = $('pf-templates-strip');
  strip.innerHTML = '';
  if (!state.templates.length) return;

  state.templates.forEach(tpl => {
    const chip = document.createElement('div');
    chip.className = 'pf-template-chip';
    chip.setAttribute('role', 'listitem');

    const name = document.createElement('span');
    name.className = 'pf-template-chip-name';
    name.textContent = tpl.name;
    name.addEventListener('click', () => applyTemplate(tpl.name));

    const del = document.createElement('span');
    del.className = 'pf-template-chip-del';
    del.textContent = '×';
    del.title = `Delete "${tpl.name}"`;
    del.addEventListener('click', e => { e.stopPropagation(); removeTemplate(tpl.name); });

    chip.appendChild(name);
    chip.appendChild(del);
    strip.appendChild(chip);
  });
}

// ── Slot toggle ───────────────────────────────────────────────────────────────

function toggleSlot(slotName) {
  const slot = $(`pf-${slotName}-slot`);
  const body = $(`pf-${slotName}-body`);
  const btn = slot.querySelector('.pf-slot-toggle');
  const isOpen = slot.classList.contains('open');

  slot.classList.toggle('open', !isOpen);
  body.hidden = isOpen;
  btn.setAttribute('aria-expanded', String(!isOpen));
}

// ── Actions ───────────────────────────────────────────────────────────────────

function copyPrompt() {
  const errors = validateSlots({ task: state.task });
  if (errors.length) { toast(errors[0], true); return; }

  const prompt = buildPrompt();
  copyToClipboard(prompt, {
    onSuccess: () => toast('✓ Copied!'),
    onError: () => toast('✗ Failed')
  });
}

function clearAll() {
  state.patternPresetId = null;
  state.task = '';
  state.rolePresetId = null;
  state.roleCustom = '';
  state.contextText = '';
  state.formatPresetId = null;
  state.formatCustom = '';
  state.chainOfThought = false;
  state.directives = [];
  state.examples = [];
  applyStateToDOM();
  persist();
}

function showSaveDialog() {
  $('pf-dialog-backdrop').classList.add('open');
  $('pf-template-name-input').value = '';
  setTimeout(() => $('pf-template-name-input').focus(), 50);
}

function hideSaveDialog() {
  $('pf-dialog-backdrop').classList.remove('open');
}

function confirmSave() {
  const name = $('pf-template-name-input').value.trim();
  if (!name) { toast('Enter a name', true); return; }
  try {
    const slots = {
      patternPresetId: state.patternPresetId,
      task: state.task, rolePresetId: state.rolePresetId, roleCustom: state.roleCustom,
      contextText: state.contextText, formatPresetId: state.formatPresetId, formatCustom: state.formatCustom,
      chainOfThought: state.chainOfThought, directives: [...state.directives], examples: JSON.parse(JSON.stringify(state.examples)),
    };
    state.templates = saveTemplate(name, slots, state.templates);
    renderTemplates();
    persist();
    hideSaveDialog();
    toast(`✓ Saved "${name}"`);
  } catch (e) { toast(e.message, true); }
}

function applyTemplate(name) {
  const slots = loadTemplate(name, state.templates);
  if (!slots) return;
  Object.assign(state, slots);
  applyStateToDOM();
  persist();
  toast(`Loaded "${name}"`);
}

function removeTemplate(name) {
  state.templates = deleteTemplate(name, state.templates);
  renderTemplates();
  persist();
}

function exportTemplates() {
  if (!state.templates.length) { toast('No templates to export', true); return; }
  const json = serializeTemplates(state.templates);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'prompt-forge-templates.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ Exported');
}

function triggerImport() {
  $('pf-import-file').value = '';
  $('pf-import-file').click();
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = parseTemplates(ev.target.result);
      const existing = new Set(state.templates.map(t => t.name));
      const newOnes = imported.filter(t => !existing.has(t.name));
      state.templates = [...state.templates, ...newOnes];
      renderTemplates(); persist();
      toast(`✓ Imported ${newOnes.length} template${newOnes.length !== 1 ? 's' : ''}`);
    } catch (err) {
      toast(err.message, true);
    }
  };
  reader.readAsText(file);
}

// ── Named pill handlers ───────────────────────────────────────────────────────

function reRoleSelect(id) {
  state.rolePresetId = id;
  state.patternPresetId = null;
  renderPills('pf-role-pills', ROLES, state.rolePresetId, reRoleSelect);
  renderPatternPresets();
  updateRoleSummary();
  updateCharCount();
  persist();
}

function reFormatSelect(id) {
  state.formatPresetId = id;
  state.patternPresetId = null;
  renderPills('pf-format-pills', FORMATS, state.formatPresetId, reFormatSelect);
  renderPatternPresets();
  updateFormatSummary();
  updateCharCount();
  persist();
}

function applyPatternPreset(id) {
  const preset = PATTERN_PRESETS.find(item => item.id === id);
  if (!preset) return;

  state = {
    ...state,
    patternPresetId: preset.id,
    roleCustom: '',
    formatCustom: '',
    directives: [],
    ...preset.slots,
    examples: JSON.parse(JSON.stringify(preset.slots.examples || [])),
  };

  applyStateToDOM();
  persist();
}

function toggleDirective(id) {
  const next = new Set(state.directives || []);
  if (next.has(id)) {
    next.delete(id);
  } else {
    next.add(id);
  }
  state.patternPresetId = null;
  state.directives = [...next];
  renderPatternPresets();
  renderAdvancedControls();
  updateCharCount();
  persist();
}

// ── DOM sync ─────────────────────────────────────────────────────────────────

function applyStateToDOM() {
  if (!Array.isArray(state.directives)) state.directives = [];
  $('pf-task').value = state.task;
  $('pf-role-custom').value = state.roleCustom;
  $('pf-context').value = state.contextText;
  $('pf-format-custom').value = state.formatCustom;
  renderPatternPresets();
  renderAdvancedControls();
  renderPills('pf-role-pills', ROLES, state.rolePresetId, reRoleSelect);
  renderPills('pf-format-pills', FORMATS, state.formatPresetId, reFormatSelect);
  updateRoleSummary();
  updateContextSummary();
  updateFormatSummary();
  updateCotButton();
  renderExamples();
  updateExamplesSummary();
  updateCharCount();
  renderTemplates();
}

// ── Init ─────────────────────────────────────────────────────────────────────

export function init(context) {
  container = context.container;
  restore();
  if (!state.examples) state.examples = [];
  applyStateToDOM();

  // Task input
  $('pf-task').addEventListener('input', e => {
    state.task = e.target.value;
    state.patternPresetId = null;
    renderPatternPresets();
    updateCharCount();
    persist();
  });

  // Chain-of-thought toggle
  $('pf-cot-btn').addEventListener('click', () => {
    state.chainOfThought = !state.chainOfThought;
    state.patternPresetId = null;
    renderPatternPresets();
    updateCotButton();
    updateCharCount();
    persist();
  });

  // Role custom text
  $('pf-role-custom').addEventListener('input', e => {
    state.roleCustom = e.target.value;
    if (state.roleCustom.trim()) {
      state.rolePresetId = null;
      state.patternPresetId = null;
    }
    renderPills('pf-role-pills', ROLES, state.rolePresetId, reRoleSelect);
    renderPatternPresets();
    updateRoleSummary();
    updateCharCount();
    persist();
  });

  // Context text
  $('pf-context').addEventListener('input', e => {
    state.contextText = e.target.value;
    state.patternPresetId = null;
    renderPatternPresets();
    updateContextSummary();
    updateCharCount();
    persist();
  });

  // Format custom text
  $('pf-format-custom').addEventListener('input', e => {
    state.formatCustom = e.target.value;
    if (state.formatCustom.trim()) {
      state.formatPresetId = null;
      state.patternPresetId = null;
    }
    renderPills('pf-format-pills', FORMATS, state.formatPresetId, reFormatSelect);
    renderPatternPresets();
    updateFormatSummary();
    updateCharCount();
    persist();
  });

  // Add example
  $('pf-add-example-btn').addEventListener('click', () => {
    if (!state.examples) state.examples = [];
    if (state.examples.length >= 5) return;
    state.patternPresetId = null;
    state.examples.push({ input: '', output: '' });
    renderPatternPresets();
    renderExamples(); updateExamplesSummary(); persist();
    // Auto-open examples slot
    const slot = $('pf-examples-slot');
    if (!slot.classList.contains('open')) toggleSlot('examples');
  });

  // Slot toggles
  container.querySelectorAll('.pf-slot-toggle').forEach(btn => {
    btn.addEventListener('click', () => toggleSlot(btn.dataset.slot));
  });

  // Actions
  $('pf-copy-btn').addEventListener('click', copyPrompt);
  $('pf-clear-btn').addEventListener('click', clearAll);
  $('pf-save-btn').addEventListener('click', showSaveDialog);
  $('pf-export-btn').addEventListener('click', exportTemplates);
  $('pf-import-btn').addEventListener('click', triggerImport);
  $('pf-import-file').addEventListener('change', handleImportFile);

  // Dialog
  $('pf-dialog-confirm').addEventListener('click', confirmSave);
  $('pf-dialog-cancel').addEventListener('click', hideSaveDialog);
  $('pf-template-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmSave();
    if (e.key === 'Escape') hideSaveDialog();
  });
  $('pf-dialog-backdrop').addEventListener('click', e => {
    if (e.target === $('pf-dialog-backdrop')) hideSaveDialog();
  });

  // Keyboard shortcut: Ctrl+Enter / Cmd+Enter to copy
  container.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); copyPrompt(); }
  });
}

export function cleanup() {}
</script>

</body>
</html>
