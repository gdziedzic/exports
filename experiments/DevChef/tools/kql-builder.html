<!-- DevChef Manifest -->
<script type="devchef-manifest">
{
  "id": "kql-builder",
  "name": "KQL Builder",
  "category": "Azure",
  "description": "Kusto Query Language builder for Azure Monitor, Log Analytics, and Application Insights with common snippets",
  "version": "1.0.0"
}
</script>

<!-- Tool UI Template -->
<template id="tool-ui">
  <div class="tool-container">
    <div class="tool-header">
      <h2 class="tool-title">KQL Builder</h2>
      <p class="tool-description">Build Kusto queries for Azure Monitor, Log Analytics, Application Insights, and Azure Data Explorer</p>
    </div>

    <div class="builder-layout">
      <div class="snippets-panel">
        <div class="panel-header">
          <h3>📚 Query Snippets</h3>
        </div>

        <div class="snippet-categories">

        </div>

      <div class="query-panel">

          <div class="editor-controls">
            <select id="table-select" class="control-select">
            </select>
            <select id="timerange-select" class="control-select">
              <option value="15m">Last 15 minutes</option>
              <option value="1h">Last 1 hour</option>
              <option value="4h">Last 4 hours</option>
              <option value="24h">Last 24 hours</option>
              <option value="7d">Last 7 days</option>
              <option value="30d">Last 30 days</option>
              <option value="custom">Custom range</option>
            </select>
          </div>
        </div>

        <div class="timestamp-helpers">
          <h4>⏰ Timestamp Helpers</h4>

              <div class="input-group">

              <div class="input-group">

              <button class="time-chip" data-time="ago(1h)">ago(1h)</button>
              <button class="time-chip" data-time="ago(24h)">ago(24h)</button>

<!-- Tool Module Logic -->
<script type="module">
export const TABLES = [
  'requests',
  'dependencies',
  'exceptions',
  'traces',
  'customEvents',
  'pageViews',
  'availabilityResults',
  'performanceCounters',
];

export const SNIPPETS = [
  // ── Date & Time ──────────────────────────────────────────
  {
    id: 'relative-time',
    name: 'Relative Time (ago)',
    category: 'Date & Time',
    query: `{{TABLE}}\n| where timestamp > ago(1h)\n| take 100`,
  },
  {
    id: 'absolute-range',
    name: 'Absolute Date Range',
    category: 'Date & Time',
    query: `{{TABLE}}\n| where timestamp between(datetime(2024-01-01 00:00:00) .. datetime(2024-01-31 23:59:59))\n| take 100`,
  },
  {
    id: 'today-only',
    name: 'Today Only',
    category: 'Date & Time',
    query: `{{TABLE}}\n| where timestamp between(startofday(now()) .. endofday(now()))\n| summarize count() by bin(timestamp, 1h)`,
  },
  {
    id: 'this-week',
    name: 'This Week',
    category: 'Date & Time',
    query: `{{TABLE}}\n| where timestamp between(startofweek(now()) .. now())\n| summarize count() by bin(timestamp, 1d)`,
  },
  {
    id: 'last-n-days',
    name: 'Last N Days',
    category: 'Date & Time',
    query: `{{TABLE}}\n| where timestamp > ago(7d)\n| summarize count() by bin(timestamp, 1d)\n| render timechart`,
  },
  {
    id: 'hourly-breakdown',
    name: 'Hourly Breakdown',
    category: 'Date & Time',
    query: `{{TABLE}}\n| where timestamp > ago(24h)\n| extend Hour = bin(timestamp, 1h)\n| summarize\n    Count=count(),\n    UniqueUsers=dcount(user_Id)\n  by Hour\n| order by Hour asc\n| render timechart`,
  },
  // ── Common Queries ───────────────────────────────────────
  {
    id: 'basic-filter',
    name: 'Basic Filter',
    category: 'Common Queries',
    query: `{{TABLE}}\n| where timestamp > ago(1h)\n| where resultCode >= 400\n| take 100`,
  },
  {
    id: 'time-range',
    name: 'Time Range',
    category: 'Common Queries',
    query: `{{TABLE}}\n| where timestamp between(datetime(2024-01-01) .. datetime(2024-01-31))\n| summarize count() by bin(timestamp, 1h)`,
  },
  {
    id: 'top-records',
    name: 'Top N Records',
    category: 'Common Queries',
    query: `{{TABLE}}\n| top 100 by timestamp desc`,
  },
  {
    id: 'distinct-values',
    name: 'Distinct Values',
    category: 'Common Queries',
    query: `{{TABLE}}\n| distinct name, resultCode\n| order by name asc`,
  },
  // ── Aggregations ─────────────────────────────────────────
  {
    id: 'count-by',
    name: 'Count By Field',
    category: 'Aggregations',
    query: `{{TABLE}}\n| where timestamp > ago(24h)\n| summarize Count=count() by resultCode\n| order by Count desc`,
  },
  {
    id: 'summarize',
    name: 'Summarize Stats',
    category: 'Aggregations',
    query: `requests\n| where timestamp > ago(1h)\n| summarize\n    TotalCount=count(),\n    AvgDuration=avg(duration),\n    P50=percentile(duration, 50),\n    P95=percentile(duration, 95)\n  by bin(timestamp, 5m)`,
  },
  {
    id: 'percentile',
    name: 'Percentile Analysis',
    category: 'Aggregations',
    query: `requests\n| where timestamp > ago(24h)\n| summarize\n    P50=percentile(duration, 50),\n    P90=percentile(duration, 90),\n    P95=percentile(duration, 95),\n    P99=percentile(duration, 99)\n  by name`,
  },
  {
    id: 'timechart',
    name: 'Time Chart',
    category: 'Aggregations',
    query: `requests\n| where timestamp > ago(24h)\n| summarize count() by bin(timestamp, 1h), resultCode\n| render timechart`,
  },
  // ── Errors & Traces ──────────────────────────────────────
  {
    id: 'trace-errors',
    name: 'Trace Errors & Warnings',
    category: 'Errors & Traces',
    query: `traces\n| where timestamp > ago(24h)\n| where severityLevel >= 2 // 2=Warning, 3=Error, 4=Critical\n| project\n    timestamp,\n    severityLevel,\n    message,\n    operation_Id,\n    customDimensions\n| order by timestamp desc\n| take 100`,
  },
  {
    id: 'trace-search',
    name: 'Search Trace Messages',
    category: 'Errors & Traces',
    query: `traces\n| where timestamp > ago(24h)\n| where message contains "error" or message contains "exception" or message contains "failed"\n| extend\n    Severity = case(\n        severityLevel == 0, "Verbose",\n        severityLevel == 1, "Information",\n        severityLevel == 2, "Warning",\n        severityLevel == 3, "Error",\n        severityLevel == 4, "Critical",\n        "Unknown"\n    )\n| project timestamp, Severity, message, operation_Id\n| order by timestamp desc`,
  },
  {
    id: 'error-timeline',
    name: 'Error Timeline',
    category: 'Errors & Traces',
    query: `traces\n| where timestamp > ago(24h)\n| where severityLevel >= 2\n| summarize\n    ErrorCount=countif(severityLevel == 3 or severityLevel == 4),\n    WarningCount=countif(severityLevel == 2),\n    TotalIssues=count()\n  by bin(timestamp, 15m)\n| render timechart`,
  },
  {
    id: 'error-rate',
    name: 'Error Rate Trending',
    category: 'Errors & Traces',
    query: `traces\n| where timestamp > ago(7d)\n| summarize\n    TotalTraces=count(),\n    ErrorTraces=countif(severityLevel >= 3),\n    WarningTraces=countif(severityLevel == 2)\n  by bin(timestamp, 1h)\n| extend\n    ErrorRate = round(100.0 * ErrorTraces / TotalTraces, 2),\n    WarningRate = round(100.0 * WarningTraces / TotalTraces, 2)\n| project timestamp, ErrorRate, WarningRate, TotalTraces\n| render timechart`,
  },
  {
    id: 'trace-correlation',
    name: 'Trace-Exception Correlation',
    category: 'Errors & Traces',
    query: `exceptions\n| where timestamp > ago(1h)\n| join kind=inner (\n    traces\n    | where timestamp > ago(1h)\n    | where severityLevel >= 2\n) on operation_Id\n| project\n    timestamp,\n    ExceptionType=type,\n    ExceptionMessage=outerMessage,\n    TraceMessage=message,\n    operation_Id\n| order by timestamp desc\n| take 50`,
  },
  {
    id: 'critical-traces',
    name: 'Critical Issues',
    category: 'Errors & Traces',
    query: `traces\n| where timestamp > ago(24h)\n| where severityLevel == 4 // Critical only\n| extend MessagePreview = substring(message, 0, 200)\n| summarize\n    Count=count(),\n    FirstOccurrence=min(timestamp),\n    LastOccurrence=max(timestamp),\n    SampleMessage=any(MessagePreview),\n    Operations=make_set(operation_Id, 5)\n  by message\n| order by Count desc`,
  },
  // ── Monitoring & Alerts ──────────────────────────────────
  {
    id: 'errors',

  },
  {

    category: 'Application Insights',
    query: `dependencies\n| where timestamp > ago(1h)\n| summarize\n    CallCount=count(),\n    AvgDuration=avg(duration),\n    FailureRate=100.0 * countif(success == false) / count()\n  by target, type\n| order by FailureRate desc`,
  },
  {

    query: `exceptions\n| where timestamp > ago(24h)\n| extend ExceptionType = tostring(split(type, '.')[-1])\n| summarize\n    Count=count(),\n    FirstSeen=min(timestamp),\n    LastSeen=max(timestamp),\n    SampleStack=any(details)\n  by ExceptionType, outerMessage\n| order by Count desc`,
  },
  {

    category: 'Application Insights',
    query: `pageViews\n| where timestamp > ago(24h)\n| summarize\n    PageViews=count(),\n    UniqueUsers=dcount(user_Id),\n    AvgDuration=avg(duration)\n  by name\n| order by PageViews desc`,
  },
];

// Build snippet lookup from SNIPPETS array
const SNIPPET_MAP = Object.fromEntries(SNIPPETS.map(s => [s.id, s]));

export const DevChefTool = {
  container: null,
  context: null,

  // keep legacy property for any external callers
  get snippets() { return SNIPPET_MAP; },

  init(container, context) {
    this.container = container;
    this.context = context;

    const queryEditor = container.querySelector('#query-editor');
    const tableSelect = container.querySelector('#table-select');

    // Populate table picker from TABLES
    for (const table of TABLES) {
      const opt = document.createElement('option');
      opt.value = table;
      opt.textContent = table;
      tableSelect.appendChild(opt);
    }

    // Render snippet buttons from SNIPPETS array
    const categoriesEl = container.querySelector('.snippet-categories');
    categoriesEl.innerHTML = '';
    const categoryMap = new Map();
    for (const s of SNIPPETS) {
      if (!categoryMap.has(s.category)) categoryMap.set(s.category, []);
      categoryMap.get(s.category).push(s);
    }
    const CATEGORY_ICONS = {
      'Date & Time': '\u23F0',
      'Common Queries': '\uD83D\uDD0D',
      'Aggregations': '\uD83D\uDCCA',
      'Errors & Traces': '\uD83D\uDCDD',
      'Monitoring & Alerts': '\u26A0\uFE0F',
      'Application Insights': '\uD83D\uDCBB',
    };
    for (const [cat, snippets] of categoryMap) {
      const div = document.createElement('div');
      div.className = 'category';
      const icon = CATEGORY_ICONS[cat] || '';
      div.innerHTML = `<h4>${icon ? icon + ' ' : ''}${cat}</h4>`;
      for (const s of snippets) {
        const btn = document.createElement('button');
        btn.className = 'snippet-btn';
        btn.dataset.snippet = s.id;
        btn.textContent = s.name;
        btn.addEventListener('click', () => this.loadSnippet(s.id));
        div.appendChild(btn);
      }
      categoriesEl.appendChild(div);
    }

    // Quick action chips
    container.querySelectorAll('.action-chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        const action = e.target.dataset.action;
        this.insertOperator(action);
      });
    });

    // Timestamp helper chips
    container.querySelectorAll('.time-chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        const timeFunc = e.target.dataset.time;
        this.insertTimeFunction(timeFunc);
      });
    });

    // Insert date range button
    container.querySelector('#insert-range-btn')?.addEventListener('click', () => {
      this.insertDateRange();
    });

    // Query editor events
    queryEditor?.addEventListener('input', () => this.updateStats());

    // Actions
    container.querySelector('#format-btn')?.addEventListener('click', () => this.formatQuery());
    container.querySelector('#validate-btn')?.addEventListener('click', () => this.validateQuery());
    container.querySelector('#copy-query-btn')?.addEventListener('click', () => this.copyQuery());
    container.querySelector('#export-btn')?.addEventListener('click', () => this.exportQuery());

    // When the table picker changes, swap the table name on the first line
    tableSelect?.addEventListener('change', () => {
      const query = queryEditor.value;
      if (!query.trim()) return;
      const newTable = tableSelect.value;
      // First non-empty line is the table name in KQL
      const lines = query.split('\n');
      const idx = lines.findIndex(l => l.trim() !== '');
      if (idx !== -1 && !lines[idx].trim().startsWith('|') && !lines[idx].trim().startsWith('//')) {
        lines[idx] = newTable;
        queryEditor.value = lines.join('\n');
      }
      this.updateStats();
    });

    const timerangeSelect = container.querySelector('#timerange-select');
    timerangeSelect?.addEventListener('change', () => {
      this.applyTimeRange();
    });

    // Load default snippet
    this.loadSnippet('basic-filter');
  },

  applyTimeRange() {
    const queryEditor = this.container.querySelector('#query-editor');
    const timerangeSelect = this.container.querySelector('#timerange-select');
    const selectedRange = timerangeSelect.value;

    if (selectedRange === 'custom') return;

    const timeMap = {
      '15m': 'ago(15m)',
      '1h': 'ago(1h)',
      '4h': 'ago(4h)',
      '24h': 'ago(24h)',
      '7d': 'ago(7d)',
      '30d': 'ago(30d)'
    };

    const timeExpr = timeMap[selectedRange];
    if (!timeExpr) return;

    // Replace existing ago() expressions in "where timestamp > ago(...)" patterns
    const query = queryEditor.value;
    const updated = query.replace(
      /ago\(\s*\d+[smhd]\s*\)/g,
      timeExpr
    );
    queryEditor.value = updated;
    this.updateStats();
  },

  loadSnippet(snippetId) {
    const snippet = this.snippets[snippetId];
    if (!snippet) return;

    const queryEditor = this.container.querySelector('#query-editor');
    const tableSelect = this.container.querySelector('#table-select');

    let query = snippet.query.replaceAll('{{TABLE}}', tableSelect.value);
    queryEditor.value = query;

    this.updateStats();
    this.context.setOutput(query);
  },

  insertOperator(operator) {
    const queryEditor = this.container.querySelector('#query-editor');
    const cursorPos = queryEditor.selectionStart;
    const textBefore = queryEditor.value.substring(0, cursorPos);
    const textAfter = queryEditor.value.substring(cursorPos);

    const templates = {
      where: '\n| where ',
      summarize: '\n| summarize count() by ',
      project: '\n| project ',
      join: '\n| join kind=inner (\n    \n) on ',
      extend: '\n| extend NewColumn = ',
      render: '\n| render timechart'
    };

    const template = templates[operator] || `\n| ${operator} `;
    queryEditor.value = textBefore + template + textAfter;
    queryEditor.focus();
    queryEditor.selectionStart = queryEditor.selectionEnd = cursorPos + template.length;

    this.updateStats();
  },

  insertTimeFunction(timeFunc) {
    const queryEditor = this.container.querySelector('#query-editor');
    const cursorPos = queryEditor.selectionStart;
    const textBefore = queryEditor.value.substring(0, cursorPos);
    const textAfter = queryEditor.value.substring(cursorPos);

    queryEditor.value = textBefore + timeFunc + textAfter;
    queryEditor.focus();
    queryEditor.selectionStart = queryEditor.selectionEnd = cursorPos + timeFunc.length;

    this.updateStats();
  },

  insertDateRange() {
    const queryEditor = this.container.querySelector('#query-editor');
    const startInput = this.container.querySelector('#start-datetime');
    const endInput = this.container.querySelector('#end-datetime');

    const startValue = startInput.value;
    const endValue = endInput.value;

    if (!startValue || !endValue) {
      alert('Please select both start and end dates');
      return;
    }

    // Convert HTML5 datetime-local format to KQL datetime format
    const startDate = startValue.replace('T', ' ');
    const endDate = endValue.replace('T', ' ');

    const rangeClause = `| where timestamp between(datetime(${startDate}) .. datetime(${endDate}))`;

    const cursorPos = queryEditor.selectionStart;
    const textBefore = queryEditor.value.substring(0, cursorPos);
    const textAfter = queryEditor.value.substring(cursorPos);

    queryEditor.value = textBefore + '\n' + rangeClause + textAfter;
    queryEditor.focus();
    queryEditor.selectionStart = queryEditor.selectionEnd = cursorPos + rangeClause.length + 1;

    this.updateStats();
  },

  formatQuery() {
    const queryEditor = this.container.querySelector('#query-editor');
    const raw = queryEditor.value;
    if (!raw.trim()) return;

    // Split into lines preserving original structure
    const inputLines = raw.replace(/\r\n/g, '\n').split('\n');

    // First pass: split any lines that have pipe operators mid-line
    // (e.g. "Table | where x | take 10" -> three lines)
    // but NOT pipes inside strings or comments
    const expanded = [];
    for (const line of inputLines) {
      const trimmed = line.trim();
      if (!trimmed) continue; // skip blank lines

      // If line is a comment, keep as-is
      if (trimmed.startsWith('//')) {
        expanded.push(trimmed);
        continue;
      }

      // Split on pipe operators that are KQL operators (not inside strings)
      // Strategy: walk the line character by character tracking string context
      const segments = [];
      let current = '';
      let inString = false;
      let stringChar = '';

      for (let i = 0; i < trimmed.length; i++) {
        const ch = trimmed[i];

        if (inString) {
          current += ch;
          if (ch === '\\') {
            // escaped char - grab next too
            if (i + 1 < trimmed.length) {
              current += trimmed[i + 1];
              i++;
            }
          } else if (ch === stringChar) {
            inString = false;
          }
          continue;
        }

        // Check for string start
        if (ch === '"' || ch === "'") {
          inString = true;
          stringChar = ch;
          current += ch;
          continue;
        }

        // Check for inline comment
        if (ch === '/' && i + 1 < trimmed.length && trimmed[i + 1] === '/') {
          current += trimmed.substring(i);
          break;
        }

        // Check for pipe operator: | followed by a word (KQL operator)
        if (ch === '|') {
          // Look ahead: skip whitespace, check for word char
          let j = i + 1;
          while (j < trimmed.length && trimmed[j] === ' ') j++;
          if (j < trimmed.length && /[a-zA-Z]/.test(trimmed[j])) {
            // This is a pipe operator - split here
            if (current.trim()) {
              segments.push(current.trim());
            }
            current = '| ';
            // Skip the whitespace after pipe
            i = j - 1;
            continue;
          }
        }

        current += ch;
      }

      if (current.trim()) {
        segments.push(current.trim());
      }

      expanded.push(...segments);
    }

    // Second pass: format with proper indentation based on context
    // KQL operators that take multi-line arguments
    const multiLineOps = /^(summarize|extend|project|project-away|project-keep|project-rename|project-reorder)\b/i;
    const result = [];
    let parenDepth = 0;
    let expectContinuation = false;

    for (let i = 0; i < expanded.length; i++) {
      const line = expanded[i];
      const trimmed = line.trim();
      if (!trimmed) continue;

      // Count parentheses (outside strings) to track join subqueries
      let lineParenDelta = 0;
      {
        let inStr = false;
        let strCh = '';
        for (let c = 0; c < trimmed.length; c++) {
          const ch = trimmed[c];
          if (inStr) {
            if (ch === '\\') { c++; continue; }
            if (ch === strCh) inStr = false;
            continue;
          }
          if (ch === '"' || ch === "'") { inStr = true; strCh = ch; continue; }
          if (ch === '/' && c + 1 < trimmed.length && trimmed[c + 1] === '/') break;
          if (ch === '(') lineParenDelta++;
          if (ch === ')') lineParenDelta--;
        }
      }

      // Determine if this line starts with a pipe operator
      const isPipeLine = trimmed.startsWith('| ') || trimmed === '|';

      // Determine if this is a "by" clause continuation (e.g. "by bin(timestamp, 5m)")
      const isByClause = /^by\b/i.test(trimmed);

      // Handle closing-paren lines (like ") on OperationId")
      const startsWithCloseParen = trimmed.startsWith(')');

      if (startsWithCloseParen) {
        // The closing paren reduces depth before we format this line
        parenDepth = Math.max(0, parenDepth + lineParenDelta);
        const indent = parenDepth > 0 ? '    ' : '';
        result.push(indent + trimmed);
        expectContinuation = false;
        continue;
      }

      if (isPipeLine) {
        // Pipe line: check if the operator is a multi-line one
        const afterPipe = trimmed.substring(2).trim();
        const indent = parenDepth > 0 ? '    ' : '';
        result.push(indent + '| ' + afterPipe);

        // Check if this pipe operator expects continuation lines
        expectContinuation = multiLineOps.test(afterPipe);

        parenDepth += lineParenDelta;
        if (parenDepth < 0) parenDepth = 0;
        continue;
      }

      if (trimmed.startsWith('//')) {
        // Comment line - preserve at current indentation level
        const indent = parenDepth > 0 ? '    ' : (expectContinuation ? '    ' : '');
        result.push(indent + trimmed);
        parenDepth += lineParenDelta;
        if (parenDepth < 0) parenDepth = 0;
        continue;
      }

      if (expectContinuation) {
        // Continuation of a multi-line operator (summarize, extend, project, etc.)
        if (isByClause) {
          const indent = parenDepth > 0 ? '    ' : '';
          result.push(indent + '  ' + trimmed);
        } else {
          const indent = parenDepth > 0 ? '    ' : '';
          result.push(indent + '    ' + trimmed);
        }
        parenDepth += lineParenDelta;
        if (parenDepth < 0) parenDepth = 0;
        continue;
      }

      // First line (table name) or non-operator line
      if (result.length === 0) {
        // Table name - no indent
        result.push(trimmed);
      } else {
        // Some other continuation line
        const indent = parenDepth > 0 ? '    ' : '';
        result.push(indent + trimmed);
      }

      parenDepth += lineParenDelta;
      if (parenDepth < 0) parenDepth = 0;
    }

    queryEditor.value = result.join('\n');
    this.updateStats();
  },

  validateQuery() {
    const queryEditor = this.container.querySelector('#query-editor');
    const query = queryEditor.value;

    const issues = [];

    // Basic validation
    if (!query.trim()) {
      alert('Query is empty');
      return;
    }

    // Check for common operators
    const hasOperators = /\b(where|summarize|project|extend|join|render)\b/.test(query);
    if (!hasOperators) {
      issues.push('No KQL operators found');
    }

    // Check for balanced parentheses
    const openCount = (query.match(/\(/g) || []).length;
    const closeCount = (query.match(/\)/g) || []).length;
    if (openCount !== closeCount) {
      issues.push('Unbalanced parentheses');
    }

    if (issues.length > 0) {
      alert('Validation warnings:\n- ' + issues.join('\n- '));
    } else {
      alert('✓ Query looks good!');
    }
  },

  updateStats() {
    const queryEditor = this.container.querySelector('#query-editor');
    const query = queryEditor.value;

    const lines = query.trim() ? query.split('\n').length : 0;
    const chars = query.length;
    const operators = (query.match(/\b(where|summarize|project|extend|join|render|take|top|distinct|order)\b/g) || []).length;

    this.container.querySelector('#line-count').textContent = lines;
    this.container.querySelector('#char-count').textContent = chars;
    this.container.querySelector('#operator-count').textContent = operators;

    this.context.setOutput(query);
  },

  copyQuery() {
    const query = this.context.getOutput();
    if (!query) {
      alert('Nothing to copy — query is empty');
      return;
    }
    navigator.clipboard.writeText(query).then(() => {
      const btn = this.container.querySelector('#copy-query-btn');
      const original = btn.textContent;
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = original, 2000);
    }).catch(() => {
      // Fallback for insecure contexts
      const textarea = document.createElement('textarea');
      textarea.value = query;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      const btn = this.container.querySelector('#copy-query-btn');
      const original = btn.textContent;
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = original, 2000);
    });
  },

  exportQuery() {
    const query = this.context.getOutput();
    if (!query) {
      alert('Nothing to export — query is empty');
      return;
    }
    const blob = new Blob([query], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'query.kql';
    a.click();
    URL.revokeObjectURL(url);
  },

  onInput(input, context) {
    return { output: "" };
  }
};

// Standalone mode initialization
if (typeof window !== 'undefined' && !window.DevChef) {
  document.addEventListener('DOMContentLoaded', () => {
    const isStandalone = !document.querySelector('#workspace');

    if (isStandalone) {
      const standaloneContext = {
        input: "",
        output: "",
        setInput(val) { this.input = val; },
        setOutput(val) { this.output = val; },
        getInput() { return this.input; },
        getOutput() { return this.output; }
      };

      const template = document.querySelector('#tool-ui');
      if (template) {
        document.body.innerHTML = template.innerHTML;
        DevChefTool.init(document.body, standaloneContext);
      }
    }
  });
}
