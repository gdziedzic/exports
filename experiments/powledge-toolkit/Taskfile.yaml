version: '3'

vars:
  PYTHON: python

tasks:

  default:
    desc: Show available tasks
    silent: true
    cmds:
      - task --list

  # ---------------------------------------------------------------------------
  # Confluence ingestion
  # ---------------------------------------------------------------------------

  confluence:
    desc: Ingest all pages/spaces, run ETL, then rebuild aggregated index
    cmds:
      - "{{.PYTHON}} ingest/confluence.py"
      - "{{.PYTHON}} etl/process.py --pending"
      - task: index:build

  confluence:dry:
    desc: Preview what would be ingested (no files written)
    cmds:
      - "{{.PYTHON}} ingest/confluence.py --dry-run"

  confluence:page:
    desc: "Ingest pages by ID, run ETL, rebuild index  (usage: task confluence:page -- 111 222 333)"
    cmds:
      - "{{.PYTHON}} ingest/confluence.py --page-id {{.CLI_ARGS}}"
      - "{{.PYTHON}} etl/process.py --pending"
      - task: index:build

  confluence:space:
    desc: "Ingest spaces by key, run ETL, rebuild index  (usage: task confluence:space -- ENG HR)"
    cmds:
      - "{{.PYTHON}} ingest/confluence.py --space-key {{.CLI_ARGS}}"
      - "{{.PYTHON}} etl/process.py --pending"
      - task: index:build

  confluence:page:dry:
    desc: "Dry-run for specific pages  (usage: task confluence:page:dry -- 111 222)"
    cmds:
      - "{{.PYTHON}} ingest/confluence.py --page-id {{.CLI_ARGS}} --dry-run"

  # ---------------------------------------------------------------------------
  # ETL
  # ---------------------------------------------------------------------------

  etl:process:
    desc: "Run ETL on raw files  (usage: task etl:process -- --all | --pending | path/to/file.md)"
    cmds:
      - "{{.PYTHON}} etl/process.py {{.CLI_ARGS}}"

  etl:process:pending:
    desc: Process only raw files not yet converted to knowledge/
    cmds:
      - "{{.PYTHON}} etl/process.py --pending"

  # ---------------------------------------------------------------------------
  # Index
  # ---------------------------------------------------------------------------

  index:build:
    desc: Aggregate all index/*.index.json into index/all.json with related links
    cmds:
      - "{{.PYTHON}} etl/build-index.py"

  # ---------------------------------------------------------------------------
  # Search
  # ---------------------------------------------------------------------------

  search:index:
    desc: "List all index entries as JSON  (add --tags, --search, --fields, --format as needed)"
    cmds:
      - "{{.PYTHON}} search/list-index.py {{.CLI_ARGS}}"

  search:index:tags:
    desc: "Filter index by tags  (usage: task search:index:tags -- ai etl)"
    cmds:
      - "{{.PYTHON}} search/list-index.py --tags \"{{.CLI_ARGS}}\""

  search:query:
    desc: "Answer a question from the knowledge base  (usage: task search:query -- 'What is X?')"
    cmds:
      - "{{.PYTHON}} search/query.py {{.CLI_ARGS}}"

  # ---------------------------------------------------------------------------
  # Inspect store
  # ---------------------------------------------------------------------------

  ls:raw:
    desc: List files in raw/
    silent: true
    cmds:
      - "{{.PYTHON}} -c \"
import os, pathlib
files = sorted(pathlib.Path('raw').glob('*.md'))
print(f'{len(files)} raw files')
for f in files: print(' ', f.name)
\""

  ls:knowledge:
    desc: List files in knowledge/
    silent: true
    cmds:
      - "{{.PYTHON}} -c \"
import pathlib
files = sorted(pathlib.Path('knowledge').glob('*.md'))
print(f'{len(files)} knowledge files')
for f in files: print(' ', f.name)
\""

  ls:index:
    desc: List index entries with title and summary
    silent: true
    cmds:
      - "{{.PYTHON}} -c \"
import json, pathlib
files = sorted(pathlib.Path('index').glob('*.index.json'))
print(f'{len(files)} index entries')
for f in files:
    d = json.loads(f.read_text(encoding='utf-8'))
    title = d.get('title', f.stem)
    summary = d.get('summary', '')[:80]
    print(f'  [{d.get(\\\"id\\\", \\\"?\\\")}] {title}')
    if summary: print(f'      {summary}')
\""

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------

  test:
    desc: Run all tests
    cmds:
      - "{{.PYTHON}} -m pytest tests/ -v"

  test:watch:
    desc: Run tests in watch mode (requires pytest-watch)
    cmds:
      - "{{.PYTHON}} -m pytest tests/ -v --tb=short -x"

  # ---------------------------------------------------------------------------
  # Maintenance
  # ---------------------------------------------------------------------------

  status:
    desc: Show counts for raw, knowledge, and index
    silent: true
    cmds:
      - "{{.PYTHON}} -c \"
import pathlib
raw = list(pathlib.Path('raw').glob('*.md')) if pathlib.Path('raw').exists() else []
know = list(pathlib.Path('knowledge').glob('*.md')) if pathlib.Path('knowledge').exists() else []
idx = list(pathlib.Path('index').glob('*.index.json')) if pathlib.Path('index').exists() else []
print(f'raw/       {len(raw)} files')
print(f'knowledge/ {len(know)} files')
print(f'index/     {len(idx)} entries')
\""

  ui:
    desc: "Start the Powledge web UI  (default port 7700, usage: task ui -- 8080)"
    cmds:
      - "{{.PYTHON}} server.py {{.CLI_ARGS}}"

  init:
    desc: Create raw/, knowledge/, and index/ directories
    cmds:
      - "{{.PYTHON}} -c \"from config import load_config, ensure_dirs; ensure_dirs(load_config()); print('Directories ready.')\""
